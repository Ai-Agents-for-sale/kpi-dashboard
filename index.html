  <div style="margin-top:14px;padding:13px 16px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <span style="font-size:13.5px;color:var(--txt-dim)">תקרת רווח עם הצוות הנוכחי (${teamSize} ${teamSize>1?'נציגים':'נציג'}, ${fmt1(maxClients)} לקוחות בקיבולת מלאה)</span>
    <span style="font-family:'Rubik';font-weight:800;font-size:18px;color:var(--accent);direction:ltr;white-space:nowrap">${money(maxOperating)} ₪ <span style="font-size:12px;color:var(--txt-faint);font-weight:500">רווח · ${money(maxRevenue)}₪ מחזור</span></span>
  </div>
  ${state.goalProfit>maxOperating? `<div class="hint" style="margin-top:8px;color:var(--amber)">⚠ יעד הרווח שלך (${money(state.goalProfit)}₪) גבוה מהתקרה האפשרית עם הצוות הנוכחי — תצטרך להגדיל צוות או קיבולת.</div>`:''}`;
  autoSizeInputs();
}

/* חישוב והצגת הביצוע בפועל מול היעד */
function refreshActual(){
  const box=document.getElementById('actResults'); if(!box) return;
  const c=compute();
  const num=v=> (v===''||v==null)? null : (parseFloat(v)||0);
  const budget=num(state.actBudget), leads=num(state.actLeads), closes=num(state.actCloses), days=num(state.actDays);
  const dash='<span style="color:var(--txt-faint)">—</span>';
  const goalClients=clientsForProfit(state.goalProfit);

  // מחירים אמיתיים
  const cpl = (budget!=null&&leads>0) ? budget/leads : null;
  const convRate = (leads>0&&closes!=null) ? closes/leads*100 : null;
  const cacMkt = (budget!=null&&closes>0) ? budget/closes : null;
  const cacFull = (cacMkt!=null) ? cacMkt + c.commCost + c.onbCommCost + c.procCost + c.onbHourlyCost : null;

  // === רווח שכבר נכנס בפועל - מנתוני המאנדיי האמיתיים ===
  const realSoFar = profitSoFar();          // אובייקט עם פירוט מלא
  const realExpected = profitExpectedEndOfMonth();
  const profitSoFarVal = realSoFar.operating;
  const projOperating = realExpected.operating;

  // קצב סגירות לתחזית
  let pace=null, projCloses=null;
  if(closes!=null && days>0){
    pace=closes/days; projCloses=pace*state.daysMonth;
  }

  // === אינדיקטורים חדשים: כמה לקוחות עוד צריך ===
  // הרווח שכבר נכנס/הצפוי כולל שיווק שיצא **עד היום בלבד**.
  // כל לקוח נוסף שנגייס יוסיף עלות שיווק משלו, לכן הרווח לקוח חייב לכלול שיווק (280₪).
  const profitPerNew = profitFromOneNewClient();
  // א. מהרווח עד היום: כמה צריך כדי להשלים ליעד
  const gapFromSoFar = state.goalProfit - profitSoFarVal;
  const clientsNeededFromSoFar = profitPerNew>0 ? Math.max(0, gapFromSoFar/profitPerNew) : 0;
  // ב. מהרווח הצפוי לסוף החודש: כמה עוד צריך
  const gapFromExpected = state.goalProfit - projOperating;
  const clientsNeededFromExpected = profitPerNew>0 ? Math.max(0, gapFromExpected/profitPerNew) : 0;

  // לידים ותקציב נגזרים מלקוחות נדרשים
  const leadsFromSoFar = c.effConv>0 ? clientsNeededFromSoFar/c.effConv : 0;
  const budgetFromSoFar = leadsFromSoFar * state.costPerLead;
  const daysLeft = days!=null ? Math.max(state.daysMonth-days,0) : state.daysMonth;
  const dailyBudgetFromSoFar = daysLeft>0 ? budgetFromSoFar/daysLeft : 0;
  const dailyClosesFromSoFar = daysLeft>0 ? clientsNeededFromSoFar/daysLeft : 0;

  const leadsFromExpected = c.effConv>0 ? clientsNeededFromExpected/c.effConv : 0;
  const budgetFromExpected = leadsFromExpected * state.costPerLead;
  const dailyBudgetFromExpected = daysLeft>0 ? budgetFromExpected/daysLeft : 0;
  const dailyClosesFromExpected = daysLeft>0 ? clientsNeededFromExpected/daysLeft : 0;

  // מול היעד (לוגיקה ישנה לטבלה)
  const remaining = closes!=null ? Math.max(goalClients-closes,0) : null;
  const perDay = (remaining!=null&&daysLeft!=null) ? (daysLeft>0?remaining/daysLeft:remaining) : null;
  const onTrackGoal = projOperating!=null ? projOperating>=state.goalProfit : null;

  // יעדים להשוואה
  const cplTarget=state.costPerLead;
  const convTarget=c.effConv*100;
  const cacTarget=c.cac;                          // עלות לקוח ביעד (שיווק+עמלה)
  // עוגן להשפעות כספיות: לקוחות מוקרנים לחודש (אם אפשר), אחרת לקוחות בפועל
  const anchorClients = projCloses!=null ? projCloses : (closes!=null?closes:null);
  // השפעת מחיר ליד: פער × לידים מוקרנים
  const projLeads = (leads!=null&&days>0) ? leads/days*state.daysMonth : (anchorClients!=null&&convRate>0? anchorClients/(convRate/100):null);
  const cplImpact = (cpl!=null&&projLeads!=null) ? -(cpl-cplTarget)*projLeads : null;
  // השפעת אחוז המרה: כמה שיווק חוסכים/מבזבזים מול היעד, לאותם לקוחות
  let convImpact=null;
  if(convRate>0 && anchorClients!=null){
    const leadsAtTarget=anchorClients/(convTarget/100), leadsAtReal=anchorClients/(convRate/100);
    convImpact=(leadsAtTarget-leadsAtReal)*state.costPerLead; // חיובי=חוסך (המרה טובה יותר)
  }
  // השפעת עלות לקוח: פער × לקוחות מוקרנים
  const cacImpact = (cacFull!=null&&anchorClients!=null) ? -(cacFull-cacTarget)*anchorClients : null;

  const anyData = budget!=null||leads!=null||closes!=null;
  if(!anyData){
    box.innerHTML=`<div class="hint" style="text-align:center;padding:8px">מלא את השדות למעלה כדי לראות את ההשוואה לביצוע בפועל.</div>`;
    return;
  }

  // עזר לפער: מחזיר טקסט צבעוני. goodIfLower=true אם ערך נמוך יותר טוב (מחיר/עלות)
  const gapTxt=(act,target,goodIfLower,suffix='',f=fmt)=>{
    if(act==null) return '';
    const diff=act-target; const good=goodIfLower? diff<=0 : diff>=0;
    if(Math.abs(diff)<0.05) return `<span style="color:var(--accent);font-size:11.5px">תואם ליעד</span>`;
    return `<span style="color:${good?'var(--accent)':'var(--red)'};font-size:11.5px">${diff>0?'+':''}${f(diff)}${suffix} מהיעד</span>`;
  };

  box.innerHTML=`
    <div class="grid cols-3" style="margin-bottom:14px">
      <div style="background:var(--bg-2);border-radius:12px;padding:15px;border:1px solid var(--line-soft)">
        <div style="display:flex;align-items:center;gap:8px;color:var(--txt-dim);font-size:12.5px;margin-bottom:8px"><span style="color:var(--amber)">${svg('wallet')}</span>מחיר ליד אמיתי</div>
        <div style="font-family:'Rubik';font-size:22px;font-weight:700;direction:ltr;text-align:right">${cpl!=null?fmt1(cpl)+'₪':dash}</div>
        ${cplImpact!=null&&Math.abs(cpl-cplTarget)>=0.05?`<div class="hint" style="margin-top:4px;color:${cplImpact>=0?'var(--accent)':'var(--red)'}">השפעה על הרווח: ${cplImpact>=0?'+':''}${money(cplImpact)}₪ בחודש</div>`:''}
      </div>
      <div style="background:var(--bg-2);border-radius:12px;padding:15px;border:1px solid var(--line-soft)">
        <div style="display:flex;align-items:center;gap:8px;color:var(--txt-dim);font-size:12.5px;margin-bottom:8px"><span style="color:var(--purple)">${svg('percent')}</span>אחוז המרה אמיתי</div>
        <div style="font-family:'Rubik';font-size:22px;font-weight:700;direction:ltr;text-align:right">${convRate!=null?fmt1(convRate)+'%':dash}</div>
        ${convImpact!=null&&Math.abs(convRate-convTarget)>=0.05?`<div class="hint" style="margin-top:4px;color:${convImpact>=0?'var(--accent)':'var(--red)'}">השפעה על הרווח: ${convImpact>=0?'+':''}${money(convImpact)}₪ בחודש</div>`:''}
      </div>
      <div style="background:var(--bg-2);border-radius:12px;padding:15px;border:1px solid var(--line-soft)">
        <div style="display:flex;align-items:center;gap:8px;color:var(--txt-dim);font-size:12.5px;margin-bottom:8px"><span style="color:var(--red)">${svg('target')}</span>עלות לקוח אמיתית</div>
        <div style="font-family:'Rubik';font-size:22px;font-weight:700;direction:ltr;text-align:right">${cacFull!=null?money(cacFull)+'₪':dash}</div>
        ${cacImpact!=null&&Math.abs(cacFull-cacTarget)>=0.5?`<div class="hint" style="margin-top:4px;color:${cacImpact>=0?'var(--accent)':'var(--red)'}">השפעה על הרווח: ${cacImpact>=0?'+':''}${money(cacImpact)}₪ בחודש</div>`:''}
      </div>
    </div>
    ${gapFromExpected>0 ? (()=>{
      // מספרי המפתח
      const clientsNeeded = clientsNeededFromExpected;
      const clientsDaily = daysLeft>0 ? clientsNeeded/daysLeft : 0;
      const callsNeeded = c.close>0 ? clientsNeeded/c.close : 0;        // שיחות = לקוחות / אחוז סגירה
      const callsDaily = daysLeft>0 ? callsNeeded/daysLeft : 0;
      const leadsNeeded = c.effConv>0 ? clientsNeeded/c.effConv : 0;
      const leadsDaily = daysLeft>0 ? leadsNeeded/daysLeft : 0;
      const budgetNeeded = leadsNeeded * state.costPerLead;
      const budgetDaily = daysLeft>0 ? budgetNeeded/daysLeft : 0;

      return `<div style="background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;padding:18px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:10px">
          <h4 style="font-size:15px;margin:0;color:var(--txt)">מה צריך לעשות כדי להשלים את הפער</h4>
          <span class="tag amber">פער ${money(gapFromExpected)}₪ ב-${daysLeft} ימים</span>
        </div>
        <div style="font-size:12.5px;color:var(--txt-faint);margin-bottom:16px;line-height:1.5">
          הרווח הצפוי הוא ${money(projOperating)}₪. כדי להגיע ליעד של ${money(state.goalProfit)}₪, צריך לסגור עוד <b style="color:var(--txt)">${fmt1(clientsNeeded)} לקוחות</b> מהיום (כל לקוח חדש = ${money(profitPerNew)}₪ רווח בחודש הראשון).
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:13.5px">
          <thead>
            <tr style="border-bottom:1px solid var(--line-soft)">
              <th style="text-align:right;padding:10px 8px;font-weight:600;color:var(--txt-faint);font-size:12px">פעולה</th>
              <th style="text-align:center;padding:10px 8px;font-weight:600;color:var(--accent);font-size:12px">סה"כ עד סוף החודש</th>
              <th style="text-align:center;padding:10px 8px;font-weight:600;color:var(--accent);font-size:12px">ביום (${daysLeft} ימים)</th>
            </tr>
          </thead>
          <tbody>
            <tr style="border-bottom:1px solid var(--line-soft)">
              <td style="padding:12px 8px;color:var(--txt)">לקוחות לסגור</td>
              <td style="padding:12px 8px;text-align:center;font-family:'Rubik';font-weight:700;font-size:16px;color:var(--accent);direction:ltr">${fmt1(clientsNeeded)}</td>
              <td style="padding:12px 8px;text-align:center;font-family:'Rubik';font-weight:700;font-size:16px;color:var(--accent);direction:ltr">${fmt1(clientsDaily)}</td>
            </tr>
            <tr style="border-bottom:1px solid var(--line-soft)">
              <td style="padding:12px 8px;color:var(--txt)">שיחות מכירה לבצע <span style="color:var(--txt-faint);font-size:11px">(לפי ${fmt1(c.close*100)}% סגירה)</span></td>
              <td style="padding:12px 8px;text-align:center;font-family:'Rubik';font-weight:700;font-size:16px;direction:ltr">${fmt1(callsNeeded)}</td>
              <td style="padding:12px 8px;text-align:center;font-family:'Rubik';font-weight:700;font-size:16px;direction:ltr">${fmt1(callsDaily)}</td>
            </tr>
            <tr style="border-bottom:1px solid var(--line-soft)">
              <td style="padding:12px 8px;color:var(--txt)">לידים להביא <span style="color:var(--txt-faint);font-size:11px">(לפי ${fmt1(c.effConv*100)}% המרה)</span></td>
              <td style="padding:12px 8px;text-align:center;font-family:'Rubik';font-weight:700;font-size:16px;direction:ltr">${fmt(leadsNeeded)}</td>
              <td style="padding:12px 8px;text-align:center;font-family:'Rubik';font-weight:700;font-size:16px;direction:ltr">${fmt1(leadsDaily)}</td>
            </tr>
            <tr>
              <td style="padding:12px 8px;color:var(--txt)">תקציב שיווק <span style="color:var(--txt-faint);font-size:11px">(לפי ${money(state.costPerLead)}₪ לליד)</span></td>
              <td style="padding:12px 8px;text-align:center;font-family:'Rubik';font-weight:700;font-size:16px;direction:ltr">${money(budgetNeeded)}₪</td>
              <td style="padding:12px 8px;text-align:center;font-family:'Rubik';font-weight:700;font-size:16px;direction:ltr">${money(budgetDaily)}₪</td>
            </tr>
          </tbody>
        </table>
      </div>`;
    })() : `<div class="notice ok" style="margin-bottom:14px">${svg('info')}<div>הרווח הצפוי (${money(projOperating)}₪) כבר עובר את יעד הרווח (${money(state.goalProfit)}₪). אין פער לסגור.</div></div>`}

    <table class="kpi-table" style="display:none">
      <thead><tr><th>מדד</th><th>בפועל</th><th>יעד</th><th>פער</th></tr></thead><tbody></tbody>
    </table>
    <div class="split" style="margin-top:14px">
      <div style="background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;padding:15px">
        <div class="hint">רווח תפעולי שכבר נכנס בפועל ${help('profitSoFar')}</div>
        <div style="font-family:'Rubik';font-size:22px;font-weight:800;color:${profitSoFarVal>=0?'var(--accent)':'var(--red)'};direction:ltr;text-align:right;margin-top:4px">${money(profitSoFarVal)} ₪</div>
        <div class="hint" style="font-size:11px;margin-top:6px">ריטיינרים: ${money(realSoFar.retainersIncome)}₪ · הקמות: ${money(realSoFar.setupIncome)}₪</div>
      </div>
      <div style="background:var(--bg-2);border:1px solid ${onTrackGoal?'rgba(61,220,151,.3)':'rgba(255,107,107,.3)'};border-radius:12px;padding:16px">
        <div class="hint" style="margin-bottom:10px">רווח תפעולי צפוי לסוף החודש ${help('profitExpected')}</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px">
          <div>
            <div style="font-size:11.5px;color:var(--txt-faint)">צפוי</div>
            <div style="font-family:'Rubik';font-size:24px;font-weight:800;color:${onTrackGoal?'var(--accent)':'var(--amber)'};direction:ltr">${money(projOperating)}₪</div>
          </div>
          <div>
            <div style="font-size:11.5px;color:var(--txt-faint)">יעד</div>
            <div style="font-family:'Rubik';font-size:24px;font-weight:700;color:var(--txt-dim);direction:ltr">${money(state.goalProfit)}₪</div>
          </div>
          <div>
            <div style="font-size:11.5px;color:var(--txt-faint)">פער</div>
            <div style="font-family:'Rubik';font-size:24px;font-weight:800;direction:ltr;color:${projOperating>=state.goalProfit?'var(--accent)':'var(--red)'}">${projOperating-state.goalProfit>=0?'+':''}${money(projOperating-state.goalProfit)}₪</div>
          </div>
        </div>
      </div>
    </div>

    <!-- קוביה משנית: על סמך הרווח שכבר נכנס בפועל -->
    ${gapFromSoFar>0 ? `
    <div style="margin-top:14px;background:var(--bg-2);border:1px solid rgba(73,170,255,.2);border-radius:12px;padding:13px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <div style="font-size:12.5px;color:var(--blue);font-weight:600">השלמת הפער מהרווח שכבר נכנס בפועל ${help('gapFromSoFar')}</div>
        <div style="font-size:12px;color:var(--txt-dim)">פער: <b style="font-family:'Rubik';direction:ltr">${money(gapFromSoFar)}₪</b></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:12px">
        <div><span style="color:var(--txt-faint)">לקוחות:</span> <b style="font-family:'Rubik';direction:ltr">${fmt1(clientsNeededFromSoFar)}</b></div>
        <div><span style="color:var(--txt-faint)">לידים:</span> <b style="font-family:'Rubik';direction:ltr">${fmt(leadsFromSoFar)}</b></div>
        <div><span style="color:var(--txt-faint)">תקציב יומי:</span> <b style="font-family:'Rubik';direction:ltr">${money(dailyBudgetFromSoFar)}₪</b></div>
        <div><span style="color:var(--txt-faint)">סגירות ביום:</span> <b style="font-family:'Rubik';direction:ltr">${fmt1(dailyClosesFromSoFar)}</b></div>
      </div>
    </div>` : ''}
    ${onTrackGoal!=null ? `<div class="notice ${onTrackGoal?'ok':'warn'}" style="margin-top:14px;margin-bottom:0">${svg('info')}<div>${onTrackGoal
        ? 'בקצב הנוכחי תעבור את יעד הרווח ('+money(state.goalProfit)+'₪). כל הכבוד!'
        : 'בקצב הנוכחי תגיע ל-'+money(projOperating)+'₪ — מתחת ליעד ('+money(state.goalProfit)+'₪).'}</div></div>` : ''}
    ${(onTrackGoal===false && daysLeft>0) ? renderRecommendations(projOperating, state.goalProfit, daysLeft, closes, leads, days, c) : ''}`;
}

/* כרטיס המלצות: איך לסגור את הפער מהיום עד סוף החודש */
function renderRecommendations(projOperating, goal, daysLeft, closes, leads, daysPassed, c){
  const gap = goal - projOperating;
  if(gap<=0) return '';
  const s = state;
  const projFromNow = (closes||0)/(daysPassed||1) * daysLeft;
  const profitPerNewClient = profitFromOneNewClient(s);
  const extraClientsNeeded = profitPerNewClient>0 ? gap/profitPerNewClient : Infinity;
  const leadsPerDay = (leads||0)/(daysPassed||1);
  const leadsRemaining = leadsPerDay * daysLeft;
  const recs = [];

  // א. תסגור יותר עסקאות
  if(isFinite(extraClientsNeeded)){
    const extraPerDay = daysLeft>0 ? extraClientsNeeded/daysLeft : Infinity;
    const newPaceNeeded = (closes||0)/(daysPassed||1) + extraPerDay;
    const realistic = extraClientsNeeded <= daysLeft*5;
    recs.push({
      icon:'conv', color:'green', realistic,
      title:'תסגור יותר עסקאות מהיום',
      detail:`עוד <b>${fmt1(extraClientsNeeded)}</b> לקוחות סגורים עד סוף החודש (<b>${fmt1(extraPerDay)}</b> נוספים ביום) = <b>${fmt1(newPaceNeeded)}</b> סגירות ביום במקום ${fmt1((closes||0)/(daysPassed||1))}`,
      warning: !realistic ? 'הקצב הנדרש גבוה מאוד — סביר להניח שלא ריאלי בלי שינויים אחרים' : '',
    });
  }

  // ב. תעלה אחוז סגירה
  if(leadsRemaining>0){
    const dEff = (extraClientsNeeded/leadsRemaining) * 100;
    const dClose = c.answer>0 ? (dEff/100)/c.answer*100 : Infinity;
    const newClose = s.closeRate + dClose;
    const realistic = newClose<=80 && dClose<=30;
    recs.push({
      icon:'percent', color:'amber', realistic,
      title:'תעלה אחוז סגירה',
      detail:`מ-<b>${fmt1(s.closeRate)}%</b> ל-<b>${fmt1(newClose)}%</b> (+${fmt1(dClose)} נקודות) על השיחות ב-${daysLeft} הימים שנותרו`,
      warning: !realistic ? `אחוז סגירה של ${fmt1(newClose)}% גבוה מהממוצע — סביר להניח שלא ריאלי בלי שינויים אחרים` : '',
    });
  }

  // ב.2 תעלה אחוז מענה
  if(leadsRemaining>0){
    // אחוז מענה נוסף שיביא extraClientsNeeded לקוחות נוספים = extraClientsNeeded / (leadsRemaining * closeRate)
    const dAnswer = c.close>0 ? (extraClientsNeeded / (leadsRemaining * c.close))*100 : Infinity;
    const newAnswer = s.answerRate + dAnswer;
    const realistic = newAnswer<=95 && dAnswer<=30;
    recs.push({
      icon:'phone', color:'purple', realistic,
      title:'תעלה אחוז מענה',
      detail:`מ-<b>${fmt1(s.answerRate)}%</b> ל-<b>${fmt1(newAnswer)}%</b> (+${fmt1(dAnswer)} נקודות) — יותר לידים שעונים ⟵ יותר שיחות ⟵ יותר סגירות`,
      warning: !realistic ? `אחוז מענה של ${fmt1(newAnswer)}% גבוה מאוד — צריך פולואפ אגרסיבי וטכניקות נוספות` : '',
    });
  }

  // ג. תעלה מחיר הקמה
  if(projFromNow>0){
    const dSetup = gap / (projFromNow * (1 - c.commPct - c.procPct));
    const realistic = dSetup>0 && dSetup<=s.setupFee*0.5;
    if(dSetup>0){
      recs.push({
        icon:'wallet', color:'green', realistic,
        title:'תעלה מחיר הקמה',
        detail:`מ-<b>${money(s.setupFee)}₪</b> ל-<b>${money(s.setupFee+dSetup)}₪</b> (+${money(dSetup)}₪) על כל לקוח חדש שיצטרף מהיום`,
        warning: !realistic ? `העלאה של ${money(dSetup)}₪ בהקמה (+${fmt1(dSetup/s.setupFee*100)}%) — סביר להניח שתפגע בהמרה` : '',
      });
    }
  }

  // ד. תעלה ריטיינר חדשים
  if(projFromNow>0){
    const dRet = gap / (projFromNow * (1 - c.onbCommPct - c.procPct));
    const realistic = dRet>0 && dRet<=c.retainerForNew*0.5;
    if(dRet>0){
      recs.push({
        icon:'repeat', color:'green', realistic,
        title:'תעלה ריטיינר ללקוחות חדשים',
        detail:`מ-<b>${money(c.retainerForNew)}₪</b> ל-<b>${money(c.retainerForNew+dRet)}₪</b> (+${money(dRet)}₪) על כל לקוח חדש שיצטרף מהיום`,
        warning: !realistic ? `העלאה של ${money(dRet)}₪ בריטיינר (+${fmt1(dRet/c.retainerForNew*100)}%) — סביר להניח שתפגע בהמרה` : '',
      });
    }
  }

  // ה. תוסיף איש מכירות
  // נציג רק אם הקיבולת לא מספיקה לסגור את הפער
  const teamSize = Math.max(parseInt(s.teamSize)||1,1);
  const capPerRep = c.callsPerMonthPerRep;
  const closesPerRepPerMonth = capPerRep * c.close;
  const closesPerRepRemaining = closesPerRepPerMonth * (daysLeft/s.daysMonth);
  // כמה אנשי מכירות נוספים יסגרו את הפער?
  if(closesPerRepRemaining>0 && extraClientsNeeded>0){
    const repsNeeded = Math.ceil(extraClientsNeeded / closesPerRepRemaining);
    // האם הקיבולת אמיתית חסומה? בודק אם יש מספיק לידים לאיש מכירות נוסף
    const callsAvailableForExtraRep = leadsRemaining * c.answer / Math.max(teamSize,1); // קירוב
    const realistic = repsNeeded<=3;
    recs.push({
      icon:'users', color:'blue', realistic,
      title:'תוסיף איש מכירות',
      detail:`<b>${repsNeeded}</b> ${repsNeeded>1?'אנשי':'איש'} מכירות ${repsNeeded>1?'נוספים':'נוסף'} ${repsNeeded>1?'יסגרו':'יסגור'} את הפער (כל איש מכירות נוסף = +${fmt1(closesPerRepRemaining)} עסקאות עד סוף החודש באחוז המרה נוכחי)`,
      warning: !realistic ? `${repsNeeded} אנשי מכירות זה הרבה לזמן כזה קצר — קשה לגייס ולהכניס מהר` : '',
    });
  }

  // ו. תקדם לקוחות מההקמה לריטיינר (רק אם יש נתוני הקמה)
  const setupClients = s.setupClients||0;
  if(setupClients>0){
    const profitPerSetup = profitFromOneSetupClient(s);
    if(profitPerSetup>0){
      const setupNeeded = gap/profitPerSetup;
      const enoughInSetup = setupNeeded <= setupClients;
      // ו.1 - רק מההקמה
      if(enoughInSetup){
        recs.push({
          icon:'repeat', color:'green', realistic: true,
          title:'קדם לקוחות מההקמה לריטיינר',
          detail:`קדם <b>${fmt1(setupNeeded)}</b> מתוך ${setupClients} הלקוחות בהקמה → יסגור את כל הפער של ${money(gap)}₪. כל לקוח שמקודם = ${money(profitPerSetup)}₪ רווח (בלי שיווק ועם עמלה חלקית).`,
          warning: '',
        });
      } else {
        // אין מספיק בהקמה - נציע שילוב: כל ההקמה + השלמה מחדשים/קצב
        const fromAllSetup = setupClients * profitPerSetup;
        const remainingGap = gap - fromAllSetup;
        const newToComplete = profitPerNewClient>0 ? remainingGap/profitPerNewClient : Infinity;
        if(isFinite(newToComplete) && newToComplete>0){
          recs.push({
            icon:'repeat', color:'green', realistic: true,
            title:'שילוב: כל ההקמה + השלמה מחדשים',
            detail:`קדם את כל <b>${setupClients}</b> הלקוחות בהקמה (= ${money(fromAllSetup)}₪) + סגור עוד <b>${fmt1(newToComplete)}</b> לקוחות חדשים. סך הכל יסגור את הפער של ${money(gap)}₪.`,
            warning: '',
          });
        }
      }
      // ו.2 - שילוב חכם 1:3 (תמיד יוצג כאופציה נפרדת אם יש בהקמה)
      // מאמץ: setupTaken×1 + newTaken×3, בכפוף לכך שיסגרו את הפער
      let smartSetup = 0, smartNew = 0;
      const setupEffRatio = profitPerSetup / 1;
      const newEffRatio = profitPerNewClient / 3;
      if(setupEffRatio >= newEffRatio){
        smartSetup = Math.min(setupClients, gap/profitPerSetup);
        smartNew = Math.max(0, (gap - smartSetup*profitPerSetup)/profitPerNewClient);
      } else {
        smartSetup = Math.min(setupClients, gap*0.3/profitPerSetup);
        smartNew = Math.max(0, (gap - smartSetup*profitPerSetup)/profitPerNewClient);
      }
      // נציג רק אם השילוב שונה ממה שהוצע למעלה
      const sameAsAbove = enoughInSetup
        ? Math.abs(smartNew)<0.1
        : (Math.abs(smartSetup-setupClients)<0.1);
      if(!sameAsAbove && (smartSetup>0 || smartNew>0)){
        recs.push({
          icon:'star', color:'blue', realistic: true,
          title:'שילוב חכם — הפתרון הקל ביותר',
          detail:`<b>${fmt1(smartSetup)}</b> מההקמה + <b>${fmt1(smartNew)}</b> חדשים (יחס מאמץ של 1:3 — הקמה קלה יותר). סך רווח: ${money(smartSetup*profitPerSetup + smartNew*profitPerNewClient)}₪.`,
          warning: '',
        });
      }
    }
  }

  if(!recs.length) return '';
  // מסדרים: ריאליים קודם
  recs.sort((a,b)=>(b.realistic?1:0)-(a.realistic?1:0));
  return `<div class="card" style="margin-top:14px;border:1px solid rgba(255,107,107,.25);background:rgba(255,107,107,.04)">
    <div class="card-h">
      <h3>המלצות לסגירת הפער מהיום עד סוף החודש ${help('recommendations')}</h3>
      <span class="tag red">פער ${money(gap)}₪</span>
    </div>
    <p style="font-size:13px;color:var(--txt-dim);margin-bottom:12px">בקצב הנוכחי תיפול בלקצוב 0₪. כל אחד מהמהלכים הבאים, לבד, יסגור את הפער. אפשר גם לשלב.</p>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${recs.map(r=>`<div style="background:var(--bg-2);border:1px solid ${r.realistic?'var(--line-soft)':'rgba(247,184,1,.3)'};border-radius:10px;padding:13px 14px;display:flex;align-items:flex-start;gap:12px;${!r.realistic?'opacity:.8':''}">
        <div style="background:var(--${r.color}-soft);color:${COLORS[r.color]};width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${svg(r.icon)}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
            <div style="font-weight:700;font-size:14px">${r.title}</div>
            ${!r.realistic?'<span style="background:rgba(247,184,1,.15);color:var(--amber);font-size:10.5px;padding:1px 7px;border-radius:99px">לא ריאלי לבד</span>':''}
          </div>
          <div style="font-size:13px;color:var(--txt-dim);line-height:1.5">${r.detail}</div>
          ${r.warning?`<div style="font-size:11.5px;color:var(--amber);margin-top:6px;line-height:1.5">${r.warning}</div>`:''}
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}
function actRow4(label,val,target,gap){

    <td style="text-align:center;font-family:'Rubik';font-weight:700;direction:ltr">${val}</td>

}
/* פער צבעוני לטבלה. goodIfLower=true אם פער שלילי טוב */
function actGap(diff,goodIfLower,suffix='',f=fmt){
  if(Math.abs(diff)<0.05) return `<span style="color:var(--accent)">תואם</span>`;
  const good=goodIfLower? diff<=0 : diff>=0;
  return `<span style="color:${good?'var(--accent)':'var(--red)'};font-weight:700">${diff>0?'+':''}${f(diff)}${suffix}</span>`;
}
function setLabel(input){
  const key=input.dataset.lblkey; const val=input.value.trim();
  if(!state.labels) state.labels={};
  if(val) state.labels[key]=val; else delete state.labels[key];
  saveState(); toast('השם נשמר'); autoSizeInputs();
}

/* מעדכן רק את אזורי התוצאה במסך הצוות — שדות הקלט לא נוגעים */
function refreshSalesDerived(){
  const c=compute(); const plan=planFromClients(clientsForProfit(state.goalProfit));
  const reps=state.reps;
  const avgRepClose=reps.length? reps.reduce((a,r)=>a+(parseFloat(r.closeRate)||0),0)/reps.length : state.closeRate;
  const lagging=reps.filter(r=>(parseFloat(r.closeRate)||0)<state.closeRate);
  const set=(id,html)=>{const e=document.getElementById(id); if(e)e.innerHTML=html;};

  set('salesLagging', lagging.length
    ? `<div class="notice warn">${svg('info')}<div><b>שים לב:</b> ${lagging.map(r=>r.name).join(', ')} ${lagging.length>1?'נמצאים':'נמצא'} מתחת לאחוז הסגירה של היעד (${state.closeRate}%). זה מסכן את יעד החברה — צריך להעלות אחוז סגירה או להזרים יותר לידים.</div></div>`
    : '');

  // שני אחוזי המרה
  const baseEff=c.effConv*100, actualEff=(state.answerRate/100)*(avgRepClose/100)*100;
  const actualClients=plan.leads*(actualEff/100); const actualPlan=planFromClients(actualClients);

  set('salesTwoConv', `<div class="split" style="gap:14px">

        <div style="font-family:'Rubik';font-size:30px;font-weight:800;color:var(--accent);direction:ltr;text-align:right">${fmt1(baseEff)}%</div>

      </div>
      <div style="background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;padding:16px">
        <div style="display:flex;align-items:center;gap:8px;color:var(--txt-dim);font-size:12.5px;margin-bottom:6px"><span style="color:${behind?'var(--red)':'var(--blue)'}">${svg('users')}</span> אחוז המרה בפועל (ממוצע הצוות)</div>
        <div style="font-family:'Rubik';font-size:30px;font-weight:800;color:${behind?'var(--red)':'var(--blue)'};direction:ltr;text-align:right">${fmt1(actualEff)}%</div>
        <div class="hint">${state.answerRate}% מענה × ${fmt1(avgRepClose)}% סגירה ממוצע · בפועל ${fmt1(actualClients)} לקוחות</div>
      </div></div>
    ${behind? `<div class="notice warn" style="margin-top:14px;margin-bottom:0">${svg('info')}<div>אחוז ההמרה בפועל (<b>${fmt1(actualEff)}%</b>) נמוך מהיעד (<b>${fmt1(baseEff)}%</b>). באותו תקציב תקבל <b>${fmt1(actualClients)}</b> לקוחות במקום ${fmt1(plan.clients)} — פער של <b>${money(plan.operating-actualPlan.operating)}₪</b> ברווח.</div></div>`
      : `<div class="notice ok" style="margin-top:14px;margin-bottom:0">${svg('info')}<div>הצוות עומד באחוז ההמרה של היעד.</div></div>`}`);

  set('salesKpis',
    kpiTile('מקסימום שיחות ביום לנציג','phone','blue',c.callsPerDayPerRep,'','לפי '+state.callMin+' דק׳ לשיחה, '+state.workHoursDay+' שעות ביום','')+
    kpiTile('מקסימום שיחות בחודש לנציג','repeat','purple',fmt(c.callsPerMonthPerRep),'','לפי '+state.workDaysMonth+' ימי עבודה בחודש','')+
    kpiTile('מקסימום שיחות שכל הצוות יכול לבצע בחודש','users','green',fmt(c.callsPerMonthPerRep*Math.max(parseInt(state.teamSize)||1,1)),'שיחות',Math.max(parseInt(state.teamSize)||1,1)+' נציגים יחד','capacity')+
    kpiTile('כמה נציג מרוויח על כל עסקה','wallet','amber',money(c.commCost),'₪',state.salesCommPct+'% ממחיר ההקמה','')+
    kpiTile('סך כל העמלות לתשלום בחודש','money','green',money(plan.commTotal),'₪','עבור '+fmt1(plan.clients)+' עסקאות',''));

  // חלוקה שווה לפי כמות אנשי מכירות
  const n=Math.max(parseInt(state.teamSize)||1,1);

  set('teamEqual', `<div class="statlist">

  // חלוקה משוקללת לפי ביצועים

  const capacity=c.callsPerMonthPerRep; // קיבולת מקסימלית של שיחות שענו לאיש בחודש
  let anyOver=false;
  const rowsHtml=reps.map((r,i)=>{
    const share=sumW>0?weights[i]/sumW:1/reps.length; const rc=plan.clients*share;
    const rClose=(parseFloat(r.closeRate)||0)/100;
    const callsNeeded= rClose>0 ? rc/rClose : 0;   // שיחות שענו שצריך כדי לסגור rc לקוחות
    const over= callsNeeded>capacity;
    if(over) anyOver=true;
    const low=(parseFloat(r.closeRate)||0)<state.closeRate;
    return `<tr>
      <td style="font-size:13.5px">${r.name}</td>
      <td style="text-align:center"><span class="tag ${low?'red':'green'}">${r.closeRate}%</span></td>
      <td style="text-align:center;font-family:'Rubik';font-weight:700;direction:ltr">${fmt1(rc)} <span style="font-size:11px;color:var(--txt-faint)">(${fmt1(rc/state.daysMonth)}/יום)</span></td>
      <td style="text-align:center;font-family:'Rubik';font-weight:700;direction:ltr;color:${over?'var(--red)':'var(--txt)'}">${fmt(callsNeeded)}${over?' ⚠':''} <span style="font-size:11px;color:var(--txt-faint)">(${fmt1(callsNeeded/state.daysMonth)}/יום)</span></td>

  set('teamWeighted', `<table class="kpi-table">

      <tbody>${rowsHtml}</tbody>
    </table>
    ${anyOver? `<div class="notice warn" style="margin-top:12px;margin-bottom:0">${svg('info')}<div><b>אזהרת קיבולת:</b> מישהו צריך יותר שיחות ממה שאפשר פיזית (מקסימום ${fmt(capacity)} בחודש לאיש). היעד של החברה שמתחלק עליו לא ריאלי באחוז הסגירה הנוכחי — צריך להעלות לו את אחוז הסגירה, או להוסיף איש מכירות שיחלוק את העומס.</div></div>`
      : `<div class="hint" style="margin-top:10px">✓ כל אחד בתוך הקיבולת הפיזית (מקסימום ${fmt(capacity)} שיחות בחודש לאיש).</div>`}`);

  // סיכום אישי מול חברה
  const totalPersonal=reps.reduce((a,r)=>a+(c.commCost>0?(parseFloat(r.commGoal)||0)/c.commCost:0),0);
  const companyNeed=plan.clients; const covered=totalPersonal>=companyNeed; const gap=companyNeed-totalPersonal;

        <div class="tag ${covered?'green':'red'}" style="font-size:13px">${covered?'✓ היעדים מכסים את החברה':'✗ חסר '+fmt1(gap)+' עסקאות'}</div>

    </div>`);
  autoSizeInputs();
}

/* עדכון ערך של איש מכירות — בלי רנדור מחדש (מתקן את באג הפוקוס) */
function updateRep(id,field,val){
  const r=state.reps.find(x=>x.id===id); if(!r)return;
  r[field]= field==='name'? val : (parseFloat(val)||0);

}

/* חישוב כל הנתונים של איש מכירות (מופרד מהרינדור) */
function repCalc(r){
  const c=compute();
  const commCost=c.commCost;
  const repClose=(parseFloat(r.closeRate)||0)/100;
  const repEff=repClose*c.answer;
  const p_deals=commCost>0 ? r.commGoal/commCost : 0;
  const p_calls=repClose>0 ? p_deals/repClose : 0;
  const p_leads=repEff>0 ? p_deals/repEff : 0;
  const p_marketing=p_leads*state.costPerLead;
  const plan=planFromClients(clientsForProfit(state.goalProfit));
  const reps=state.reps; const weights=reps.map(x=>Math.max(parseFloat(x.closeRate)||0,1));
  const sumW=weights.reduce((a,b)=>a+b,0); const myW=Math.max(parseFloat(r.closeRate)||0,1);
  const myShare=sumW>0?myW/sumW:1/reps.length;
  const co_deals=plan.clients*myShare;
  const co_calls=repClose>0 ? co_deals/repClose : 0;
  const co_leads=repEff>0 ? co_deals/repEff : 0;
  const co_marketing=co_leads*state.costPerLead;
  const co_comm=co_deals*commCost;
  const daysLeft=Math.max(state.daysMonth-r.daysPassed,0);
  const pace=r.daysPassed>0 ? r.closedDeals/r.daysPassed : 0;
  const projected=pace*state.daysMonth;
  // מעקב מול היעד האישי
  const p_remaining=Math.max(p_deals-r.closedDeals,0);
  const p_perDay=daysLeft>0 ? p_remaining/daysLeft : p_remaining;
  const p_onTrack=projected>=p_deals;
  const p_pct=p_deals>0 ? projected/p_deals*100 : 0;
  // מעקב מול החלק ביעד החברה
  const co_remaining=Math.max(co_deals-r.closedDeals,0);
  const co_perDay=daysLeft>0 ? co_remaining/daysLeft : co_remaining;
  const co_onTrack=projected>=co_deals;
  const co_pct=co_deals>0 ? projected/co_deals*100 : 0;
  const companyClose=state.closeRate;
  const belowCompany=(parseFloat(r.closeRate)||0)<companyClose;
  const gap=co_deals-p_deals;
  const p_dealsPerDay=p_deals/state.daysMonth; // מכירות ביום לפי היעד האישי
  return {c,commCost,p_deals,p_calls,p_leads,p_marketing,p_comm:r.commGoal,co_deals,co_calls,
    co_leads,co_marketing,co_comm,daysLeft,pace,projected,
    p_remaining,p_perDay,p_onTrack,p_pct,co_remaining,co_perDay,co_onTrack,co_pct,
    companyClose,belowCompany,gap,p_dealsPerDay};
}

/* מצב מקומי למסך תובנות - נשמר במצב הגלובלי */
function ensureInsightsState(){
  if(!state.insights) state.insights = {};
  if(state.insights.moveDetectionMonthsBack == null) state.insights.moveDetectionMonthsBack = 6;
  if(state.insights.moveBeforeAfterWindow == null) state.insights.moveBeforeAfterWindow = 3;
  if(state.insights.moveThreshold == null) state.insights.moveThreshold = 15; // אחוז שינוי
  if(state.insights.insightsCompareWindow == null) state.insights.insightsCompareWindow = 3;
  if(state.insights.insightsTrendWindow == null) state.insights.insightsTrendWindow = 3;
  if(state.insights.recoForwardMonths == null) state.insights.recoForwardMonths = 6;
  if(state.insights.recoAvgWindow == null) state.insights.recoAvgWindow = 3;
}

/* פרמטרים שהמערכת בודקת לזיהוי מהלכים */
const TRACKED_PARAMS = [
  {key:'setupAvg', label:'מחיר הקמה ממוצע', icon:'wallet', unit:'₪', 
   getter:m=>m.setupAvg, betterIf:'higher'},
  {key:'salesCommPct', label:'אחוז עמלת מכירה', icon:'percent', unit:'%',
   getter:m=>m.salesCommPct, betterIf:'lower'},
  {key:'retainerAvgActive', label:'ריטיינר ממוצע פעילים', icon:'wallet', unit:'₪',
   getter:m=>m.retainerAvgActive, betterIf:'higher'},
  {key:'closes', label:'כמות סגירות', icon:'users', unit:'',
   getter:m=>m.closes, betterIf:'higher'},
  {key:'closeRate', label:'אחוז סגירה', icon:'target', unit:'%',
   getter:m=>m.closes && m.leads ? (m.closes/m.leads)*100 : null, betterIf:'higher'},
  {key:'budget', label:'תקציב שיווק', icon:'wallet', unit:'₪',
   getter:m=>m.budget, betterIf:'lower'},
  {key:'churnRate', label:'אחוז שחיקה', icon:'trend', unit:'%',
   getter:m=>m.churn && m.activeStartMonth ? (m.churn/m.activeStartMonth)*100 : null, betterIf:'lower'},
];

/* זיהוי מהלכים: עוברים על היסטוריה ומחפשים שינויים של יותר מ-threshold% */
function detectMoves(){
  ensureInsightsState();
  const monthsBack = state.insights.moveDetectionMonthsBack;
  const threshold = state.insights.moveThreshold;
  const allMonths = [];
  if(state.mondayRaw && state.mondayRaw.current) allMonths.push({...state.mondayRaw.current, monthName:'החודש'});
  if(state.mondayRaw && state.mondayRaw.history){
    state.mondayRaw.history.forEach((m,i)=> allMonths.push({...m, monthName:i===0?'חודש שעבר':`לפני ${i+1} חודשים`}));
  }
  const slice = allMonths.slice(0, monthsBack+1);
  if(slice.length < 2) return [];
  const moves = [];
  // עוברים מהחודש הישן ביותר לחדש ביותר - מחפשים שינויים בין חודשים סמוכים
  for(let i = slice.length-1; i > 0; i--){
    const prev = slice[i];   // ישן יותר
    const curr = slice[i-1]; // חדש יותר
    TRACKED_PARAMS.forEach(p => {
      const prevVal = p.getter(prev);
      const currVal = p.getter(curr);
      if(prevVal==null || currVal==null || prevVal===0) return;
      const pctChange = ((currVal - prevVal) / prevVal) * 100;
      if(Math.abs(pctChange) >= threshold){
        moves.push({
          param: p,
          fromValue: prevVal,
          toValue: currVal,
          pctChange,
          monthIndex: i-1,  // אינדקס של החודש שבו זוהה השינוי
          monthName: curr.monthName,
          previousMonthName: prev.monthName,
        });
      }
    });
  }
  return moves;
}

/* ניתוח אם מהלך השתלם: השוואת לפני ואחרי */
function analyzeMoveImpact(move){
  const window = state.insights.moveBeforeAfterWindow;
  const allMonths = [];
  if(state.mondayRaw && state.mondayRaw.current) allMonths.push(state.mondayRaw.current);
  if(state.mondayRaw && state.mondayRaw.history){
    state.mondayRaw.history.forEach(m => allMonths.push(m));
  }
  const moveIdx = move.monthIndex;
  // "לפני" = window חודשים לפני המהלך (כולל החודש שלפני המהלך עצמו)
  const before = allMonths.slice(moveIdx+1, moveIdx+1+window);
  // "אחרי" = window חודשים החל מהמהלך (כולל החודש שהמהלך התרחש בו)
  const after = allMonths.slice(Math.max(0, moveIdx-window+1), moveIdx+1);
  if(before.length === 0 || after.length === 0) return null;
  const avg = (arr, getter) => {
    const vals = arr.map(getter).filter(v=>v!=null && !isNaN(v));
    if(!vals.length) return 0;
    return vals.reduce((a,b)=>a+b,0)/vals.length;
  };
  // מטריקות מפתח להשוואה
  const metrics = {
    closes: { before: avg(before, m=>m.closes), after: avg(after, m=>m.closes), label:'סגירות' },
    setupAvg: { before: avg(before, m=>m.setupAvg), after: avg(after, m=>m.setupAvg), label:'מחיר הקמה' },
    revenue: { before: avg(before, m=>(m.retainersIncomeSoFar||0)+(m.setupIncomeSoFar||0)),
               after: avg(after, m=>(m.retainersIncomeSoFar||0)+(m.setupIncomeSoFar||0)), label:'מחזור' },
    churnRate: { before: avg(before, m=>m.churn&&m.activeStartMonth?(m.churn/m.activeStartMonth)*100:0),
                 after: avg(after, m=>m.churn&&m.activeStartMonth?(m.churn/m.activeStartMonth)*100:0), label:'אחוז שחיקה' },
    activeEnd: { before: avg(before, m=>m.activeEndMonth), after: avg(after, m=>m.activeEndMonth), label:'לקוחות פעילים' },
  };
  // חישוב מצטבר ל-12 חודשים: נחשב LTV של לקוח ממוצע לפני ואחרי, ונכפיל בקצב הגיוס
  const c = compute(state);
  const ltvBefore = computeLTVForScenario({
    setupFee: metrics.setupAvg.before,
    salesCommPct: c.commPct*100,
    retainer: metrics.revenue.before > 0 ? state.retainer : state.retainer,
    churnRate: metrics.churnRate.before,
    closesPerMonth: metrics.closes.before,
  });
  const ltvAfter = computeLTVForScenario({
    setupFee: metrics.setupAvg.after,
    salesCommPct: c.commPct*100,
    retainer: state.retainer,
    churnRate: metrics.churnRate.after,
    closesPerMonth: metrics.closes.after,
  });
  // נקודת איזון
  const monthlyDiff = ltvAfter.monthlyContribution - ltvBefore.monthlyContribution;
  const initialDiff = ltvAfter.firstMonthRevenue - ltvBefore.firstMonthRevenue;
  let breakEvenMonths = null;
  if(monthlyDiff > 0 && initialDiff < 0){
    breakEvenMonths = Math.abs(initialDiff) / monthlyDiff;
  } else if(monthlyDiff >= 0 && initialDiff >= 0){
    breakEvenMonths = 0; // משתלם מההתחלה
  } else if(monthlyDiff < 0){
    breakEvenMonths = -1; // לעולם לא משתלם
  }
  return { before, after, metrics, ltvBefore, ltvAfter, breakEvenMonths, monthlyDiff, initialDiff };
}

/* חישוב LTV של תרחיש */
function computeLTVForScenario({setupFee, salesCommPct, retainer, churnRate, closesPerMonth}){
  const c = compute(state);
  const setupNet = setupFee * (1 - salesCommPct/100);
  const retainerNet = retainer * (1 - c.onbCommPct - c.procPct);
  const avgMonths = churnRate > 0 ? 100/churnRate : 60;
  const ltvPerClient = setupNet + (retainerNet * avgMonths);
  const firstMonthRevenue = setupNet * closesPerMonth;
  const monthlyContribution = retainerNet * closesPerMonth;  // הריטיינר שמצטבר כל חודש
  return { ltvPerClient, firstMonthRevenue, monthlyContribution, avgMonths };
}

/* תובנות על המצב הנוכחי - חולשות וחוזקות */
function generateInsights(){
  ensureInsightsState();
  const compareWindow = state.insights.insightsCompareWindow;
  const trendWindow = state.insights.insightsTrendWindow;
  const insights = { strengths: [], weaknesses: [] };
  if(!state.mondayRaw || !state.mondayRaw.history || state.mondayRaw.history.length < 1) return insights;
  const current = state.mondayRaw.current;
  const hist = state.mondayRaw.history;
  // ממוצע השוואה
  const compareSlice = hist.slice(0, compareWindow);
  const avg = (arr, getter) => {
    const vals = arr.map(getter).filter(v=>v!=null && !isNaN(v));
    if(!vals.length) return 0;
    return vals.reduce((a,b)=>a+b,0)/vals.length;
  };
  const metrics = [
    {name:'אחוז סגירה', getter:m=>m.closes && m.leads ? (m.closes/m.leads)*100 : null, betterIf:'higher', unit:'%', precision:1},
    {name:'אחוז שחיקה', getter:m=>m.churn && m.activeStartMonth ? (m.churn/m.activeStartMonth)*100 : null, betterIf:'lower', unit:'%', precision:1},
    {name:'ריטיינר ממוצע', getter:m=>m.retainerAvgActive, betterIf:'higher', unit:'₪', precision:0},
    {name:'מחיר הקמה ממוצע', getter:m=>m.setupAvg, betterIf:'higher', unit:'₪', precision:0},
    {name:'כמות סגירות', getter:m=>m.closes, betterIf:'higher', unit:'', precision:1},
    {name:'כמות לידים', getter:m=>m.leads, betterIf:'higher', unit:'', precision:0},
    {name:'מחיר ליד', getter:m=>m.leads&&m.budget?m.budget/m.leads:null, betterIf:'lower', unit:'₪', precision:1},
    {name:'לקוחות שהצטרפו לריטיינר', getter:m=>m.joinedRetainer, betterIf:'higher', unit:'', precision:0},
  ];
  metrics.forEach(metric => {
    const currVal = metric.getter(current);
    const avgVal = avg(compareSlice, metric.getter);
    if(currVal==null || avgVal==null || avgVal===0) return;
    const pctChange = ((currVal - avgVal) / avgVal) * 100;
    if(Math.abs(pctChange) < 5) return; // לא משמעותי
    const isImprovement = metric.betterIf === 'higher' ? pctChange > 0 : pctChange < 0;
    const target = isImprovement ? insights.strengths : insights.weaknesses;
    target.push({
      metric: metric.name,
      currentValue: currVal,
      averageValue: avgVal,
      pctChange,
      unit: metric.unit,
      precision: metric.precision,
      betterIf: metric.betterIf,
    });
  });
  // מגמות (ביחס לכל ההיסטוריה - trendWindow)
  const trendSlice = hist.slice(0, trendWindow);
  if(trendSlice.length >= 2){
    metrics.forEach(metric => {
      const firstVal = metric.getter(trendSlice[trendSlice.length-1]);
      const lastVal = metric.getter(trendSlice[0]);
      if(firstVal==null || lastVal==null || firstVal===0) return;
      const trendPct = ((lastVal - firstVal) / firstVal) * 100;
      if(Math.abs(trendPct) < 10) return;
      const isImprovingTrend = metric.betterIf === 'higher' ? trendPct > 0 : trendPct < 0;
      const target = isImprovingTrend ? insights.strengths : insights.weaknesses;
      // לא נכפיל אם כבר קיים
      if(!target.find(x => x.metric === metric.name)){
        target.push({
          metric: metric.name + ' (מגמה)',
          currentValue: lastVal,
          averageValue: firstVal,
          pctChange: trendPct,
          unit: metric.unit,
          precision: metric.precision,
          betterIf: metric.betterIf,
          isTrend: true,
        });
      }
    });
  }
  return insights;
}

• רווח כיום: <b>${money(before)}₪</b><br>
• רווח אחרי המהלך: <b>${money(after)}₪</b><br>
• הפרש: <b style="color:var(--accent)">+${money(delta)}₪</b>`,
      });
    }
  }

  // === המלצה 4: תוספת נציג מכירות ===
  const callsPerDay = state.workHoursPerDay * 60 / state.callMinutes;
  const monthlyCapacity = state.teamSize * callsPerDay * state.daysMonth;
  const monthlyDemand = state.leads;
  if(monthlyDemand > monthlyCapacity * 0.85){
    const extraCalls = callsPerDay * state.daysMonth;
    const extraCloses = extraCalls * c.close;
    const impact = extraCloses * profitFromOneNewClient();
    if(impact > 0){
      recos.push({
        title:'הוסף נציג מכירות לצוות',
        oneLiner:`תוספת נציג ל-${state.teamSize+1} נציגים (כיום ${state.teamSize})`,
        why:`הצוות הנוכחי בקרוב לקיבולת מלאה (${fmt1(monthlyDemand/monthlyCapacity*100)}% תפוסה). נציג נוסף = עוד ${fmt(extraCalls)} שיחות בחודש = עוד ${fmt1(extraCloses)} סגירות פוטנציאליות.`,
        risk:`עלות שכר נוסף. לוקח 1-2 חודשים להכשרת נציג חדש לקצב מלא.`,
        impact:impact,
        impactLabel:'תוספת חודשית פוטנציאלית',
        calcExplanation:`
<b>הקו מחשבה:</b><br><br>
הצוות שלך לא מסוגל לקבל יותר שיחות. אם תקבל יותר לידים בלי תוספת כוח אדם, חלקם פשוט לא ייענו. נציג נוסף = יותר שיחות = יותר סגירות.<br><br>

<b>הנתונים שלך:</b><br><br>
• צוות נוכחי: <b>${state.teamSize} נציגים</b><br>
• שעות עבודה ליום: <b>${state.workHoursPerDay}</b><br>
• דקות לשיחה: <b>${state.callMinutes}</b><br>
• ימי עבודה בחודש: <b>${state.daysMonth}</b><br>
• אחוז סגירה: <b>${fmt1(c.close*100)}%</b><br><br>

<b>החישוב:</b><br><br>
נציג נוסף יכול לבצע = ${state.workHoursPerDay} שעות × 60 דקות ÷ ${state.callMinutes} דקות לשיחה = ${fmt1(state.workHoursPerDay*60/state.callMinutes)} שיחות ליום<br>
× ${state.daysMonth} ימי עבודה = <b>${fmt(extraCalls)} שיחות בחודש</b><br><br>
× ${fmt1(c.close*100)}% סגירה = <b>${fmt1(extraCloses)} סגירות נוספות בחודש</b><br><br>
× ${money(profitFromOneNewClient())}₪ רווח חודש ראשון מכל לקוח = <b style="color:var(--accent)">+${money(impact)}₪ חודשי</b><br><br>
זה רק רווח חודש ראשון - הריטיינר של הלקוחות הללו יצטבר לאורך זמן.`,
      });
    }
  }

  // מיון לפי השפעה (רק חיוביים)
  return recos.filter(r => r.impact > 0).sort((a,b) => b.impact - a.impact);
}

/* מטא: זיהוי שינויים בכל חודש לפי האייקון של תזוזה */
function moveSymbol(pctChange, betterIf){
  const isPositive = pctChange > 0;
  const isImprovement = betterIf === 'higher' ? isPositive : !isPositive;
  return isImprovement ? '↑' : '↓';
}

/* ============================================================
   רינדור מסך תובנות
============================================================ */
function renderInsights(){
  ensureInsightsState();
  const isn = state.insights;
  const totalHistory = (state.mondayRaw && state.mondayRaw.history) ? state.mondayRaw.history.length + 1 : 1;
  const monthOpts = (current, max) => {
    let opts = '';
    for(let i=1; i<=Math.min(max, 12); i++){
      const sel = current===i ? 'selected' : '';
      opts += `<option value="${i}" ${sel}>${i===1?'חודש אחרון':i+' חודשים'}</option>`;
    }
    return opts;
  };
  const dd = (key, current, max, label) => `
    <div style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--txt-faint)">
      <span>${label}:</span>
      <select onchange="changeInsightsParam('${key}', this.value)" style="background:var(--bg-1);color:var(--txt);border:1px solid var(--line-soft);border-radius:5px;padding:2px 6px;font-size:11px">${monthOpts(current, max)}</select>
    </div>`;

  // === הוספת HELP entries דינמית למהלכים והמלצות ===
  // לא נכניס ל-HELP הגלובלי, נשתמש בקול-בק

  // === חלק 1: מהלכים שזוהו ===
  const moves = detectMoves();
  const movesByMonth = {};
  moves.forEach(mv => {
    if(!movesByMonth[mv.monthName]) movesByMonth[mv.monthName] = [];
    movesByMonth[mv.monthName].push(mv);
  });
  // אחסון אנליזות לתצוגה ב-HELP
  window._insightAnalyses = {};

  let movesHtml = '';
  if(moves.length === 0){
    movesHtml = `<div class="hint" style="padding:14px;text-align:center;font-size:13.5px">לא זוהו מהלכים משמעותיים (מעל ${isn.moveThreshold}% שינוי). הורד את הסף בדרופדאון למעלה כדי לראות מהלכים קטנים יותר.</div>`;
  } else {
    // === ניתוח לכל מהלך בנפרד ===
    // לכל מהלך נחשב את ההשפעה שלו לבד - בלי לערבב עם מהלכים אחרים שאולי קרו באותו חודש
    movesHtml = moves.map((mv, idx) => {
      const c = compute(state);
      const avgMonths = state.avgMonths || (state.churnRate > 0 ? 100/state.churnRate : 30);
      const window = state.insights.moveBeforeAfterWindow;

      // נסחי פעולה לפי הפרמטר
      const verbForParam = {
        setupAvg: mv.pctChange < 0 ? 'הורדת את מחיר ההקמה הממוצע' : 'העלית את מחיר ההקמה הממוצע',
        salesCommPct: mv.pctChange < 0 ? 'הורדת את אחוז עמלת המכירה' : 'העלית את אחוז עמלת המכירה',
        retainerAvgActive: mv.pctChange < 0 ? 'הורדת את הריטיינר הממוצע' : 'העלית את הריטיינר הממוצע',
        closes: mv.pctChange < 0 ? 'סגרת פחות לקוחות' : 'סגרת יותר לקוחות',
        closeRate: mv.pctChange < 0 ? 'אחוז הסגירה ירד' : 'אחוז הסגירה עלה',
        budget: mv.pctChange < 0 ? 'הורדת את תקציב השיווק' : 'העלית את תקציב השיווק',
        churnRate: mv.pctChange < 0 ? 'אחוז השחיקה ירד' : 'אחוז השחיקה עלה',
      };
      const verb = verbForParam[mv.param.key] || `${mv.param.label} השתנה`;

      // === הסבר ההשפעה לכל מהלך בנפרד ===
      const impactData = analyzeMoveImpact(mv);
      const setupNow = state.setupFee;
      const commPctNow = c.commPct;

      // === נתונים מהמאנדיי ===
      // "אחרי" = החודש הספציפי שבו המהלך קרה (הערך בפועל, לא ממוצע מטושטש)
      // "לפני" = ממוצע החודשים שלפני המהלך (שם זה יציב)
      const allMonthsList = [];
      if(state.mondayRaw && state.mondayRaw.current) allMonthsList.push(state.mondayRaw.current);
      if(state.mondayRaw && state.mondayRaw.history) state.mondayRaw.history.forEach(m=>allMonthsList.push(m));
      const moveMonth = allMonthsList[mv.monthIndex] || {};

      // הסגירות והתקציב של החודש שבו המהלך קרה - בפועל
      const realClosesAfter = moveMonth.closes != null ? moveMonth.closes : (impactData ? impactData.metrics.closes.after : 0);
      const budgetAfter = moveMonth.budget != null ? moveMonth.budget : 0;
      // לפני = ממוצע החודשים שלפני המהלך
      const realClosesBefore = impactData ? impactData.metrics.closes.before : 0;
      const avgBudgetBefore = () => {
        if(!impactData) return 0;
        const vals = impactData.before.map(m=>m.budget).filter(v=>v!=null && !isNaN(v));
        return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
      };
      const budgetBefore = avgBudgetBefore();

      // ערכי בסיס - לשני התרחישים זהים, רק הפרמטר שהשתנה שונה
      let oldSetup = setupNow, newSetup = setupNow;
      let oldCommPct = commPctNow, newCommPct = commPctNow;
      let oldRetainer = c.retainerForNew, newRetainer = c.retainerForNew;

      if(mv.param.key === 'setupAvg'){
        oldSetup = mv.fromValue;
        newSetup = mv.toValue;
      } else if(mv.param.key === 'salesCommPct'){
        oldCommPct = mv.fromValue/100;
        newCommPct = mv.toValue/100;
      } else if(mv.param.key === 'retainerAvgActive'){
        oldRetainer = mv.fromValue;
        newRetainer = mv.toValue;
      }

      // === חישוב כמות לקוחות לפי עלות גיוס (CAC) ===
      // הרעיון: המהלך לא נמדד לפי כמה לקוחות גויסו (החודש לא נגמר),
      // אלא לפי כמה *עולה* לגייס לקוח. אם הורדת הקמה -> יותר אנשים סוגרים -> CAC נמוך יותר
      // -> מאותו תקציב שיווק מגייסים יותר לקוחות.
      // CAC = תקציב שיווק ÷ כמות סגירות (לכל תקופה - התקציב האמיתי שלה)
      const isSetupMove = (mv.param.key === 'setupAvg');
      let cacBefore = (budgetBefore > 0 && realClosesBefore > 0) ? budgetBefore/realClosesBefore : c.acqCost;
      let cacAfter = (budgetAfter > 0 && realClosesAfter > 0) ? budgetAfter/realClosesAfter : c.acqCost;
      const useCac = isSetupMove && cacBefore > 0 && cacAfter > 0 && budgetBefore > 0 && budgetAfter > 0;

      // כמות לקוחות = הסגירות האמיתיות של כל תקופה (לפי התקציב האמיתי שלה)
      // עלות הגיוס היא יחס (תקציב÷סגירות), והתקציב לא משפיע עליה - אז כל תקופה עם הנתון האמיתי שלה
      let oldClosesPerMonth, newClosesPerMonth;
      oldClosesPerMonth = realClosesBefore;
      newClosesPerMonth = realClosesAfter;
      // התקציב של כל תקופה (לתצוגה)
      const budgetOld = budgetBefore;
      const budgetNew = budgetAfter;

      // נחשב את רווח הלקוח לפני ואחרי (נטו)
      const setupNetOld = oldSetup * (1 - oldCommPct);
      const setupNetNew = newSetup * (1 - newCommPct);
      const retainerNetOld = oldRetainer * (1 - c.onbCommPct - c.procPct);
      const retainerNetNew = newRetainer * (1 - c.onbCommPct - c.procPct);
      const ltvOld = setupNetOld + (retainerNetOld * avgMonths);
      const ltvNew = setupNetNew + (retainerNetNew * avgMonths);
      const monthlyOld = ltvOld * oldClosesPerMonth;
      const monthlyNew = ltvNew * newClosesPerMonth;
      const monthlyDelta = monthlyNew - monthlyOld;

      // נקודת איזון: הפסד מההקמה פר חודש ÷ רווח חודשי נוסף מהריטיינרים של הלקוחות הנוספים
      const initialLossPerMonth = (setupNetOld - setupNetNew) * Math.min(oldClosesPerMonth, newClosesPerMonth);
      const extraClients = newClosesPerMonth - oldClosesPerMonth;
      const monthlyGainFromExtra = extraClients * retainerNetNew;
      let breakEvenText = '';
      let verdict = '', verdictColor = 'var(--txt-faint)';

      if(monthlyDelta >= 0){
        verdict = 'המהלך משתלם';
        verdictColor = 'var(--accent)';
        if(initialLossPerMonth > 0 && monthlyGainFromExtra > 0){
          const breakEvenMonths = initialLossPerMonth / monthlyGainFromExtra;
          breakEvenText = `נקודת איזון (מתי המהלך נהיה רווחי): הפסד מההקמה ÷ רווח חודשי מלקוחות נוספים = ${money(initialLossPerMonth)} ÷ ${money(monthlyGainFromExtra)} = <b>חודש ${fmt1(breakEvenMonths)}</b>.`;
          verdict = `משתלם תוך ${fmt1(breakEvenMonths)} חודשים`;
          verdictColor = 'var(--amber)';
        } else {
          breakEvenText = 'המהלך משתלם מיד - יותר רווח כולל כבר מהחודש הראשון.';
        }
      } else {
        verdict = 'המהלך לא משתלם';
        verdictColor = 'var(--red)';
        breakEvenText = `הרווח החודשי <b>ירד</b> ב-${money(Math.abs(monthlyDelta))}₪ פר חודש גיוס. גם בטווח הארוך זה לא מתאזן.`;
      }

      // טקסט גדול וברור
      const headline = `${mv.monthName} ${verb} מ-${fmt1(mv.fromValue)}${mv.param.unit} ל-${fmt1(mv.toValue)}${mv.param.unit}`;

      return `<div style="background:var(--bg-2);border:1px solid var(--line-soft);border-radius:14px;padding:22px;margin-bottom:16px">

        <!-- כותרת המהלך -->
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:18px">
          <div style="flex:1;min-width:260px">
            <div style="font-size:12.5px;color:var(--txt-faint);margin-bottom:6px">${mv.monthName}</div>
            <div style="font-size:17px;line-height:1.5;color:var(--txt);font-weight:600">${headline}.</div>
            <div style="font-size:13px;color:var(--txt-faint);margin-top:6px">שינוי של ${mv.pctChange>=0?'+':''}${fmt1(mv.pctChange)}%</div>
          </div>
          <div style="background:rgba(${verdictColor==='var(--accent)'?'61,220,151':verdictColor==='var(--red)'?'255,107,107':'247,184,1'},.15);padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;color:${verdictColor}">
            ${verdict}
          </div>
        </div>

        <!-- ההסבר המלא, גלוי, כמו בצ'אט -->
        <div style="background:var(--bg-1);border-radius:12px;padding:18px;font-size:14px;line-height:1.9;color:var(--txt-dim)">

          <div style="color:var(--txt);font-weight:600;margin-bottom:10px;font-size:14.5px">3 צעדים לבדיקה אם המהלך השתלם:</div>
          <div style="margin-bottom:6px"><b>1.</b> רווח לקוח בודד = (הקמה − עמלת מכירה) + (ריטיינר נטו × ממוצע חודשי חיים)</div>
          <div style="margin-bottom:6px"><b>2.</b> רווח חודשי = רווח לקוח × כמות לקוחות שמגייסים מאותו תקציב שיווק</div>
          <div style="margin-bottom:16px"><b>3.</b> השוואה בין ישן לחדש = מי שגבוה יותר מנצח</div>

          ${useCac ? `<div style="background:rgba(124,143,255,.08);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;line-height:1.7">
            <b style="color:var(--txt)">למה לפי עלות גיוס לקוח (CAC)?</b><br>
            כי החודש עוד לא נגמר, אז אי אפשר להשוות כמות לקוחות. במקום זה משווים <b>כמה עולה לגייס לקוח אחד</b>.<br><br>
            <b>איך מחושב CAC:</b> תקציב שיווק ÷ כמות לקוחות שנסגרו. כל תקופה עם התקציב האמיתי שלה (גודל התקציב לא משפיע על עלות הגיוס — היא יחס).<br>
            • לפני: ${money(budgetBefore)}₪ תקציב ÷ ${fmt1(realClosesBefore)} סגירות = <b>${money(cacBefore)}₪</b> ללקוח<br>
            • אחרי: ${money(budgetAfter)}₪ תקציב ÷ ${fmt1(realClosesAfter)} סגירות = <b>${money(cacAfter)}₪</b> ללקוח
          </div>` : `<div style="background:rgba(247,184,1,.08);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;line-height:1.7">
            <b style="color:var(--txt)">מבוסס על כמות הסגירות בפועל</b> (אין מספיק נתוני תקציב שיווק לחישוב עלות גיוס). לפני = ממוצע החודשים שלפני המהלך, אחרי = החודש שבו המהלך קרה.
          </div>`}

          <hr style="border:none;border-top:1px solid var(--line-soft);margin:16px 0">

          <div style="color:var(--txt);font-weight:600;margin-bottom:12px;font-size:14.5px">הנתונים שלך:</div>

          <div style="margin-bottom:18px">
            <div style="color:var(--txt);font-weight:600;margin-bottom:6px">לפני המהלך:</div>
            <div>${money(oldSetup)}₪ הקמה × (1 − ${fmt1(oldCommPct*100)}% עמלה) = <b style="color:var(--txt)">${money(setupNetOld)}₪</b> נקי מהקמה</div>
            <div>+ (${money(retainerNetOld)}₪ ריטיינר נטו × ${fmt1(avgMonths)} חודשים) = <b style="color:var(--txt)">${money(retainerNetOld*avgMonths)}₪</b> מריטיינר</div>
            <div>= <b style="color:var(--txt)">${money(ltvOld)}₪ רווח כולל מלקוח</b></div>
            ${useCac
              ? `<div style="margin-top:4px">עלות גיוס לקוח ${money(cacBefore)}₪ → מתקציב ${money(budgetOld)}₪ נסגרו <b style="color:var(--txt)">${fmt1(oldClosesPerMonth)} לקוחות</b></div>`
              : `<div style="margin-top:4px"><b style="color:var(--txt)">${fmt1(oldClosesPerMonth)} לקוחות</b> בחודש</div>`}
            <div>${money(ltvOld)}₪ × ${fmt1(oldClosesPerMonth)} = <b style="color:var(--accent);font-size:16px">${money(monthlyOld)}₪</b></div>
          </div>

          <div style="margin-bottom:18px">
            <div style="color:var(--txt);font-weight:600;margin-bottom:6px">אחרי המהלך:</div>
            <div>${money(newSetup)}₪ הקמה × (1 − ${fmt1(newCommPct*100)}% עמלה) = <b style="color:var(--txt)">${money(setupNetNew)}₪</b> נקי מהקמה</div>
            <div>+ (${money(retainerNetNew)}₪ ריטיינר נטו × ${fmt1(avgMonths)} חודשים) = <b style="color:var(--txt)">${money(retainerNetNew*avgMonths)}₪</b> מריטיינר</div>
            <div>= <b style="color:var(--txt)">${money(ltvNew)}₪ רווח כולל מלקוח</b></div>
            ${useCac
              ? `<div style="margin-top:4px">עלות גיוס לקוח ${money(cacAfter)}₪ → מתקציב ${money(budgetNew)}₪ נסגרו <b style="color:var(--txt)">${fmt1(newClosesPerMonth)} לקוחות</b></div>`
              : `<div style="margin-top:4px"><b style="color:var(--txt)">${fmt1(newClosesPerMonth)} לקוחות</b> בחודש</div>`}
            <div>${money(ltvNew)}₪ × ${fmt1(newClosesPerMonth)} = <b style="color:var(--accent);font-size:16px">${money(monthlyNew)}₪</b></div>
          </div>

          <hr style="border:none;border-top:1px solid var(--line-soft);margin:16px 0">

          <div style="color:var(--txt);font-weight:600;margin-bottom:8px;font-size:14.5px">מי מנצח:</div>
          <div style="margin-bottom:16px;font-size:15px">
            ${monthlyDelta >= 0
              ? `החדש מנצח ב-<b style="color:var(--accent)">${money(monthlyDelta)}₪</b> פר חודש גיוס.`
              : `הישן מנצח ב-<b style="color:var(--red)">${money(Math.abs(monthlyDelta))}₪</b> פר חודש גיוס.`}
          </div>

          <hr style="border:none;border-top:1px solid var(--line-soft);margin:16px 0">

          <div style="color:var(--txt);font-weight:600;margin-bottom:8px;font-size:14.5px">השורה התחתונה:</div>
          <div style="font-size:14px">${breakEvenText}</div>

        </div>
      </div>`;
    }).join('');
  }

  // === חלק 2: תובנות ===
  const insights = generateInsights();
  const insightLine = (item, isStrength) => {
    const color = isStrength ? 'var(--accent)' : 'var(--red)';
    const helpKey = `_insight_${item.metric.replace(/\s/g,'_')}`;
    window._insightAnalyses[helpKey] = {item, type:'insight'};

/* ============================================================
   סימולטור סף עלות גיוס (טרייד-אוף)
   2 מצבים: שינוי ריטיינר / שינוי הקמה
============================================================ */

/* מצב הסימולטור */
let tradeoffState = null;
function ensureTradeoffState(){
  if(!tradeoffState){
    const c = compute(state);
    tradeoffState = {
      mode: 'retainer',                          // 'retainer' או 'setup'
      newRetainer: Math.round(c.retainerForNew * 1.15),  // ברירת מחדל +15%
      newSetup: state.setupFee,                  // ברירת מחדל - אותו מחיר
      salesCommPct: state.salesCommPct,          // עמלת מכירה (ניתנת לשינוי)
      includeSetup: true,                        // האם לכלול הקמה בחישוב
    };
  }
}

/* מקדם הצטברות ריטיינר על N חודשים עם שחיקה */
function retainerCumFactor(N, churnRatePct){
  const ch = (churnRatePct||0)/100;
  let sum = 0, surviving = 1;
  for(let m=0; m<N; m++){ sum += surviving; surviving *= (1-ch); }
  return sum;
}

/* רווח לקוח בודד לאורך N חודשים — בלי עלות הגיוס (אותה מחפשים)
   p = {setupFee, retainer, salesCommPct, onbCommPct, procPct, churnRate}
   includeSetup = האם לכלול את ההקמה בחישוב */
function tradeoffBaseProfit(p, N, includeSetup){
  const salesComm = p.salesCommPct/100;
  const onbComm = p.onbCommPct/100;
  const proc = p.procPct/100;
  // הכנסה חד-פעמית מהקמה (פחות עמלת מכירה, פחות סליקה)
  const setupNet = includeSetup ? (p.setupFee * (1 - salesComm) * (1 - proc)) : 0;
  // אונבורדינג - פעם אחת על הריטיינר
  const onbCost = p.retainer * onbComm;
  // ריטיינר מצטבר על N חודשים, פחות סליקה, עם שחיקה
  const retCumFactor = retainerCumFactor(N, p.churnRate);
  const retainerNet = p.retainer * (1 - proc) * retCumFactor;
  return setupNet - onbCost + retainerNet;
}

/* החישוב המרכזי — מחזיר טבלה לכל אופק זמן */
function computeTradeoff(){
  ensureTradeoffState();
  const ts = tradeoffState;
  const c = compute(state);
  // עלות גיוס נוכחית ותקציב
  const cac0 = c.acqCost;                        // עלות שיווק לגייס לקוח (מהנתונים)
  // תקציב שיווק: כמה שמוציאים על גיוס לקוחות חדשים בחודש
  const newClientsPerMonth = state.leads ? state.leads * c.effConv : 22;
  const budget = cac0 * newClientsPerMonth;       // תקציב שמייצר את הלקוחות הנוכחיים

  // פרמטרים משותפים
  const common = {
    salesCommPct: ts.salesCommPct,
    onbCommPct: state.onboardCommPct || 0,
    procPct: state.processingFeePct || 0,
    churnRate: state.churnRate || 0,
  };

  // הגדרת תרחיש ישן וחדש לפי המצב
  let oldP, newP;
  if(ts.mode === 'retainer'){
    oldP = { ...common, setupFee: state.setupFee, retainer: c.retainerForNew };
    newP = { ...common, setupFee: state.setupFee, retainer: ts.newRetainer };
  } else {
    oldP = { ...common, setupFee: state.setupFee, retainer: c.retainerForNew };
    newP = { ...common, setupFee: ts.newSetup, retainer: c.retainerForNew };
  }

  const horizons = [1, 2, 3, 6, 12];
  const rows = horizons.map(N => {
    const baseOld = tradeoffBaseProfit(oldP, N, ts.includeSetup);
    const baseNew = tradeoffBaseProfit(newP, N, ts.includeSetup);
    // עלות גיוס סף: cac_new = cac0 * baseNew/baseOld
    const cacThreshold = baseOld !== 0 ? cac0 * (baseNew / baseOld) : 0;
    // תוספת רווח אם נשתמש בעלות הגיוס הנוכחית (cac0)
    const clientsOld = budget / cac0;
    const profitOld = clientsOld * (baseOld - cac0);
    const profitNew = clientsOld * (baseNew - cac0);
    const profitDelta = profitNew - profitOld;
    return { N, baseOld, baseNew, cac0, cacThreshold, profitDelta, clientsOld, budget,
             oldP, newP, includeSetup: ts.includeSetup };
  });

  return { rows, cac0, budget, newClientsPerMonth, mode: ts.mode, oldP, newP };
}
