const HELP={
  be:{t:'נקודת איזון (Break-Even)',body:`כמה לקוחות חדשים צריך בחודש <b>רק כדי לכסות את ההוצאות הקבועות</b> — בלי להרוויח ובלי להפסיד.<br><br>במודל החודשי, מחשבים בהתחשב גם בריטיינר מהבסיס הקיים. אם הבסיס כבר מכסה את ההוצאות, נקודת האיזון היא 0 לקוחות חדשים.`,f:'(הוצאות קבועות − ריטיינר מבסיס קיים) ÷ רווח ללקוח חדש'},
  ltv:{t:'הכנסה ללקוח (LTV)',body:`כמה כסף לקוח חדש ממוצע יכניס לאורך כל הזמן שהוא איתך — הקמה חד-פעמית ועוד הריטיינר כפול מספר החודשים שהוא נשאר.<br><br>משתמש ב-"ריטיינר ללקוחות חדשים" (מחיר עדכני), לא בריטיינר של הבסיס הקיים.`,f:'הקמה + (ריטיינר ללקוחות חדשים × חודשי שימור)'},
  cac:{t:'עלות גיוס לקוח (CAC)',body:`כמה עולה להביא לקוח אחד חדש. כולל 4 מרכיבים: עלות שיווק (תקציב חלקי מספר הסגירות), עמלת איש המכירות (% מההקמה), עמלת אונבורדינג (% מהריטיינר הראשון), ועמלת סליקה (% מכל LTV).`,f:'שיווק + עמלת מכירה + אונבורדינג + סליקה'},
  gross:{t:'רווח גולמי ללקוח',body:`מה שנשאר מכל לקוח אחרי העלויות הישירות שלו (שיווק, עמלה, אונבורדינג, סליקה), לפני ההוצאות הקבועות של העסק.`,f:'LTV − CAC'},
  ltvcac:{t:'יחס LTV / CAC',body:`כמה שקלים הלקוח מכניס על כל שקל שהושקע בגיוס שלו. מתחת ל-1 = הפסד. 1-3 = רווחי אבל בעייתי. <b>מעל 3 = בריא מאוד.</b>`,f:'הכנסה ללקוח ÷ עלות גיוס'},
  eff:{t:'אחוז המרה אפקטיבי',body:`לא כל ליד עונה לטלפון, ולא כל מי שעונה סוגר. ההמרה האמיתית מליד ללקוח היא המכפלה של השניים.<br><br>דוגמה: 50% עונים, ומתוכם 20% סוגרים ⟵ רק 10% מהלידים הופכים ללקוח.`,f:'אחוז מענה × אחוז סגירה'},
  simimpact:{t:'איך הסימולטור עובד',body:`הסימולטור מקבע את <b>תקציב השיווק</b> (מספר הלידים) הנוכחי, ובודק כמה לקוחות תקבל מאותו תקציב אם הפרמטרים ישתנו.<br><br>חשוב: שינויי ריטיינר משפיעים רק על לקוחות חדשים שיגויסו, לא על הבסיס הקיים (כי אי-אפשר לעלות מחיר לקוחות קיימים).`,f:'לקוחות = לידים קבועים × המרה אפקטיבית'},
  repcompany:{t:'הקשר בין האישי לחברה',body:`יעד החברה דורש מספר מסוים של לקוחות. הוא מתחלק בין אנשי המכירות <b>לפי אחוז הסגירה</b> — מי שסוגר יותר טוב מקבל נתח גדול יותר.<br><br>הטבלה מראה את אותם נתונים פעמיים: לפי היעד האישי שהזנת, ולפי החלק שלך ביעד החברה. אם החלק בחברה גבוה מהיעד האישי — יש פער שצריך לסגור.`,f:'חלק ביעד = (אחוז סגירה שלך ÷ סך הצוות) × לקוחות היעד'},
  twoconv:{t:'תכנון מול ביצוע — אחוז המרה',body:`<b>אחוז המרה ביעד</b> = מה שהגדרת בנתוני בסיס, הבסיס לכל התכנון.<br><br><b>אחוז המרה בפועל</b> = ממוצע אחוזי הסגירה שאנשי המכירות הזינו במסכים האישיים שלהם.<br><br>אם הביצוע נמוך מהתכנון — באותו תקציב שיווק תקבל פחות לקוחות, ולכן פחות רווח. כך רואים את הפער בין מה שתוכנן למה שקורה.`,f:'בפועל = אחוז מענה × ממוצע סגירה של הצוות'},
  capacity:{t:'קיבולת צוות',body:`כמה שיחות כל הצוות יכול להוציא בחודש יחד. מחושב לפי כמה שיחות איש אחד יכול לעשות (לפי אורך השיחה ושעות העבודה), כפול מספר אנשי המכירות.<br><br>זה מראה לך את התקרה — אם היעד דורש יותר שיחות מהקיבולת, צריך עוד אנשי מכירות או יותר שעות.`,f:'שיחות לחודש לאיש × מספר אנשי מכירות'},
  actual:{t:'השוואה לביצוע בפועל',body:`הזן מה שכבר קרה החודש — תקציב שיווק שיצא, לידים שנכנסו, סגירות שהיו, וכמה ימים עברו. המערכת מחשבת מזה את המחירים האמיתיים, כמה צריך עוד כדי לעמוד ביעד, ומה הרווח הצפוי בקצב הנוכחי.<br><br>אפשר למלא רק חלק מהשדות — כל מדד שאי אפשר לחשב בלי הנתון שלו יוצג כ-"—".`,f:'מחיר ליד אמיתי = תקציב ÷ לידים · המרה אמיתית = סגירות ÷ לידים'},
  history:{t:'נתונים היסטוריים',body:`נתונים בפועל מ-3+ חודשים אחרונים. המערכת מחשבת ממוצעים של מחיר הליד, אחוז ההמרה ועלות הלקוח, ומציגה אותם ליד נתוני הבסיס שלמעלה.<br><br>הרעיון: לראות בעיניים אם המספרים שאתה משתמש בהם (בנתוני בסיס) תואמים למה שקורה באמת.`,f:'ממוצע משוקלל = סך הערכים ÷ סך הנפח (לידים/לקוחות/וכו)'},
  weighted:{t:'חלוקה לפי ביצועים',body:`יעד החברה (מספר הלקוחות) מתחלק בין אנשי המכירות <b>לפי אחוז הסגירה</b> של כל אחד. מחברים את כל אחוזי הסגירה, וכל אחד מקבל את היחס שלו מתוך הסכום.<br><br><b>שיחות נדרשות</b> = כמה שיחות (שענו) כל אחד צריך כדי לסגור את היעד שלו. אם זה עובר את הקיבולת המקסימלית — מופיעה אזהרה.`,f:'חלק = (אחוז סגירה שלך ÷ סך הצוות) × יעד · שיחות = לקוחות ÷ אחוז סגירה'},
  recommendations:{t:'איך נבנות ההמלצות',body:`כשהקצב הנוכחי לא יביא ליעד, המערכת מחשבת מה צריך כדי לסגור את הפער <b>מהיום עד סוף החודש</b>.<br><br>כל המלצה לבד תסגור את הפער:<br>• להגביר קצב סגירות ביום ביחס לימים שנותרו.<br>• להעלות אחוז סגירה על השיחות שעוד יבואו.<br>• להעלות מחיר הקמה ללקוחות חדשים מהיום.<br>• להעלות ריטיינר ללקוחות חדשים שיצטרפו מהיום.<br><br>אפשר גם לשלב מהלכים.`,f:'פער ÷ השפעת מהלך ליחידה = שיפור נדרש'},
  goalRec:{t:'יעד ריאלי מומלץ',body:`היעד החודשי המומלץ לוקח בחשבון שלא מתחילים מ-0:<br><br>1. <b>רווח טבעי מהבסיס הנוכחי</b> — מה שהבסיס הקיים מכניס בכל חודש פחות הוצאות קבועות. זה הרווח "אם לא נגייס אף לקוח".<br><br>2. <b>תרומת לקוחות חדשים</b> — אם תחזור על ביצוע הגיוס של חודש שעבר (אותה כמות חדשים), בכמה הם יוסיפו לרווח החודש?<br><br>3. <b>×1.15 לשיפור</b> — נשאף ל-15% שיפור על הביצוע הקודם.`,f:'רווח טבעי + (חדשים בחודש שעבר × רווח לחדש × 1.15)'},
  baseline:{t:'איך מחושב הבייסליין',
    body:()=>{
      const bl=lastMonthBaseline();
      if(!bl||bl.operatingProfit==null) return 'אין נתוני חודש קודם זמינים';
      return `הבייסליין הוא <b>הרווח התפעולי של החודש הקודם שהסתיים</b> (${bl.monthName}) — מספר אחד שמשקף את הביצועים שלך לפני החודש הנוכחי.<br><br>
<b>איך הוא מחושב?</b><br>
הרווח התפעולי מגיע ישירות מהמאנדיי, מהשורה של אותו חודש.<br><br>
<b>הנוסחה במאנדיי:</b><br>
מחזור כללי − תקציב שיווק − עמלות מכירות − עמלות סליקה − עמלות אונבורדינג − הוצאות קבועות<br><br>
<b>בחודש שעבר אצלך (${bl.monthName}):</b><br>
רווח תפעולי = <b>${money(bl.operatingProfit)}₪</b><br>
מתוך ${bl.closes||0} לקוחות חדשים שגויסו<br><br>
<b>למה זה שימושי?</b><br>
זה המספר שאתה משווה אליו את היעד החודשי שלך — הוא מסמן מאיפה אתה מתחיל ומה הביצוע שצריך לעבור.`;
    },
    f:'מחזור − שיווק − עמלות − סליקה − אונבורדינג − הוצאות קבועות (לפי המאנדיי של חודש שעבר)'},
  naturalProfit:{t:'איך מחושב הרווח מהבסיס לבד',
    body:()=>{
      const c=compute();
      const activePay=c.activePayingThisMonth;
      const revenueBase=c.monthlyRetainerFromBase;
      const procFee=revenueBase*c.procPct;
      const netBase=revenueBase-procFee;
      const operating=netBase-state.fixedCosts;
      return `<b>הרווח שיהיה לך החודש אם לא תגייס אף לקוח חדש.</b><br>
זה ה"רווח האוטומטי" שמגיע מהריטיינרים החודשיים של הלקוחות הקיימים שלך.<br><br>
<b>שלב 1 — פעילים שישלמו החודש:</b><br>
${fmt1(state.activeClients)} פעילים × (1 − ${fmt1(c.churnPct*100/2)}% חצי שחיקה) = <b>${fmt1(activePay)} פעילים משלמים</b><br>
<i>(החצי-שחיקה כי בממוצע מי שעוזב, עוזב באמצע החודש ושילם רק חצי חודש)</i><br><br>
<b>שלב 2 — הכנסה חודשית מהבסיס:</b><br>
${fmt1(activePay)} משלמים × ${money(state.retainer)}₪ ריטיינר = <b>${money(revenueBase)}₪</b><br><br>
<b>שלב 3 — מנכים סליקה והוצאות קבועות:</b><br>
${money(revenueBase)}₪ − ${money(procFee)}₪ סליקה (${fmt1(c.procPct*100)}%) − ${money(state.fixedCosts)}₪ הוצאות קבועות<br>
<b>= ${money(operating)}₪ רווח מהבסיס</b>`;
    },
    f:'(פעילים × (1−שחיקה/2) × ריטיינר) − סליקה − הוצאות קבועות'},
  clientsNeeded:{t:'איך מחושבת כמות הלקוחות שצריך ליעד',
    body:()=>{
      const c=compute();
      const profitPerNew=profitFromOneNewClient();
      const baseProfit=monthlyProfitFromNewClients(0).monthlyOperating;
      const gap=state.goalProfit-baseProfit;
      const needed=profitPerNew>0?Math.max(0,gap/profitPerNew):0;
      return `<b>שלב 1 — רווח חודשי מלקוח חדש:</b><br>
הכנסה: הקמה ${money(state.setupFee)}₪ + ריטיינר חדש ${money(c.retainerForNew)}₪<br>
מנוכים: עמלת מכירה ${money(state.setupFee*c.commPct)}₪ + אונבורדינג ${money(c.retainerForNew*c.onbCommPct)}₪ + סליקה ${money((state.setupFee+c.retainerForNew)*c.procPct)}₪<br>
<b>= ${money(profitPerNew)}₪ רווח חודשי לכל לקוח חדש</b><br><br>
<b>שלב 2 — רווח מהבסיס הקיים החודש:</b><br>
${fmt1(c.activeNow)} פעילים × (1 − ${fmt1(c.churnPct*100/2)}% שחיקה/2) × ${money(state.retainer)}₪ ריטיינר<br>
פחות סליקה ${fmt1(c.procPct*100)}% והוצאות קבועות ${money(state.fixedCosts)}₪<br>
<b>= ${money(baseProfit)}₪ רווח מהבסיס לבד</b><br><br>
<b>שלב 3 — חישוב הפער:</b><br>
יעד ${money(state.goalProfit)}₪ − רווח מבסיס ${money(baseProfit)}₪ = <b>${money(gap)}₪ פער</b><br><br>
<b>שלב 4 — לקוחות נדרשים:</b><br>
פער ${money(gap)}₪ ÷ רווח לחדש ${money(profitPerNew)}₪ = <b>${fmt1(needed)} לקוחות חדשים</b>${gap<=0?`<br><br>(אם הבסיס מכסה את היעד, התוצאה היא 0 או שלילית - יעד מושג ללא גיוס)`:''}`;
    },
    f:'(יעד + הוצאות קבועות − רווח מבסיס קיים) ÷ רווח חודשי מלקוח חדש'},
  recommendedGoal:{t:'איך מחושב היעד הריאלי המומלץ',
    body:()=>{
      const bl=lastMonthBaseline();
      if(!bl||bl.operatingProfit==null) return 'אין נתוני חודש קודם זמינים';
      const c=compute();
      const naturalProfit=monthlyProfitFromNewClients(0).monthlyOperating;
      const prevNewClients=bl.closes||0;
      const profitPerNew=profitFromOneNewClient();
      const prevContribution=prevNewClients*profitPerNew;
      const calc1=naturalProfit+prevContribution*1.15;
      const calc2=bl.operatingProfit*1.15;
      const final=Math.max(calc1,calc2);
      return `<b>שלב 1 — רווח טבעי מהבסיס:</b><br>
מה שהבסיס מכניס בלי לגייס: <b>${money(naturalProfit)}₪</b><br>
(${fmt1(c.activeNow)} פעילים × (1−${fmt1(c.churnPct*100/2)}% שחיקה/2) × ${money(state.retainer)}₪ ריטיינר, פחות סליקה והוצאות קבועות)<br><br>
<b>שלב 2 — תרומת חדשים מחודש שעבר:</b><br>
${prevNewClients} לקוחות חדשים גייסת בחודש שעבר × ${money(profitPerNew)}₪ רווח לחדש = <b>${money(prevContribution)}₪</b><br><br>
<b>שלב 3 — חישוב 1 (טבעי + חדשים × 1.15):</b><br>
${money(naturalProfit)}₪ + ${money(prevContribution)}₪ × 1.15 = <b>${money(calc1)}₪</b><br><br>
<b>שלב 4 — חישוב 2 (רף תחתון: 1.15 × חודש שעבר):</b><br>
${money(bl.operatingProfit)}₪ × 1.15 = <b>${money(calc2)}₪</b><br><br>
<b>שלב 5 — היעד הסופי (הגבוה מהשניים):</b><br>
<b>${money(final)}₪</b>`;
    },
    f:'מקסימום בין (רווח טבעי + חדשים × 1.15) ל-(חודש שעבר × 1.15)'},
  firstMonthProfit:{t:'רווח חודש הצטרפות מלקוח חדש',
    body:()=>{
      const c=compute();
      const profitPerNew=profitFromOneNewClient();
      const setupRev=state.setupFee;
      const retainerRev=c.retainerForNew;
      const totalRev=setupRev+retainerRev;
      const acqCost=c.acqCost;
      const procFee=totalRev*c.procPct;
      const salesComm=setupRev*c.commPct;
      const onbComm=retainerRev*c.onbCommPct;
      const totalCosts=acqCost+salesComm+onbComm+procFee;
      return `כמה כסף לקוח חדש מכניס לעסק בחודש שבו הוא מצטרף — לא לאורך כל חייו.<br><br>
<b>הכנסה בחודש:</b><br>
הקמה ${money(setupRev)}₪ + ריטיינר ראשון ${money(retainerRev)}₪ = <b>${money(totalRev)}₪</b><br><br>
<b>עלויות:</b><br>
עלות שיווק (${fmt1(c.leadsPerClient)} לידים × ${money(state.costPerLead)}₪): ${money(acqCost)}₪<br>
עמלת מכירה (${fmt1(state.salesCommPct)}% מהקמה): ${money(salesComm)}₪<br>
עמלת אונבורדינג (${fmt1(state.onboardCommPct)}% מהריטיינר): ${money(onbComm)}₪<br>
עמלת סליקה (${fmt1(state.processingFeePct)}% מהכל): ${money(procFee)}₪<br>
<b>סך עלויות: ${money(totalCosts)}₪</b><br><br>
<b>רווח חודש הצטרפות:</b><br>
${money(totalRev)}₪ − ${money(totalCosts)}₪ = <b>${money(profitPerNew)}₪</b>`;
    },
    f:'(הקמה + ריטיינר חדש) − שיווק − עמלות − סליקה'},
  maxGoal:{t:'יעד רווח מקסימלי',
    body:()=>{
      const c=compute();
      const teamSize=Math.max(parseInt(state.teamSize)||1,1);
      const callsPerRep=c.callsPerMonthPerRep;
      const capacity=callsPerRep*teamSize;
      const maxClients=c.callsPerClient>0?capacity/c.callsPerClient:0;
      const maxOp=monthlyProfitFromNewClients(maxClients).monthlyOperating;
      const baseRev=c.monthlyRetainerFromBase;
      return `התקרה — הרווח הגבוה ביותר שניתן להשיג החודש בהינתן הצוות הנוכחי שלך.<br><br>
<b>שלב 1 — קיבולת הצוות:</b><br>
שיחות לאיש בחודש = (${state.workHoursDay}שעות × 60 ÷ ${state.callMin}דק׳) × ${state.workDaysMonth} ימים = ${fmt(callsPerRep)} שיחות<br>
סך קיבולת × ${teamSize} ${teamSize>1?'נציגים':'נציג'} = <b>${fmt(capacity)} שיחות בחודש</b><br><br>
<b>שלב 2 — מקסימום לקוחות חדשים:</b><br>
${fmt(capacity)} שיחות × ${fmt1(state.closeRate)}% סגירה = <b>${fmt1(maxClients)} לקוחות חדשים</b><br><br>
<b>שלב 3 — חישוב הרווח:</b><br>
הכנסה מבסיס: ${money(baseRev)}₪ (לפי ${fmt1(c.activeNow)} פעילים × ריטיינר ${money(state.retainer)}₪)<br>
הכנסה מ-${fmt1(maxClients)} חדשים: בערך ${money(maxClients*(state.setupFee+c.retainerForNew))}₪<br>
פחות עלויות משתנות וקבועות (${money(state.fixedCosts)}₪)<br>
<b>= ${money(maxOp)}₪ יעד מקסימלי</b><br><br>
<i>זה מקסימום פיזי — אם תרצה יותר, צריך עוד אנשי מכירות / שעות / לקצר שיחות.</i>`;
    },
    f:'(קיבולת שיחות × אחוז סגירה) × רווח לחדש + ריטיינר מבסיס − הוצאות קבועות'},
  profitSoFar:{t:'איך מחושב הרווח שכבר נכנס בפועל',
    body:()=>{
      const r=profitSoFar();
      return `הרווח שכבר נכנס לעסק עד היום, לפי נתונים אמיתיים מהמאנדיי.<br><br>
<b>הכנסות:</b><br>
ריטיינרים שנכנסו: <b>${money(r.retainersIncome)}₪</b><br>
הקמות שנכנסו: <b>${money(r.setupIncome)}₪</b><br>
<b>סך הכנסות: ${money(r.income)}₪</b><br><br>
<b>עלויות:</b><br>
סליקה (${fmt1(state.processingFeePct)}% מההכנסות): ${money(r.procFee)}₪<br>
עמלת מכירה (${fmt1(state.salesCommPct)}% מההקמות): ${money(r.salesComm)}₪<br>
עמלת אונבורדינג (${state.joinedRetainer||0} לקוחות שהצטרפו × ${fmt1(state.onboardCommPct)}%): ${money(r.onbComm)}₪<br>
תקציב שיווק שיצא: ${money(r.marketing)}₪<br>
הוצאות קבועות: ${money(r.fixedCosts)}₪<br><br>
<b>רווח תפעולי עד היום:</b> ${money(r.operating)}₪`;
    },
    f:'הכנסות עד היום − סליקה − עמלת מכירה − אונבורדינג − שיווק − הוצאות קבועות'},
  profitExpected:{t:'איך מחושב הרווח הצפוי לסוף החודש',
    body:()=>{
      const r=profitExpectedEndOfMonth();
      const c=compute();
      const actBudget = parseFloat(state.actBudget) || 0;
      const actDays = parseFloat(state.actDays) || 0;
      const dailyBudget = actDays>0 ? actBudget/actDays : 0;
      return `הרווח הצפוי לסוף החודש.<br><br>
<b>הכנסות:</b><br>
ריטיינר צפוי: ${state.activeClients} פעילים × ${money(state.retainer)}₪ × ${fmt1((1-c.churnPct/2)*100)}% (אחרי שחיקה) = <b>${money(r.expectedRetainers)}₪</b><br>
הקמות שנכנסו עד היום: <b>${money(r.setupIncome)}₪</b><br>
<b>סך הכנסות צפויות: ${money(r.income)}₪</b><br><br>
<b>עלויות:</b><br>
סליקה: ${money(r.procFee)}₪<br>
עמלת מכירה (על ההקמות שנכנסו): ${money(r.salesComm)}₪<br>
עמלת אונבורדינג (${state.joinedRetainer||0} שהצטרפו): ${money(r.onbComm)}₪<br>
תקציב שיווק שיצא עד היום: ${money(r.marketing)}₪<br>
הוצאות קבועות: ${money(r.fixedCosts)}₪<br><br>
<b>רווח תפעולי צפוי:</b> ${money(r.operating)}₪`;
    },
    f:'(פעילים × ריטיינר × (1−שחיקה/2)) + הקמות שנכנסו − עלויות (כולל שיווק חודשי מלא)'},
  goalBreakdown:{t:'איך מחושב פירוק היעד',
    body:()=>`<b>חשוב להבין:</b> הפירוק כאן הוא <b>חישוב תיאורטי</b> כאילו מתחילים חודש חדש.<br><br>
החישוב לוקח:<br>
• ${state.activeClients} לקוחות פעילים שיש לך כרגע<br>
• ${money(state.retainer)}₪ ריטיינר ממוצע<br>
• ${fmt1(state.churnRate)}% שחיקה חודשית<br>
ומחשב כמה לקוחות חדשים צריך לסגור כדי להגיע ליעד הרווח.<br><br>
<b>הוא לא מתחשב במה שכבר נכנס החודש</b> (הקמות וריטיינרים). בשביל זה תסתכל בטבלאות "השוואה למה שקרה בפועל" למטה — שם החישוב מדויק יותר ומתחשב במה שכבר קרה.`,
    f:'חישוב תיאורטי - לקוחות פעילים נוכחיים × ריטיינר × (1-שחיקה/2) − הוצאות = רווח טבעי. פער מהיעד ÷ רווח לחדש = לקוחות חדשים נדרשים'},
  gapFromExpected:{t:'איך מחושבת השלמת הפער מהרווח הצפוי',
    body:()=>{
      const r = profitExpectedEndOfMonth();
      const gap = state.goalProfit - r.operating;
      const profitPerNew = profitFromOneNewClient();
      const closesNeeded = profitPerNew>0 ? gap/profitPerNew : 0;
      return `הטבלה מציגה כמה צריך לסגור <b>מהיום ועד סוף החודש</b> כדי להשלים את פער הרווח.<br><br>
<b>החישוב:</b><br>
1. רווח צפוי לסוף החודש (אם נמשיך כרגיל בלי שום שינוי): <b>${money(r.operating)}₪</b><br>
2. יעד רווח: <b>${money(state.goalProfit)}₪</b><br>
3. פער שצריך לסגור: <b>${money(gap)}₪</b><br>
4. רווח חודש הצטרפות מלקוח חדש (כולל שיווק): <b>${money(profitPerNew)}₪</b><br>
5. לקוחות נדרשים = פער ÷ רווח לחדש = <b>${fmt1(closesNeeded)} לקוחות</b><br><br>
לידים נדרשים = לקוחות ÷ אחוז המרה אפקטיבי<br>
שיחות נדרשות = לידים × אחוז מענה<br>
תקציב שיווק נוסף = לידים × מחיר ליד<br><br>
<b>קצב יומי:</b> כל מספר חלקי הימים שנותרו בחודש. ככל שנותרו פחות ימים — הקצב היומי גדל.`;
    },
    f:'פער רווח ÷ רווח חודש הצטרפות = לקוחות נדרשים. נגזרים ממנו לידים, שיחות, ותקציב.'},
  gapFromSoFar:{t:'איך מחושבת השלמת הפער מהרווח שנכנס בפועל',
    body:()=>{
      const r = profitSoFar();
      const gap = state.goalProfit - r.operating;
      const profitPerNew = profitFromOneNewClient();
      const closesNeeded = profitPerNew>0 ? gap/profitPerNew : 0;
      return `<b>תרחיש שמרני:</b> כמה לקוחות צריך לסגור כדי להגיע ליעד, <b>בהתבסס רק על מה שכבר נכנס בפועל</b> (לא צופים שיכנס יותר מהבסיס הקיים).<br><br>
<b>החישוב:</b><br>
1. רווח שכבר נכנס: <b>${money(r.operating)}₪</b><br>
2. יעד: <b>${money(state.goalProfit)}₪</b><br>
3. פער: <b>${money(gap)}₪</b><br>
4. לקוחות נדרשים = ${money(gap)}₪ ÷ ${money(profitPerNew)}₪ = <b>${fmt1(closesNeeded)} לקוחות</b><br><br>
<b>למה זה תרחיש שמרני?</b> כי הוא לא מניח שיכנסו עוד ריטיינרים מהבסיס הקיים. במציאות הריטיינרים מהבסיס ימשיכו להיכנס, אז הטבלה הראשית למעלה (לפי רווח צפוי) רלוונטית יותר.`;
    },
    f:'פער רווח ÷ רווח חודש הצטרפות = לקוחות נדרשים (תרחיש שמרני)'},
  monthRevenue:{t:'מחזור מכירות החודש',
    body:()=>{
      const ret = state.retainersIncomeSoFar||0;
      const setup = state.setupIncomeSoFar||0;
      return `סך הכסף שנכנס לעסק החודש עד היום, מכל המקורות.<br><br>
<b>סכום הריטיינרים שנכנסו:</b> ${money(ret)}₪<br>
<b>סכום ההקמות שנכנסו:</b> ${money(setup)}₪<br>
<b>סה"כ:</b> ${money(ret+setup)}₪<br><br>
כל הנתונים נלקחים ישירות מהמאנדיי.`;
    },
    f:'סכום ריטיינרים שנכנסו + סכום הקמות שנכנסו (מהמאנדיי)'},
  grossProfitSummary:{t:'רווח גולמי',
    body:()=>{
      const expected = grossProfitExpected();
      const sofar = grossProfitSoFar();
      return `הרווח הגולמי הוא הרווח לפני שמורידים הוצאות קבועות.<br><br>
<b>רווח גולמי צפוי לסוף החודש:</b> ${money(expected)}₪<br>
מחושב לפי כל הריטיינר הצפוי + הקמות שנכנסו, פחות סליקה, עמלות, שיווק.<br><br>
<b>רווח גולמי היום:</b> ${money(sofar)}₪<br>
מחושב לפי מה שכבר נכנס בפועל פחות הוצאות משתנות.<br><br>
שני המספרים <b>לא כוללים הוצאות קבועות</b> (שהן ${money(state.fixedCosts)}₪).`;
    },
    f:'הכנסות − סליקה − עמלות מכירה ואונבורדינג − שיווק (בלי הוצאות קבועות)'},
  opExpectedSummary:{t:'רווח תפעולי צפוי',
    body:()=>{
      const expected = profitExpectedEndOfMonth().operating;
      const noChurn = profitExpectedNoChurn();
      return `<b>רווח תפעולי צפוי לסוף החודש:</b> ${money(expected)}₪<br>
חישוב הכולל את שחיקה הצפויה (${fmt1(state.churnRate/2)}% עזיבה ממוצעת בחודש).<br><br>
<b>בלי שחיקה:</b> ${money(noChurn)}₪<br>
אם אף לקוח לא יעזוב החודש, הרווח יהיה גבוה ב-${money(noChurn-expected)}₪.`;
    },
    f:'הכנסות צפויות − כל ההוצאות (כולל הוצאות קבועות והשחיקה)'},
  activeRetSumSummary:{t:'סכום ריטיינרים פעילים',
    body:()=>{
      const sum = (state.activeClients||0) * (state.retainer||0);
      return `סך הכנסה חודשית קבועה מהריטיינרים של כל הלקוחות הפעילים שלך.<br><br>
${state.activeClients} פעילים × ${money(state.retainer)}₪ ריטיינר ממוצע = <b>${money(sum)}₪</b><br><br>
<b>אחוז גדילה מחודש קודם</b> וגם <b>ממוצע הגדילה ההיסטורי</b> מציגים את כיוון הצמיחה.`;
    },
    f:'לקוחות פעילים × ריטיינר ממוצע'},
  activeCountSummary:{t:'כמות לקוחות פעילים',
    body:()=>`מספר הלקוחות הפעילים בסוף החודש (לפי המאנדיי).<br><br>
כרגע: <b>${state.activeClients} לקוחות</b><br><br>
<b>אחוז גדילה מחודש קודם</b> וגם <b>ממוצע הגדילה ההיסטורי</b> מציגים אם אתה גודל או מצטמצם.`,
    f:'מהמאנדיי - "כמות לקוחות פעילים שהיה בסוף חודש"'},
  nextMonthProfit:{t:'רווח צפוי לחודש הבא',
    body:()=>{
      const n = state.nextMonthMonthsBack||3;
      const ahead = Math.max(2, parseInt(state.nextMonthAheadCustom)||3);
      const r1 = profitNextMonth(state, n, 1);
      const r2 = profitNextMonth(state, n, ahead);
      const c = compute();
      const detail = (r, label) => {
        // שכבה 1: הבסיס המקורי (משלם ריטיינר ישן)
        const baseLayer = `${fmt1(r.payingOriginal)} מהבסיס המקורי × ${money(state.retainer)}₪ = <b>${money(r.retainerFromBase)}₪</b>`;
        // שכבה 2: לקוחות חדשים שהצטברו (משלמים ריטיינר חדש) - רק אם יש
        const accLayer = r.retainerFromAccumulated > 0
          ? `<br>+ ${fmt1(r.payingNewExisting)} לקוחות חדשים שהצטברו × ${money(c.retainerForNew)}₪ = <b>${money(r.retainerFromAccumulated)}₪</b>`
          : '';
        return `
<b style="color:var(--accent)">━━━ ${label} ━━━</b><br><br>
<b>1. בסיס: ריטיינרים פעילים</b><br>
${baseLayer}${accLayer}<br>
= ${money(r.activeRetainersAfterChurn)}₪ אחרי שחיקה (${fmt1((1-r.churnFactor)*100)}%)<br>
− סליקה (${fmt1(c.procPct*100)}%): ${money(r.activeRetainersProcFee)}₪<br>
<b>= ${money(r.activeRetainersNet)}₪</b> נקי מבסיס<br><br>
<b>2. הקמות חדשות צפויות</b> (ממוצע ${n} חודשים)<br>
${fmt1(r.avgClosesPerMonth)} לקוחות חדשים × ${money(state.setupFee)}₪ הקמה = <b>${money(r.newSetupRevenue)}₪</b><br>
− עמלת מכירות (${fmt1(c.commPct*100)}%): ${money(r.newSetupSalesComm)}₪<br>
− עלות גיוס מהשיווק (${fmt1(r.avgClosesPerMonth)} × ${money(c.acqCost)}₪): ${money(r.newSetupAcqCost)}₪<br>
− סליקה: ${money(r.newSetupProcFee)}₪<br>
<b>= ${money(r.newSetupNet)}₪</b> נקי מהקמות<br><br>
<b>3. ריטיינרים חדשים</b> (ממוצע ${n} חודשים)<br>
${fmt1(r.avgNewJoined)} מצטרפים × ${money(c.retainerForNew)}₪ ריטיינר חדש = <b>${money(r.newRetainerRevenue)}₪</b><br>
− אונבורדינג (${fmt1(c.onbCommPct*100)}%): ${money(r.newRetainerOnbComm)}₪<br>
− סליקה: ${money(r.newRetainerProcFee)}₪<br>
<b>= ${money(r.newRetainerNet)}₪</b> נקי מריטיינרים חדשים<br><br>
<b>4. הוצאות קבועות</b><br>
− ${money(r.fixedCosts)}₪<br><br>
<b style="color:var(--accent);font-size:14px">סך רווח תפעולי: ${money(r.operating)}₪</b>`;
      };
      return `הערכת הרווח על סמך מגמות מ-${n} חודשים אחרונים.<br><br>
<b style="color:var(--txt)">למה הרווח גדל כל חודש?</b> כל חודש מצטרפים לקוחות חדשים שמשלמים ריטיינר חדש (${money(c.retainerForNew)}₪), והם <b>מצטברים</b> לבסיס. הבסיס המקורי כמעט לא משתנה, אבל שכבת הלקוחות החדשים הולכת וגדלה - ולכן הרווח עולה.<br><br>${detail(r1,'חודש הבא')}<br><br>${detail(r2,'בעוד '+ahead+' חודשים')}`;
    },
    f:'(בסיס מקורי × ריטיינר ישן + מצטברים חדשים × ריטיינר חדש) × (1−שחיקה) − סליקה + הקמות + ריטיינרים חדשים − קבועות'},
  profitPctSummary:{t:'אחוז רווח מהמחזור',
    body:()=>`<b>אחוז רווח תפעולי:</b> רווח תפעולי שכבר נכנס ÷ מחזור החודש.<br>
<b>אחוז רווח גולמי:</b> רווח גולמי ÷ מחזור החודש.<br><br>
מאפשר לראות עד כמה הפעילות שלך רווחית — לא רק כמה כסף יצרת אלא איזה % מהכסף נשאר אצלך.`,
    f:'רווח (תפעולי/גולמי) ÷ מחזור × 100%'},
};

function importConfig(e){

function showLoadingModal(msg){
  let m=document.getElementById('loadingModal');
  if(!m){
    m=document.createElement('div');
    m.id='loadingModal';
    m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:grid;place-items:center;backdrop-filter:blur(4px)';
    document.body.appendChild(m);
  }
  m.innerHTML=`<div style="background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:30px 40px;text-align:center;min-width:260px;box-shadow:var(--shadow)">

    <div style="font-size:11.5px;color:var(--txt-faint);margin-top:6px">משוך נתונים ממאנדיי</div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
}
function hideLoadingModal(){
  const m=document.getElementById('loadingModal');
  if(m) m.remove();
}

async function fetchFromMonday(silent){
  if(!state.mondayWebhookUrl){
    if(!silent) toast('חסרה כתובת webhook — הזן אותה בנתוני בסיס');
    return false;
  }
  if(!silent) showLoadingModal('מושך נתונים ממאנדיי...');
  try{
    const res=await fetch(state.mondayWebhookUrl,{method:'GET',cache:'no-store'});
    if(!res.ok) throw new Error('שגיאה ב-webhook: '+res.status);
    const data=await res.json();
    applyMondayData(data);
    state.mondayLastFetch=new Date().toISOString();
    saveState();
    hideLoadingModal();
    if(!silent) toast('הנתונים עודכנו ממאנדיי');
    navigate(currentPage);
    return true;
  }catch(err){
    hideLoadingModal();
    if(!silent) toast('שגיאה במשיכת נתונים: '+err.message);
    console.error('Monday fetch error:',err);
    return false;
  }
}

function applyMondayData(data){
  if(!data || !data.current){ throw new Error('פלט מאנדיי לא תקין'); }
  // שומרים את כל המידע הגולמי כדי לאפשר חישוב מחדש בלי משיכה
  state.mondayRaw = data;
  // === היסטוריה ===
  if(Array.isArray(data.history)){
    state.history=data.history.map(m=>({
      label: m.monthName || m.date || 'חודש',
      budget: m.budget||'',
      leads: m.totalLeads||'',
      closes: m.closes||'',
      setupRev: m.setupAvg||'',
      retainerRev: m.retainerAvg||'',
      churn: m.churn,                    // לקוחות שעזבו
      activeStart: m.activeStartMonth,   // פעילים בתחילת החודש (לחישוב % עזיבה)
      churnPct: (m.churn!=null && m.activeStartMonth>0) ? (m.churn/m.activeStartMonth)*100 : null,
    }));
  }
  // === נתוני actual (החודש בפועל) ===
  const cur=data.current;
  const setIfNum=(key,val)=>{ if(val!=null && !isNaN(val)) state[key]=val; };
  setIfNum('actBudget', cur.budget);
  setIfNum('actLeads', cur.totalLeads);
  setIfNum('actCloses', cur.closes);
  if(cur.date){
    const today=new Date();
    const monthStart=new Date(cur.date);
    if(today.getFullYear()===monthStart.getFullYear() && today.getMonth()===monthStart.getMonth()){
      state.actDays=Math.min(today.getDate(), state.daysMonth);
    } else {
      state.actDays=state.daysMonth;
    }
  }
  // === נתוני בסיס - מחושבים לפי מספר החודשים שנבחר ===
  recomputeCoreFromMonday();
}

function lastMonthBaseline(){
  const data=state.mondayRaw;
  if(!data || !Array.isArray(data.history) || !data.history.length) return null;
  const m=data.history[0]; // החודש הקודם (האחרון בהיסטוריה - הסגור)
  return {
    monthName: m.monthName || 'חודש שעבר',
    operatingProfit: m.operatingProfit,
    grossProfit: m.grossProfit,
    revenue: m.revenue,
    closes: m.closes,
  };
}

/* מחשב את נתוני הליבה לפי mondayMonthsBack — ממוצע משוקלל לפי נפח
   משתמש בעמודות החדשות והמדויקות מהמאנדיי */
function recomputeCoreFromMonday(){
  const data=state.mondayRaw;
  if(!data || !data.current) return;
  // מערך החודשים הרלוונטיים לחישוב (current ראשון, אחר כך history)
  const allMonths=[data.current, ...(data.history||[])];
  const months=allMonths.slice(0, Math.max(1, state.mondayMonthsBack||1));
  // === ממוצעים משוקללים ===
  let sumBudget=0, sumLeads=0, sumCloses=0, sumCalls=0;
  let sumSetupRev=0, sumRetainerRev=0;
  // לחישוב ריטיינר ממוצע מדויק: משתמשים ב-retainerAvgActive * activeEndMonth, ממוצע משוקלל
  let sumActiveEnd=0, sumWeightedRetainer=0, monthsWithActiveAndRet=0;
  // לחישוב שחיקה מדויק: סך החודשים שעזבו ÷ סך הפעילים בתחילת החודש (לפי הנוסחה שלך)
  let sumChurn=0, sumActiveStart=0;
  // אחוזים סטטיים - מהחודש האחרון שיש בו ערך
  let salesCommPct=null, processingFeePct=null, onboardCommPct=null, fixedCosts=null;
  for(const m of months){
    if(m.budget!=null) sumBudget+=m.budget;
    if(m.totalLeads!=null) sumLeads+=m.totalLeads;
    if(m.closes!=null) sumCloses+=m.closes;
    if(m.callsMade!=null) sumCalls+=m.callsMade;
    if(m.setupTotal!=null) sumSetupRev+=m.setupTotal;
    if(m.retainerTotal!=null) sumRetainerRev+=m.retainerTotal;
    // ריטיינר ממוצע משוקלל לפי כמות הפעילים בסוף החודש
    if(m.retainerAvgActive!=null && m.activeEndMonth>0){
      sumWeightedRetainer += m.retainerAvgActive * m.activeEndMonth;
      sumActiveEnd += m.activeEndMonth;
      monthsWithActiveAndRet++;
    }
    // שחיקה: עזיבות ÷ פעילים בתחילת חודש
    if(m.churn!=null && m.activeStartMonth>0){
      sumChurn += m.churn;
      sumActiveStart += m.activeStartMonth;
    }
    if(salesCommPct==null && m.salesCommPct!=null) salesCommPct=m.salesCommPct;
    if(processingFeePct==null && m.processingFeePct!=null) processingFeePct=m.processingFeePct;
    if(onboardCommPct==null && m.onboardCommPct!=null) onboardCommPct=m.onboardCommPct;
    if(fixedCosts==null && m.fixedCosts!=null) fixedCosts=m.fixedCosts;
  }
  // === חישוב הנתונים המשוקללים ===
  const setIfNum=(key,val)=>{ if(val!=null && !isNaN(val) && isFinite(val)) state[key]=val; };
  // מחיר ליד = סך התקציבים ÷ סך הלידים
  if(sumLeads>0) setIfNum('costPerLead', sumBudget/sumLeads);
  // אחוז סגירה = סך הסגירות ÷ סך השיחות שענו
  if(sumCalls>0) setIfNum('closeRate', (sumCloses/sumCalls)*100);
  // אחוז מענה = סך השיחות ÷ סך הלידים
  if(sumLeads>0) setIfNum('answerRate', Math.min((sumCalls/sumLeads)*100, 100));
  // מחיר הקמה ממוצע = סך ההקמות ÷ סך הסגירות
  if(sumCloses>0) setIfNum('setupFee', sumSetupRev/sumCloses);
  // ריטיינר ממוצע מדויק - לפי הנתון החדש (retainerAvgActive * activeEndMonth)
  if(monthsWithActiveAndRet>0 && sumActiveEnd>0){
    setIfNum('retainer', sumWeightedRetainer/sumActiveEnd);
  } else if(sumCloses>0) {
    setIfNum('retainer', sumRetainerRev/sumCloses);  // fallback ישן
  }
  // === ריטיינר ללקוחות חדשים שהצטרפו (מחיר עדכני) ===
  // נמשך מ-numeric_mm4ayh2a במאנדיי = retainerAvg של החודש האחרון בלבד
  // זה משמש לכל החישובים שקשורים ללקוחות חדשים שיצטרפו (יעדים, סימולטור, תחזית)
  if(data.current.retainerAvg!=null){
    setIfNum('retainerNew', data.current.retainerAvg);
  } else if(state.retainer) {
    // fallback - אם אין נתון, להשתמש בריטיינר של הפעילים
    setIfNum('retainerNew', state.retainer);
  }
  setIfNum('salesCommPct', salesCommPct);
  setIfNum('processingFeePct', processingFeePct);
  setIfNum('onboardCommPct', onboardCommPct);
  setIfNum('fixedCosts', fixedCosts);
  // === לקוחות פעילים - לקוחים ישירות מהמאנדיי (העמודה החדשה activeEndMonth)
  // זה הנתון המדויק ביותר - מה היה בסוף החודש (או עד היום עבור החודש הנוכחי)
  if(data.current.activeEndMonth!=null){
    setIfNum('activeClients', data.current.activeEndMonth);
  } else if(data.current.activeClients!=null) {
    // fallback - תאימות אחורה
    setIfNum('activeClients', data.current.activeClients);
  }
  // === אחוז שחיקה מדויק - חישוב נפרד לפי churnMonthsBack ===
  // churn ÷ activeStartMonth, על פני החודשים שנבחרו ל-churn (יכול להיות שונה מ-mondayMonthsBack)
  const churnMonths=allMonths.slice(0, Math.max(1, state.churnMonthsBack||1));
  let sumChurnCh=0, sumActiveStartCh=0;
  for(const m of churnMonths){
    if(m.churn!=null && m.activeStartMonth>0){
      sumChurnCh += m.churn;
      sumActiveStartCh += m.activeStartMonth;
    }
  }
  if(sumActiveStartCh>0){
    const churn = (sumChurnCh/sumActiveStartCh)*100;
    setIfNum('churnRate', churn);
    if(churn>0) setIfNum('avgMonths', 100/churn);
  }
  // === שדות הקמה - מהחודש הנוכחי בלבד ===
  // אם null/undefined במאנדיי, נאפס ל-0 (אין נתוני הקמה זמינים)
  state.setupClients = (data.current.setupClients!=null && !isNaN(data.current.setupClients)) ? data.current.setupClients : 0;
  state.setupRetainers = (data.current.setupRetainers!=null && !isNaN(data.current.setupRetainers)) ? data.current.setupRetainers : 0;
  state.setupRemaining = (data.current.setupRemaining!=null && !isNaN(data.current.setupRemaining)) ? data.current.setupRemaining : 0;
  state.retainersIncomeSoFar = (data.current.retainersIncomeSoFar!=null && !isNaN(data.current.retainersIncomeSoFar)) ? data.current.retainersIncomeSoFar : 0;
  state.setupIncomeSoFar = (data.current.setupIncomeSoFar!=null && !isNaN(data.current.setupIncomeSoFar)) ? data.current.setupIncomeSoFar : 0;
  state.joinedRetainer = (data.current.joinedRetainer!=null && !isNaN(data.current.joinedRetainer)) ? data.current.joinedRetainer : 0;
}

function changeChurnMonthsBack(val){
  state.churnMonthsBack=Math.max(1, parseInt(val)||1);
  recomputeCoreFromMonday();
  saveState();
  navigate(currentPage);

function changeMonthsBack(val){
  state.mondayMonthsBack=Math.max(1, parseInt(val)||1);
