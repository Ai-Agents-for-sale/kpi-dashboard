    <div style="display:flex;align-items:center;gap:10px;margin-top:16px;padding:12px;background:var(--bg-1);border-radius:8px">
      <div onclick="toggleTradeoffSetup()" style="cursor:pointer;width:44px;height:24px;border-radius:12px;background:${ts.includeSetup?'var(--accent)':'var(--line-soft)'};position:relative;transition:.2s">
        <div style="position:absolute;top:2px;${ts.includeSetup?'left:2px':'right:2px'};width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s"></div>
      </div>
      <div style="font-size:13px">
        <b>${ts.includeSetup?'כולל את ההקמה בחישוב':'מתעלם מההקמה (רק ריטיינר)'}</b>
        <div style="color:var(--txt-faint);font-size:11.5px;margin-top:2px">${ts.includeSetup?'הרווח מכל לקוח כולל את ההקמה החד-פעמית — תמונה מלאה.':'בודק רק את השפעת הריטיינר — מתעלם מההכנסה מההקמה.'}</div>
      </div>
    </div>`;

  // החישוב
  const result = computeTradeoff();
  const isReduction = ts.mode==='setup' && ts.newSetup < currentSetup;
  const colHeader = isReduction ? 'משתלם רק אם עלות הגיוס יורדת מתחת ל-' : 'משתלם עד עלות גיוס של';

  // שורות הטבלה
  const horizonLabels = {1:'חודש 1', 2:'חודשיים', 3:'3 חודשים', 6:'6 חודשים', 12:'12 חודשים'};
  window._tradeoffRows = {};
  const tableRows = result.rows.map((r,i) => {
    window._tradeoffRows[`_to_${r.N}`] = r;
    const cacColor = r.cacThreshold >= r.cac0 ? 'var(--accent)' : 'var(--red)';
    const deltaColor = r.profitDelta >= 0 ? 'var(--accent)' : 'var(--red)';
    return `<tr style="border-bottom:1px solid var(--line-soft)">
      <td style="padding:13px 8px;font-size:13.5px;color:var(--txt)">${horizonLabels[r.N]}</td>
      <td style="padding:13px 8px;text-align:center;font-family:'Rubik';font-weight:700;font-size:16px;color:${cacColor};direction:ltr">${money(r.cacThreshold)}₪</td>
      <td style="padding:13px 8px;text-align:center;font-family:'Rubik';font-weight:700;font-size:15px;color:${deltaColor};direction:ltr">${r.profitDelta>=0?'+':''}${money(r.profitDelta)}₪</td>
      <td style="padding:13px 8px;text-align:center"><span onclick="showTradeoffWhy('_to_${r.N}')" style="cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--bg-1);border:1px solid var(--line-soft);font-size:13px;color:var(--accent)">?</span></td>
    </tr>`;
  }).join('');

  // משפט הסבר על מצב נוכחי
  const moveDesc = ts.mode==='retainer'
    ? `אתה שוקל ${ts.newRetainer>currentRetainer?'להעלות':'להוריד'} את הריטיינר מ-${money(currentRetainer)}₪ ל-${money(ts.newRetainer)}₪.`
    : `אתה שוקל ${ts.newSetup>currentSetup?'להעלות':'להוריד'} את ההקמה מ-${money(currentSetup)}₪ ל-${money(ts.newSetup)}₪.`;

  return `
  <div class="card" style="margin-bottom:16px">
    <div class="card-h"><h3>למה הסימולטור הזה?</h3></div>
    <div style="font-size:13.5px;line-height:1.8;color:var(--txt-dim)">
      ${ts.mode==='retainer'
        ? `כשאתה <b style="color:var(--txt)">מעלה את מחיר הריטיינר</b>, כל לקוח מכניס יותר כסף — אבל המחיר היקר עלול להקשות על המכירה ולהעלות את <b style="color:var(--txt)">עלות הגיוס</b> (פחות אנשים סוגרים מאותו תקציב). הסימולטור מחשב <b style="color:var(--txt)">עד איזו עלות גיוס המהלך עדיין משתלם</b> — לכל אופק זמן. ככל שתחכה יותר, הריטיינר הגבוה מצטבר ומצדיק עלות גיוס גבוהה יותר.`
        : `כשאתה משנה את <b style="color:var(--txt)">מחיר ההקמה</b>, זה משפיע על כמה אנשים סוגרים, ולכן על <b style="color:var(--txt)">עלות הגיוס</b>. הורדת מחיר → יותר לקוחות מאותו תקציב, אבל פחות כסף מההקמה. העלאת מחיר → יותר כסף מההקמה, אבל פחות לקוחות. הסימולטור מחשב את <b style="color:var(--txt)">נקודת האיזון</b> — עד איזו עלות גיוס המהלך משתלם.`}
    </div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-h"><h3>מה לשנות?</h3></div>
    ${modeBtns}
    <div id="tradeoffControls">${controls}</div>
    ${setupToggle}
  </div>

  <div class="card">
    <div class="card-h"><h3>עד איזו עלות גיוס זה משתלם?</h3></div>
    <div style="font-size:13.5px;color:var(--txt-dim);margin-bottom:8px">${moveDesc}</div>
    <div class="hint" style="margin-bottom:14px">עלות הגיוס הנוכחית שלך: <b style="color:var(--txt)">${money(result.cac0)}₪</b> ללקוח · תקציב שיווק חודשי: <b style="color:var(--txt)">${money(result.budget)}₪</b></div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="border-bottom:1px solid var(--line-soft)">
        <th style="text-align:right;padding:10px 8px;font-size:11.5px;color:var(--txt-faint);font-weight:600">אם תחכה</th>
        <th style="text-align:center;padding:10px 8px;font-size:11.5px;color:var(--accent);font-weight:600">${colHeader}</th>
        <th style="text-align:center;padding:10px 8px;font-size:11.5px;color:var(--accent);font-weight:600">תוספת רווח</th>
        <th style="text-align:center;padding:10px 8px;font-size:11.5px;color:var(--txt-faint);font-weight:600">למה</th>
      </tr></thead>
      <tbody id="tradeoffTableBody">${tableRows}</tbody>
    </table>
    </div>
    <div class="hint" style="margin-top:12px;line-height:1.6">
      <b>תוספת רווח</b> = כמה יותר רווח תפעולי תכניס (מצטבר עד אותה נקודה), אם תשאיר את עלות הגיוס הנוכחית.<br>
      לחץ על <b>?</b> בכל שורה לפירוק מלא של החישוב.
    </div>
  </div>`;
}

function setTradeoffMode(mode){ ensureTradeoffState(); tradeoffState.mode = mode; renderScenarios(); }
function onTradeoffInput(key, val){ ensureTradeoffState(); tradeoffState[key] = parseFloat(val)||0; renderScenarios(); }
// עדכון חלק תוך כדי גרירה - מעדכן רק את הטבלה, בלי רינדור מלא (לא מאבד פוקוס)
function onTradeoffSliderLive(key, val){
  ensureTradeoffState();
  tradeoffState[key] = parseFloat(val)||0;
  updateTradeoffTable();
}
function updateTradeoffTable(){
  const tbody = document.getElementById('tradeoffTableBody');
  if(!tbody) return;
  const result = computeTradeoff();
  const horizonLabels = {1:'חודש 1', 2:'חודשיים', 3:'3 חודשים', 6:'6 חודשים', 12:'12 חודשים'};
  window._tradeoffRows = {};
  tbody.innerHTML = result.rows.map((r)=>{
    window._tradeoffRows[`_to_${r.N}`] = r;
    const cacColor = r.cacThreshold >= r.cac0 ? 'var(--accent)' : 'var(--red)';
    const deltaColor = r.profitDelta >= 0 ? 'var(--accent)' : 'var(--red)';
    return `<tr style="border-bottom:1px solid var(--line-soft)">
      <td style="padding:13px 8px;font-size:13.5px;color:var(--txt)">${horizonLabels[r.N]}</td>
      <td style="padding:13px 8px;text-align:center;font-family:'Rubik';font-weight:700;font-size:16px;color:${cacColor};direction:ltr">${money(r.cacThreshold)}₪</td>
      <td style="padding:13px 8px;text-align:center;font-family:'Rubik';font-weight:700;font-size:15px;color:${deltaColor};direction:ltr">${r.profitDelta>=0?'+':''}${money(r.profitDelta)}₪</td>
      <td style="padding:13px 8px;text-align:center"><span onclick="showTradeoffWhy('_to_${r.N}')" style="cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--bg-1);border:1px solid var(--line-soft);font-size:13px;color:var(--accent)">?</span></td>
    </tr>`;
  }).join('');
  // עדכון המספר ליד הסליידר
  const ts = tradeoffState;
  document.querySelectorAll('#tradeoffControls input[type=number]').forEach(inp=>{
    const k = inp.getAttribute('data-key');
    if(k && ts[k]!=null) inp.value = ts[k];
  });
}
function toggleTradeoffSetup(){ ensureTradeoffState(); tradeoffState.includeSetup = !tradeoffState.includeSetup; renderScenarios(); }

/* חלון הסבר מפורט לכל שורה */
function showTradeoffWhy(key){
  const r = window._tradeoffRows && window._tradeoffRows[key];
  if(!r) return;
  const ts = tradeoffState;
  const c = compute(state);
  const N = r.N;
  const horizonLabel = {1:'חודש אחד', 2:'חודשיים', 3:'שלושה חודשים', 6:'שישה חודשים', 12:'שנים-עשר חודשים'}[N];
  const salesComm = ts.salesCommPct/100;
  const onbComm = (state.onboardCommPct||0)/100;
  const proc = (state.processingFeePct||0)/100;
  const churn = state.churnRate||0;
  const retCumF = retainerCumFactor(N, churn);

  const oldRet = r.oldP.retainer, newRet = r.newP.retainer;
  const oldSetup = r.oldP.setupFee, newSetup = r.newP.setupFee;

  // פירוק baseOld
  const setupNetOld = r.includeSetup ? oldSetup*(1-salesComm)*(1-proc) : 0;
  const onbOld = oldRet*onbComm;
  const retNetOld = oldRet*(1-proc)*retCumF;
  // פירוק baseNew
  const setupNetNew = r.includeSetup ? newSetup*(1-salesComm)*(1-proc) : 0;
  const onbNew = newRet*onbComm;
  const retNetNew = newRet*(1-proc)*retCumF;

  const modeWord = ts.mode==='retainer' ? 'ריטיינר' : 'הקמה';

  let body = `
<b style="color:var(--txt);font-size:15px">מה אנחנו מחשבים?</b><br><br>
אתה רוצה לדעת: אם תעשה את המהלך (שינוי ה${modeWord}), <b>עד איזו עלות גיוס לקוח זה עדיין משתלם</b>, אם תסתכל על אופק של <b>${horizonLabel}</b>.<br><br>
הרעיון: שינוי המחיר ישפיע על כמה לקוחות תגייס מאותו תקציב שיווק. אנחנו מחפשים את עלות הגיוס שבה הרווח החדש <b>שווה בדיוק</b> לרווח הישן. מעבר לזה — מפסידים.<br><br>

<hr style="border:none;border-top:1px solid var(--line-soft);margin:14px 0">

<b style="color:var(--txt);font-size:15px">שלב 1: רווח מלקוח בודד לאורך ${horizonLabel}</b><br><br>
${r.includeSetup ? `כל לקוח מביא הכנסה חד-פעמית מההקמה, ועוד ריטיינר שחוזר כל חודש (פוחת בשחיקה ${fmt1(churn)}%).` : `<b>מתעלמים מההקמה</b> (לפי הבחירה שלך) — סופרים רק את הריטיינר שחוזר כל חודש.`}<br><br>

<b>לפני המהלך (${modeWord} ${money(ts.mode==='retainer'?oldRet:oldSetup)}₪):</b><br>`;

  if(r.includeSetup){
    body += `הקמה נטו: ${money(oldSetup)}₪ × (1−${fmt1(salesComm*100)}% עמלה) × (1−${fmt1(proc*100)}% סליקה) = <b>${money(setupNetOld)}₪</b><br>`;
  }
  body += `אונבורדינג (פעם אחת): ${money(oldRet)}₪ × ${fmt1(onbComm*100)}% = <b>−${money(onbOld)}₪</b><br>
ריטיינר מצטבר ל-${N} חודשים: ${money(oldRet)}₪ × (1−${fmt1(proc*100)}% סליקה) × ${fmt1(retCumF)} (מקדם שחיקה) = <b>${money(retNetOld)}₪</b><br>
<b style="color:var(--txt)">= ${money(r.baseOld)}₪ רווח כולל מלקוח</b><br><br>

<b>אחרי המהלך (${modeWord} ${money(ts.mode==='retainer'?newRet:newSetup)}₪):</b><br>`;
  if(r.includeSetup){
    body += `הקמה נטו: ${money(newSetup)}₪ × (1−${fmt1(salesComm*100)}% עמלה) × (1−${fmt1(proc*100)}% סליקה) = <b>${money(setupNetNew)}₪</b><br>`;
  }
  body += `אונבורדינג (פעם אחת): ${money(newRet)}₪ × ${fmt1(onbComm*100)}% = <b>−${money(onbNew)}₪</b><br>
ריטיינר מצטבר ל-${N} חודשים: ${money(newRet)}₪ × (1−${fmt1(proc*100)}% סליקה) × ${fmt1(retCumF)} = <b>${money(retNetNew)}₪</b><br>
<b style="color:var(--txt)">= ${money(r.baseNew)}₪ רווח כולל מלקוח</b><br><br>

<hr style="border:none;border-top:1px solid var(--line-soft);margin:14px 0">

<b style="color:var(--txt);font-size:15px">שלב 2: מקדם השחיקה (${fmt1(retCumF)})</b><br><br>
למה ${fmt1(retCumF)} ולא ${N}? כי לקוחות עוזבים בקצב ${fmt1(churn)}% לחודש. אז הריטיינר לא נכנס ${N} פעמים מלאות:<br>
חודש 1: 100% מהלקוחות · חודש 2: ${fmt1(100*(1-churn/100))}% · וכן הלאה. הסכום של כולם = <b>${fmt1(retCumF)}</b>.<br><br>

<hr style="border:none;border-top:1px solid var(--line-soft);margin:14px 0">

<b style="color:var(--txt);font-size:15px">שלב 3: עלות הגיוס המקסימלית (${money(r.cacThreshold)}₪)</b><br><br>
זה החלק המרכזי. הנוסחה:<br><br>
<div style="background:var(--bg-2);padding:10px;border-radius:6px;font-family:'Rubik';direction:ltr;text-align:left;font-size:13px">
עלות גיוס מקס׳ = עלות נוכחית × (רווח חדש ÷ רווח ישן)<br>
= ${money(r.cac0)} × (${money(r.baseNew)} ÷ ${money(r.baseOld)})<br>
= ${money(r.cac0)} × ${fmt1(r.baseNew/r.baseOld * 100)/100 ? (r.baseNew/r.baseOld).toFixed(3) : '1'}<br>
= <b>${money(r.cacThreshold)}₪</b>
</div><br>
<b>למה הנוסחה הזאת?</b> אנחנו רוצים שהרווח הכולל יישאר זהה. אם הרווח מכל לקוח גדל ביחס מסוים, אתה יכול להרשות לעצמך לשלם על הגיוס באותו יחס בדיוק — ולהישאר באותו רווח כולל.<br><br>

${r.cacThreshold >= r.cac0
  ? `<b style="color:var(--accent)">עלות הגיוס שלך היום (${money(r.cac0)}₪) נמוכה מהסף (${money(r.cacThreshold)}₪) — אז המהלך משתלם, ויש לך מרווח של ${money(r.cacThreshold-r.cac0)}₪.</b>`
  : `<b style="color:var(--red)">עלות הגיוס שלך היום (${money(r.cac0)}₪) גבוהה מהסף (${money(r.cacThreshold)}₪) — אז המהלך לא משתלם באופק הזה, אלא אם עלות הגיוס תרד.</b>`}<br><br>

<hr style="border:none;border-top:1px solid var(--line-soft);margin:14px 0">

<b style="color:var(--txt);font-size:15px">שלב 4: תוספת הרווח (${r.profitDelta>=0?'+':''}${money(r.profitDelta)}₪)</b><br><br>
זה כמה יותר רווח תכניס אם תעשה את המהלך <b>ותשאיר את עלות הגיוס הנוכחית</b> (${money(r.cac0)}₪):<br><br>
מספר לקוחות: ${money(r.budget)}₪ תקציב ÷ ${money(r.cac0)}₪ עלות גיוס = <b>${fmt1(r.clientsOld)} לקוחות</b><br>
רווח ישן: ${fmt1(r.clientsOld)} × (${money(r.baseOld)} − ${money(r.cac0)}) = <b>${money(r.clientsOld*(r.baseOld-r.cac0))}₪</b><br>
רווח חדש: ${fmt1(r.clientsOld)} × (${money(r.baseNew)} − ${money(r.cac0)}) = <b>${money(r.clientsOld*(r.baseNew-r.cac0))}₪</b><br>
<b style="color:${r.profitDelta>=0?'var(--accent)':'var(--red)'}">הפרש = ${r.profitDelta>=0?'+':''}${money(r.profitDelta)}₪</b>`;

  document.getElementById('modalBox').innerHTML=`<h3>${svg('info')} ${horizonLabel} — איך חישבנו</h3><div style="font-size:13.5px;color:var(--txt-dim);line-height:1.8">${body}</div><button onclick="closeModal()">הבנתי</button>`;
  document.getElementById('modalBg').classList.add('show');
}

function renderScenarios(){
  if(!simState) simState=structuredClone(state);
  // אתחול תקציב השיווק לפי המצב הנוכחי (פעם ראשונה)
  if(simState.mktBudget==null){
    const pn=planFromClients(clientsForProfit(state.goalProfit), state);
    simState.mktBudget=Math.round(pn.marketing);
  }
  const isInvest = simLock==='invest';
  const isProfit = simLock==='profitMoves';
  const isTradeoff = simLock==='tradeoff';
  // אתחול יעד הרווח לסימולציה (לפי היעד הנוכחי) אם זה המצב
  if(isProfit && simState.simProfitGoal==null) simState.simProfitGoal=state.goalProfit;
  document.getElementById('content').innerHTML=`
  <div class="page-head"><h1>סימולטור מהלכים</h1>
    <p>שנה פרמטרים בלי לגעת בנתונים האמיתיים, ותראה מיד את ההשפעה. השינויים כאן זמניים בלבד.</p></div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-h"><h3>על מה הסימולטור נעול?</h3></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      ${Object.entries(LOCK_INFO).map(([k,v])=>`
        <div class="rep-pill ${simLock===k?'active':''}" onclick="setLock('${k}')">${v.name}</div>`).join('')}
    </div>
    <div class="notice" style="margin-bottom:0"><div style="display:flex;gap:11px;align-items:flex-start">${svg('info')}<div><b>נעול על: ${LOCK_INFO[simLock].name}.</b> ${LOCK_INFO[simLock].desc}<div style="margin-top:8px;color:var(--accent);font-weight:500">${LOCK_INFO[simLock].when}</div></div></div></div>
  </div>

  ${isTradeoff ? renderTradeoffSimulator() : isProfit ? `
    <div class="card" style="margin-bottom:16px">
      <div class="card-h"><h3>יעד הרווח שלך</h3><button class="btn btn-ghost btn-sm" onclick="resetSim()">איפוס</button></div>
      ${slider('simProfitGoal','יעד רווח תפעולי חודשי',5000,200000,1000,'₪')}
      <p class="hint" style="margin-top:8px">המערכת תחשב לבד את כל המהלכים האפשריים שיביאו אותך אליו, ותדרג מה הכי משתלם.</p>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="card-h"><h3>כמה צריך לשפר כדי להגיע ליעד?</h3><span class="sub">כל מהלך לחוד — אם הולכים רק עליו</span></div>
      <div id="moveTargets"></div>
    </div>
    <div class="card">
      <div class="card-h"><h3>איזה מהלך הכי משתלם? (דירוג ROI)</h3><span class="sub">השפעה ברווח חודשי לכל יחידת שיפור</span></div>
      <div id="moveRanking"></div>
    </div>
  ` : `
  <div class="split">
    <div class="card">
      <div class="card-h"><h3>הזז פרמטרים</h3><button class="btn btn-ghost btn-sm" onclick="resetSim()">איפוס</button></div>
      ${isInvest? slider('mktBudget','תקציב שיווק חודשי',0,50000,250,'₪') : ''}
      ${slider('costPerLead','מחיר לליד',5,50,1,'₪')}

function setLock(k){ simLock=k; renderScenarios(); }
function slider(key,label,min,max,step,affix){

function onSlider(i){ simState[i.dataset.key]=parseFloat(i.value);
  // אם שינו churnRate -> נחשב מחדש avgMonths (הם תלויים)
  if(i.dataset.key==='churnRate' && simState.churnRate>0) simState.avgMonths = 100/simState.churnRate;
  const step=parseFloat(i.dataset.step)||1; const disp=step<1?fmt1(simState[i.dataset.key]):fmt(simState[i.dataset.key]);
  i.closest('.slider-row').querySelector('.sr-h b').innerHTML=`${disp} <span style="font-size:12px;color:var(--txt-dim)">${i.dataset.affix}</span>`;

function resetSim(){ simState=structuredClone(state); renderScenarios(); toast('התרחיש אופס'); }

/* מחזיר plan לפי מה שנעול */
function simPlans(){
  const cNow=compute(state), cSim=compute(simState);
  const planNow=planFromClients(clientsForProfit(state.goalProfit), state);
  let planSim, subText;
  if(simLock==='clients'){
    planSim=planFromClients(planNow.clients, simState);
    subText='מספר לקוחות נעול: '+fmt1(planNow.clients);
  } else if(simLock==='budget'){
    const fixedLeads=planNow.leads;
    planSim=planFromClients(fixedLeads*cSim.effConv, simState);
    subText='תקציב נעול: '+money(planNow.marketing)+'₪ ('+fmt(fixedLeads)+' לידים)';
  } else if(simLock==='invest'){
    const leads = simState.costPerLead>0 ? simState.mktBudget/simState.costPerLead : 0;
    planSim=planFromClients(leads*cSim.effConv, simState);
    subText='תקציב שיווק: '+money(simState.mktBudget)+'₪ → '+fmt(leads)+' לידים';
  } else { // revenue - מחזור חודשי נעול, מוצאים כמה לקוחות חדשים צריך
    const fixedRev=planNow.revenue;
    // המחזור החודשי = הקמות חדשות + ריטיינר ראשון של חדשים + ריטיינר מבסיס קיים
    // N*(setup+retainer) + existingRetainer = fixedRev → N = (fixedRev - existingRetainer)/(setup+retainer)
    const denom = simState.setupFee + simState.retainer;
    const N = denom>0 ? Math.max(0, (fixedRev - cSim.monthlyRetainerFromBase)/denom) : 0;
    planSim=planFromClients(N, simState);
    subText='מחזור נעול: '+money(fixedRev)+'₪';
  }
  return {cNow,cSim,planNow,planSim,subText};
}

/* מחשב את השפעת שינוי על סך הרווח התפעולי לאורך 12 חודשים.
   הרעיון: מריץ סימולציה ב-2 תרחישים, ההפרש = ההשפעה האמיתית.
   tweakFn מקבל עותק של state ומשנה אותו.
   monthlyNewClients = כמה לקוחות חדשים מצטרפים בכל חודש (קצב נוכחי). */
function impact12Months(monthlyNewClients, tweakFn){
  // תרחיש בסיס - בלי שינוי
  const baseSum = forecast12Months(monthlyNewClients, state).reduce((s,m)=>s+m.operating, 0);
  // תרחיש משופר - עם השינוי
  const tweakedState = structuredClone(state);
  tweakFn(tweakedState);
  // עדכון avgMonths אם שינו churnRate
  if(tweakedState.churnRate>0) tweakedState.avgMonths = 100/tweakedState.churnRate;
  const newSum = forecast12Months(monthlyNewClients, tweakedState).reduce((s,m)=>s+m.operating, 0);
  return newSum - baseSum;
}

/* מצב יעד-רווח: חישוב מה המהלכים שיביאו ליעד, ודירוג ROI */
function updateProfitMoves(){
  const s=state;                                          // נקודת מוצא = מצב נוכחי
  const c=compute(s);
  const goal = simState.simProfitGoal || s.goalProfit;
  // לקוחות נוכחיים (לפי יעד הרווח הנוכחי במציאות)
  const currentPlan = planFromClients(clientsForProfit(s.goalProfit), s);
  const currentClients = currentPlan.clients;
  const currentLeads   = currentPlan.leads;
  const currentProfit  = s.goalProfit;                    // הרווח הנוכחי שאתה מתכנן (כיעד)
  // יעד הלקוחות אם לא משנים כלום אחר - לפי המודל החודשי
  const targetClients = newClientsForMonthlyProfit(goal, s);

  // ========= ROI לכל פרמטר במודל חודשי =========
  // רווח חודשי מלקוח חדש *ללא* שיווק (שיווק נחשב בנפרד ב-roi_lead)
  // משמש בחישובי ROI שאינם נוגעים לעלות גיוס
  const profitPerClientPreMarketing = (s.setupFee + c.retainerForNew)*(1 - c.procPct) - s.setupFee*c.commPct - c.retainerForNew*c.onbCommPct;
  // לתצוגה ולחישובים שכוללים את עלות השיווק
  const profitPerClientNet = profitFromOneNewClient(s); // כולל שיווק

  // 1) +1 ליד בחודש: ליד נוסף = effConv לקוח חדש × רווח (ללא שיווק) פחות עלות הליד
  const roi_lead = c.effConv * profitPerClientPreMarketing - s.costPerLead;
  // 2) +1% באחוז סגירה: leads * answer * 0.01 לקוחות נוספים × רווח (ללא שיווק - הלידים כבר שולמו)
  const roi_closePerPP = currentLeads * c.answer * 0.01 * profitPerClientPreMarketing;
  // 3) +1% באחוז מענה
  const roi_answerPerPP = currentLeads * 0.01 * c.close * profitPerClientPreMarketing;
  // 4) +10 ₪ במחיר הקמה: clients * 10 * (1-commPct-procPct) - על לקוחות חדשים בלבד
  const roi_setupPer10 = currentClients * 10 * (1 - c.commPct - c.procPct);
  // 5) +10 ₪ בריטיינר חדש - **רק על לקוחות חדשים שיצטרפו, לא על בסיס קיים**
  //    (כי לא ניתן להעלות מחיר לקיימים)
  const roi_retainerPer10 = currentClients * 10 * (1 - c.onbCommPct - c.procPct);
  // 6) -1% בשחיקה חודשית: הבסיס הקיים שורד יותר, יותר ריטיינר נשמר
  //    activeNow * 0.005 פחות לקוחות שיעזבו במחצית החודש - לפי המחיר הישן (s.retainer)
  const roi_churnPerPP = c.activeNow * 0.005 * s.retainer * (1 - c.procPct);
  // 7) הפחתת -1 ₪ במחיר ליד
  const roi_cplPer1 = currentLeads * 1;
  // 8) -1% בעמלת מכירות: clients * setupFee * 0.01
  const roi_commPerPP = currentClients * s.setupFee * 0.01;

  // קיבולת צוות לבדיקת ריאליות
  const capacity = c.callsPerMonthPerRep * Math.max(parseInt(s.teamSize)||1,1);
  const callsNow = currentLeads * c.answer; // שיחות שענו במצב הנוכחי
  const teamSize = Math.max(parseInt(s.teamSize)||1,1);

  // פתרונות לבעיית קיבולת - מקבל כמה שיחות צריך, מחזיר 3 אופציות
  const capacitySolutions = (callsNeeded) => {
    // אופציה 1: לקצר אורך שיחה
    const newCallMin = (s.workHoursDay*60 * s.workDaysMonth * teamSize) / callsNeeded;
    // אופציה 2: יותר שעות עבודה ביום
    const newWorkHours = (callsNeeded * s.callMin) / (60 * s.workDaysMonth * teamSize);
    // אופציה 3: יותר נציגים
    const newTeam = Math.ceil(callsNeeded / c.callsPerMonthPerRep);
    return {
      callMin: { feasible: newCallMin >= 10, value: newCallMin, current: s.callMin },
      workHours: { feasible: newWorkHours <= 10, value: newWorkHours, current: s.workHoursDay },
      teamSize: { value: newTeam, current: teamSize, delta: newTeam - teamSize },
    };
  };

  // ====== ROI איש מכירות נוסף ======
  // לוגיקה: איש מכירות נוסף = +callsPerMonthPerRep שיחות מקסימליות
  // אם הקיבולת הנוכחית מספיקה (callsNow <= capacity) - איש נוסף יעזור רק אם נביא יותר לידים
  // אם הקיבולת לא מספיקה - איש נוסף יסגור את הפער מהלידים הקיימים
  const extraCapacity = c.callsPerMonthPerRep; // קיבולת נוספת של איש אחד
  let roi_addRep_gross = 0;     // רווח ברוטו מהיכולת הנוספת
  let roi_addRep_extraLeads = 0; // לידים נוספים שצריך
  let roi_addRep_extraBudget = 0; // תקציב נוסף שצריך
  let roi_addRep_net = 0;        // ROI נטו (ברוטו פחות תקציב שיווק)
  let roi_addRep_callsFromCurrentLeads = 0; // שיחות נוספות מהלידים הקיימים
  if(callsNow < capacity){
    // קיבולת מספיקה - איש נוסף יעזור רק אם נביא יותר לידים
    // הוא יסגור עוד עסקאות לפי הקיבולת הנוספת (callsPerMonthPerRep × closeRate)
    // אבל צריך לידים: extraCapacity / answerRate
    roi_addRep_extraLeads = extraCapacity / c.answer;
    roi_addRep_extraBudget = roi_addRep_extraLeads * s.costPerLead;
    const extraClosesGross = extraCapacity * c.close * profitPerClientPreMarketing;
    roi_addRep_gross = extraClosesGross;
    roi_addRep_net = extraClosesGross - roi_addRep_extraBudget;
  } else {
    // הקיבולת קיימת היא צוואר בקבוק - איש נוסף סוגר את הפער עד שזה נגמר
    // שיחות שלא נסגרו בגלל קיבולת = callsNow - capacity
    const callsBacklogPerMonth = callsNow - capacity;
    // איש אחד יסגור עד extraCapacity שיחות מתוך הbacklog
    roi_addRep_callsFromCurrentLeads = Math.min(extraCapacity, callsBacklogPerMonth);
    roi_addRep_net = roi_addRep_callsFromCurrentLeads * c.close * profitPerClientPreMarketing;
    roi_addRep_gross = roi_addRep_net;
    // אם הbacklog קטן מהקיבולת הנוספת, צריך עוד לידים לחלק מהקיבולת
    const remainingCapacity = extraCapacity - roi_addRep_callsFromCurrentLeads;
    if(remainingCapacity>0){
      roi_addRep_extraLeads = remainingCapacity / c.answer;
      roi_addRep_extraBudget = roi_addRep_extraLeads * s.costPerLead;
      const extraFromMoreLeads = remainingCapacity * c.close * profitPerClientPreMarketing - roi_addRep_extraBudget;
      roi_addRep_net += extraFromMoreLeads;
      roi_addRep_gross += remainingCapacity * c.close * profitPerClientPreMarketing;
    }
  }
  // טקסט הסבר ונוסחה
  const dailyBudget = state.daysMonth>0 ? roi_addRep_extraBudget/state.daysMonth : 0;
  let addRepExplain, addRepFormula;
  if(callsNow < capacity){
    addRepExplain = `הקיבולת הנוכחית של הצוות מספיקה. כדי לנצל איש מכירות נוסף, צריך גם להוסיף ${fmt1(roi_addRep_extraLeads)} לידים בחודש (תקציב נוסף ${money(roi_addRep_extraBudget)}₪ בחודש = ${money(dailyBudget)}₪ ביום).`;
    addRepFormula = `${fmt(extraCapacity)} שיחות נוספות × ${fmt1(s.closeRate)}% סגירה × ${money(profitPerClientPreMarketing)}₪ − ${money(roi_addRep_extraBudget)}₪ תקציב נוסף`;
  } else {
    const backlog = Math.round(callsNow - capacity);
    if(roi_addRep_extraLeads>0){
      addRepExplain = `יש לך ${backlog} שיחות בחודש שלא מצליחות להתבצע עקב חוסר קיבולת. איש מכירות נוסף יסגור את כולן + יזדקק לעוד ${fmt1(roi_addRep_extraLeads)} לידים בחודש (תקציב נוסף ${money(roi_addRep_extraBudget)}₪ בחודש = ${money(dailyBudget)}₪ ביום).`;
    } else {
      addRepExplain = `יש לך ${backlog} שיחות בחודש שלא מצליחות להתבצע עקב חוסר קיבולת. איש מכירות נוסף יסגור עוד ${fmt1(roi_addRep_callsFromCurrentLeads)} שיחות מהלידים הקיימים שלך. לא נדרשים לידים נוספים.`;
    }
    addRepFormula = `${fmt(roi_addRep_callsFromCurrentLeads)} שיחות מהפער הקיים × ${fmt1(s.closeRate)}% סגירה × ${money(profitPerClientPreMarketing)}₪`;
  }
  // ========= חישוב השפעה ל-12 חודשים לכל מהלך =========
  // כל מהלך מסווג: 'recurring' = השפעה חוזרת בכל חודש (פעמים 12)
  //                'growing' = השפעה גדלה לאורך זמן (פעמים ~13-15 כי הבסיס גדל)
  //                'oneTime' = השפעה חד-פעמית (פעמים 1)
  // המכפיל מקורב — לא חישוב מדויק
  // ========= חישוב השפעה אמיתית ל-12 חודשים =========
  // הרעיון: מריץ סימולציית 12 חודשים פעמיים — עם המצב הנוכחי ועם השינוי, וההפרש = ההשפעה
  // קצב הגיוס לסימולציה = מספר הלקוחות הנוכחי (currentClients)
  const monthlyNewForSim = currentClients;
  // כל מהלך מסווג: 'recurring' = השפעה חוזרת בכל חודש
  //                'growing' = השפעה גדלה לאורך זמן (הבסיס גדל)
  const moves = [
    {name:'תוסיף לידים', unit:'10 לידים בחודש', effect: roi_lead*10, color:'blue', icon:'lead', capImpact:'leads',
      type:'recurring',
      impact12: impact12Months(monthlyNewForSim+ (10*c.effConv), st=>{}) - 0, // קירוב: לידים נוספים = יותר לקוחות חדשים פר חודש
      // למעשה החישוב הזה לא תקף כי כבר monthlyNewForSim כולל את החדשים. נחשב נכון:
      explain:'כל 10 לידים נוספים → נהפכים בחלקם ללקוחות לפי אחוז ההמרה, פחות עלות הלידים עצמם',
      formula:`10 לידים × ${fmt1(c.effConv*100)}% המרה × ${money(profitPerClientPreMarketing)}₪ רווח חודשי ללקוח − 10 × ${s.costPerLead}₪ עלות`},
    {name:'תעלה אחוז סגירה', unit:'אחוז', effect: roi_closePerPP, color:'green', icon:'conv', capImpact:'close',
      type:'recurring',
      impact12: impact12Months(monthlyNewForSim, st=>{ st.closeRate += 1; }),
      explain:'אחוז סגירה משפיע רק על השיחות שענו להן (לכן אחוז המענה בחישוב). כל +1% = יותר לקוחות מאותם לידים',
      formula:`${fmt(currentLeads)} לידים × ${s.answerRate}% מענה × 1% × ${money(profitPerClientPreMarketing)}₪`},
    {name:'תעלה אחוז מענה', unit:'אחוז', effect: roi_answerPerPP, color:'purple', icon:'phone', capImpact:'answer',
      type:'recurring',
      impact12: impact12Months(monthlyNewForSim, st=>{ st.answerRate += 1; }),
      explain:'אחוז מענה מביא יותר שיחות, אבל רק חלק מהן ייסגרו (לכן אחוז הסגירה בחישוב)',
      formula:`${fmt(currentLeads)} לידים × 1% × ${s.closeRate}% סגירה × ${money(profitPerClientPreMarketing)}₪`},
    {name:'תעלה מחיר הקמה', unit:'10 ₪', effect: roi_setupPer10, color:'amber', icon:'wallet',
      type:'recurring',
      impact12: impact12Months(monthlyNewForSim, st=>{ st.setupFee += 10; }),
      explain:'כל ₪ נוסף בהקמה הוא הכנסה ישירה לכל לקוח חדש, פחות עמלת המכירות והסליקה שגדלות יחד איתו',
      formula:`${fmt1(currentClients)} לקוחות × 10₪ × (1 − ${s.salesCommPct}% עמלה − ${s.processingFeePct}% סליקה)`},
    {name:'תעלה ריטיינר ללקוחות חדשים', unit:'10 ₪', effect: roi_retainerPer10, color:'green', icon:'repeat',
      type:'growing',
      impact12: impact12Months(monthlyNewForSim, st=>{ st.retainerNew = (st.retainerNew||st.retainer) + 10; }),
      explain:'כל ₪ נוסף בריטיינר ללקוחות חדשים שיגויסו החודש. לא משפיע על הבסיס הקיים (אי-אפשר להעלות מחיר ללקוחות קיימים).',
      formula:`${fmt1(currentClients)} לקוחות חדשים × 10₪ × (1−${s.onboardCommPct}% עמלת אונבורדינג − ${s.processingFeePct}% סליקה)`},
    {name:'תוריד שחיקה חודשית', unit:'אחוז', effect: roi_churnPerPP, color:'green', icon:'repeat',
      type:'growing',
      impact12: impact12Months(monthlyNewForSim, st=>{ st.churnRate = Math.max(0.01, st.churnRate - 1); }),
      explain:`כל 1% פחות שחיקה = ${fmt1(c.activeNow*0.01)} לקוחות פחות עוזבים החודש. הם משלמים בממוצע חצי חודש (כי השחיקה מתפזרת לאורך החודש). זה מספר קטן יחסית לחודש אחד, אבל מצטבר חודש אחר חודש ובונה את הבסיס לטווח ארוך.`,
      formula:`${fmt1(c.activeNow)} פעילים × ½% × ${money(s.retainer)}₪ × ${fmt1(100-s.processingFeePct)}% אחרי סליקה = ${money(roi_churnPerPP)}₪ <b>בחודש אחד</b>`},
    {name:'תוריד עמלת מכירות', unit:'אחוז', effect: roi_commPerPP, color:'amber', icon:'percent',
      type:'recurring',
      impact12: impact12Months(monthlyNewForSim, st=>{ st.salesCommPct = Math.max(0, st.salesCommPct - 1); }),
      explain:'הורדה של 1% בעמלה = חיסכון של 1% ממחיר ההקמה על כל לקוח חדש',
      formula:`${fmt1(currentClients)} לקוחות × ${money(s.setupFee)}₪ הקמה × 1%`},
    {name:'תוריד מחיר ליד', unit:'1 ₪', effect: roi_cplPer1, color:'red', icon:'target',
      type:'recurring',
      impact12: impact12Months(monthlyNewForSim, st=>{ st.costPerLead = Math.max(0.01, st.costPerLead - 1); }),
      explain:'הורדה של ₪ אחד בעלות הליד = חיסכון של ₪ אחד על כל ליד שנכנס לאורך החודש',
      formula:`${fmt(currentLeads)} לידים × 1₪ חיסכון לליד`},
    {name:'תוסיף איש מכירות', unit:'לכל איש מכירות באחוז המרה נוכחי', effect: roi_addRep_net, color:'purple', icon:'users',
      type:'recurring',
      impact12: roi_addRep_net * 12, // לסימולציה זו לא ניתן לשנות teamSize, אז קירוב פשוט × 12
      explain: addRepExplain,
      formula: addRepFormula},
  ];
  // חישוב מיוחד ל"תוסיף לידים": ההפרש בין סימולציה עם +10×effConv לקוחות חודשיים, פחות התקציב הנוסף
  const extraLeadsMonthlyClients = 10 * c.effConv;
  const extraLeadsCost = 10 * s.costPerLead * 12; // עלות 10 לידים × 12 חודשים
  const baseSum12 = forecast12Months(monthlyNewForSim, state).reduce((s,m)=>s+m.operating, 0);
  const withExtraLeadsSum = forecast12Months(monthlyNewForSim + extraLeadsMonthlyClients, state).reduce((s,m)=>s+m.operating, 0);
  moves[0].impact12 = (withExtraLeadsSum - baseSum12) - extraLeadsCost;
  moves.sort((a,b)=>b.effect-a.effect);
  const maxAbs = Math.max(...moves.map(m=>Math.abs(m.effect)),1);
  // הסבר על ROI בראש הטבלה
  const headerNote = `<div style="background:rgba(73,170,255,.08);border:1px solid rgba(73,170,255,.2);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:12.5px;color:var(--txt-dim);line-height:1.6">
    <div style="display:flex;align-items:flex-start;gap:8px"><span style="color:var(--blue);flex-shrink:0;margin-top:2px">${svg('info')}</span><div>
    <b style="color:var(--txt)">איך לקרוא את הטבלה:</b><br>
    <b>החודש</b> = ההשפעה הצפויה ברווח התפעולי החודש, אם תשנה רק את הפרמטר הזה.<br>
    <b>12 חודש</b> = ההשפעה המצטברת ברווח לאורך 12 חודשים, מחושבת באמצעות סימולציה אמיתית — מריץ את העסק 12 חודשים קדימה (לפי הקצב הנוכחי של ${fmt1(monthlyNewForSim)} לקוחות חדשים בחודש) פעם עם המצב הנוכחי ופעם עם השינוי, וההפרש = הערך הזה.<br>
    <b>חשוב:</b> שינויים כמו הורדת שחיקה או העלאת ריטיינר נראים קטנים בחודש בודד אבל גדלים לאורך זמן, כי הבסיס שלך גדל.
    </div></div>
  </div>`;
  document.getElementById('moveRanking').innerHTML = headerNote + moves.map((m,i)=>{
    const yearly = m.impact12 || 0;
    const typeLabel = m.type==='growing' ? 'גדל לאורך זמן' : (m.type==='recurring' ? 'חוזר כל חודש' : 'חד-פעמי');
    const typeColor = m.type==='growing' ? 'var(--accent)' : (m.type==='recurring' ? 'var(--blue)' : 'var(--txt-faint)');
    return `
    <div style="padding:14px 0;${i<moves.length-1?'border-bottom:1px solid var(--line-soft)':''}">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="background:var(--${m.color}-soft);color:${COLORS[m.color]};width:32px;height:32px;border-radius:8px;display:grid;place-items:center;flex-shrink:0">${svg(m.icon)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px">${m.name}</div>
          <div style="font-size:12px;color:var(--txt-faint)">לכל ${m.unit} · <span style="color:${typeColor}">${typeLabel}</span></div>
        </div>
        <div style="display:flex;gap:14px;align-items:center;min-width:240px;justify-content:flex-end">
          <div style="text-align:left">
            <div style="font-size:10.5px;color:var(--txt-faint);margin-bottom:2px">החודש</div>
            <div style="font-family:'Rubik';font-weight:800;font-size:16px;color:${m.effect>=0?'var(--accent)':'var(--red)'};direction:ltr">${m.effect>=0?'+':''}${money(m.effect)}₪</div>
          </div>
          <div style="text-align:left;border-right:1px dashed var(--line-soft);padding-right:14px">
            <div style="font-size:10.5px;color:var(--txt-faint);margin-bottom:2px">12 חודש (מצטבר)</div>
            <div style="font-family:'Rubik';font-weight:800;font-size:16px;color:${yearly>=0?'var(--accent)':'var(--red)'};direction:ltr;opacity:.85">${yearly>=0?'+':''}${money(yearly)}₪</div>
          </div>
        </div>
      </div>
      <div style="margin-top:8px;margin-right:44px;line-height:1.6;direction:rtl">
        <div style="font-size:12px;color:var(--txt-dim);margin-bottom:3px">${m.explain}</div>
        <div style="font-size:11.5px;color:var(--txt-faint)"><b style="color:var(--txt-dim)">חישוב:</b> ${m.formula}</div>
      </div>
    </div>`;}).join('');

  // ========= כמה צריך לשפר כדי להגיע ליעד (כל מהלך לחוד) =========
  const profitGap = goal - currentProfit;
  const gapEl = document.getElementById('moveTargets');
  if(Math.abs(profitGap) < 1){
    gapEl.innerHTML = `<div class="notice ok" style="margin:0">${svg('info')}<div>היעד זהה לרווח הנוכחי שלך. תזיז את הסליידר למעלה כדי לראות מה צריך כדי להעלות אותו.</div></div>`;
    return;
  }
  if(profitGap < 0){
    gapEl.innerHTML = `<div class="notice" style="margin:0">${svg('info')}<div>היעד נמוך מהרווח הנוכחי. הסימולטור הזה מתמקד בלהעלות רווח — תזיז את הסליידר מעל הרווח הנוכחי (${money(currentProfit)}₪).</div></div>`;
    return;
  }
  // לכל מהלך: כמה יחידות צריך + הערך החדש + בדיקת ריאליות
  // לוגיקה: רק "תוסיף לידים" מגדיל את עומס השיחות → רק הוא נבדק מול קיבולת
  // למהלכים שמשפרים אחוז (סגירה/מענה) — בדיקה אם המהלך לבד אפשרי, או שדורש גם תוספת לידים
  const targets=[];
  const callsCapped = currentLeads * c.answer; // השיחות שענו עליהן היום

  // ====== תוסיף לידים ======
  if(roi_lead>0){
    const dLeads = profitGap/roi_lead;
    const newLeads = currentLeads+dLeads;
    const newCallsAnswered = newLeads * c.answer;
    const over = newCallsAnswered > capacity;
    targets.push({name:'תוסיף לידים', from:Math.round(currentLeads), to:Math.round(newLeads),
      delta:'+'+fmt(dLeads), unit:'לידים בחודש', color:'blue', icon:'lead',
      cap: over ? {ok:false, needed:newCallsAnswered, capacity, solutions: capacitySolutions(newCallsAnswered)} : null});
  }

  // ====== תעלה אחוז סגירה ======
  // בודק אם השיפור הנדרש גבוה מתקרה ריאלית (80%). אם כן — צריך גם תוספת לידים.
  if(roi_closePerPP>0){
    const CAP_CLOSE = 80; // תקרה ריאלית לאחוז סגירה
    const dClose = profitGap/roi_closePerPP;
    const newClose = s.closeRate + dClose;
    if(newClose <= CAP_CLOSE){
      // המהלך לבד מספיק, ללא דרישה לעוד לידים
      targets.push({name:'תעלה אחוז סגירה', from:fmt1(s.closeRate)+'%', to:fmt1(newClose)+'%',
        delta:'+'+fmt1(dClose)+' נקודות', unit:'אחוז סגירה', color:'green', icon:'conv'});
    } else {
      // לא ניתן להגיע ליעד רק בשיפור אחוז סגירה — צריך גם לידים נוספים
      // נחשב: אם נעלה את אחוז הסגירה ל-80%, כמה לידים נוספים נצטרך?
      const maxedClose = CAP_CLOSE/100;
      const newEffMax = c.answer * maxedClose;
      // ROI של ליד בהמרה החדשה - לפי המודל החודשי
      const roiLeadAtMax = newEffMax * profitPerClientPreMarketing - s.costPerLead;
      // כמה רווח נשיג מהשיפור עד לתקרה?
      const profitFromMaxClose = roi_closePerPP * (CAP_CLOSE - s.closeRate);
      const remainingGap = profitGap - profitFromMaxClose;
      const extraLeads = roiLeadAtMax>0 ? remainingGap/roiLeadAtMax : Infinity;
      const newLeads = currentLeads + extraLeads;
      const newCallsAnswered = newLeads * c.answer;
      const over = newCallsAnswered > capacity;
      targets.push({name:'תעלה אחוז סגירה', from:fmt1(s.closeRate)+'%', to:CAP_CLOSE+'% (תקרה)',
        delta:'+'+fmt1(CAP_CLOSE-s.closeRate)+' נקודות (לתקרה)', unit:'אחוז סגירה', color:'green', icon:'conv',
        needsExtraLeads: {amount: extraLeads, over, needed: newCallsAnswered, capacity, solutions: over ? capacitySolutions(newCallsAnswered) : null}});
    }
  }

  // ====== תעלה אחוז מענה ======
  if(roi_answerPerPP>0){
    const CAP_ANS = 100;
    const dAns = profitGap/roi_answerPerPP;
    const newAns = s.answerRate + dAns;
    if(newAns <= CAP_ANS){
      targets.push({name:'תעלה אחוז מענה', from:fmt1(s.answerRate)+'%', to:fmt1(newAns)+'%',
        delta:'+'+fmt1(dAns)+' נקודות', unit:'אחוז מענה', color:'purple', icon:'phone'});
    } else {
      const maxedAns = 1.0;
      const newEffMax = maxedAns * c.close;
      const roiLeadAtMax = newEffMax * profitPerClientPreMarketing - s.costPerLead;
      const profitFromMaxAns = roi_answerPerPP * (CAP_ANS - s.answerRate);
      const remainingGap = profitGap - profitFromMaxAns;
      const extraLeads = roiLeadAtMax>0 ? remainingGap/roiLeadAtMax : Infinity;
      const newLeads = currentLeads + extraLeads;
      const newCallsAnswered = newLeads * maxedAns; // עם 100% מענה
      const over = newCallsAnswered > capacity;
      targets.push({name:'תעלה אחוז מענה', from:fmt1(s.answerRate)+'%', to:'100% (תקרה)',
        delta:'+'+fmt1(CAP_ANS-s.answerRate)+' נקודות (לתקרה)', unit:'אחוז מענה', color:'purple', icon:'phone',
        needsExtraLeads: {amount: extraLeads, over, needed: newCallsAnswered, capacity, solutions: over ? capacitySolutions(newCallsAnswered) : null}});
    }
  }

  // ====== מחיר הקמה ======
  const setupSlope = currentClients*(1-c.commPct-c.procPct);
  if(setupSlope>0){
    const dSetup=profitGap/setupSlope;
    targets.push({name:'תעלה מחיר הקמה', from:money(s.setupFee)+'₪', to:money(s.setupFee+dSetup)+'₪', delta:'+'+money(dSetup)+'₪', unit:'מחיר הקמה', color:'amber', icon:'wallet'});
  }
  // ====== ריטיינר ללקוחות חדשים ======
  // שיפוע = רק על חדשים שיגויסו החודש (אי-אפשר להעלות מחיר לבסיס הקיים)
  const retainerSlope = currentClients * (1 - c.onbCommPct - c.procPct);
  if(retainerSlope>0){
    const dRet=profitGap/retainerSlope;
    targets.push({name:'תעלה ריטיינר ללקוחות חדשים', from:money(c.retainerForNew)+'₪', to:money(c.retainerForNew+dRet)+'₪', delta:'+'+money(dRet)+'₪', unit:'ריטיינר חדשים', color:'green', icon:'repeat'});
  }
  // ====== תוריד שחיקה חודשית ======
  // שיפוע = activeNow * 0.005 * retainer * (1 - proc)  לכל 1% הורדה
  const churnSlope = c.activeNow * 0.005 * s.retainer * (1 - c.procPct);
  if(churnSlope>0 && s.churnRate>0){
    const dChurn=profitGap/churnSlope;
    const wouldBeNeg = dChurn >= s.churnRate;
    targets.push({name:'תוריד שחיקה חודשית', from:fmt1(s.churnRate)+'%',
      to: wouldBeNeg ? '0% (תקרה)' : fmt1(Math.max(0,s.churnRate-dChurn))+'%',
      delta: wouldBeNeg ? '−'+fmt1(s.churnRate)+' נקודות (לתקרה)' : '−'+fmt1(dChurn)+' נקודות',
      unit:'שחיקה חודשית', color:'green', icon:'repeat',
      infeasible: wouldBeNeg ? 'אי אפשר להוריד שחיקה ל-0%. תרכז במקביל את שאר המהלכים' : null});
  }
  // ====== עמלת מכירות ======
  const commSlope = currentClients*s.setupFee*0.01;
  if(commSlope>0 && s.salesCommPct>0){
    const dComm=profitGap/commSlope;
    const wouldBeNeg = dComm >= s.salesCommPct;
    targets.push({name:'תוריד עמלת מכירות', from:fmt1(s.salesCommPct)+'%',
      to: wouldBeNeg ? '0% (תקרה)' : fmt1(s.salesCommPct-dComm)+'%',
      delta: wouldBeNeg ? '−'+fmt1(s.salesCommPct)+' נקודות (לתקרה)' : '−'+fmt1(dComm)+' נקודות',
      unit:'עמלת מכירות', color:'amber', icon:'percent',
      infeasibleAlone: wouldBeNeg ? 'אי אפשר להוריד את העמלה מתחת ל-0%. גם בביטול מלא של העמלה לא תגיע ליעד לבד — צריך לשלב מהלך נוסף.' : null});
  }
  // ====== מחיר ליד ======
  if(currentLeads>0){
    const dCpl=profitGap/currentLeads;
    const wouldBeNeg = dCpl >= s.costPerLead;
    targets.push({name:'תוריד מחיר ליד', from:fmt1(s.costPerLead)+'₪',
      to: wouldBeNeg ? '0₪ (תקרה)' : fmt1(s.costPerLead-dCpl)+'₪',
      delta: wouldBeNeg ? '−'+fmt1(s.costPerLead)+'₪ (לתקרה)' : '−'+fmt1(dCpl)+'₪',
      unit:'מחיר ליד', color:'red', icon:'target',
      infeasibleAlone: wouldBeNeg ? 'אי אפשר שמחיר ליד יהיה שלילי. גם בלידים בחינם לא תגיע ליעד לבד — צריך לשלב מהלך נוסף.' : null});
  }
  targets.sort((a,b)=>0);
  gapEl.innerHTML = `
    <p class="hint" style="margin-bottom:14px">כל אופציה לבד תספיק להגיע ליעד של ${money(goal)}₪. בפועל, אפשר גם לשלב כמה מהלכים יחד בפחות מאמץ.</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px">
    ${targets.map(t=>{
      const overCap = t.cap && !t.cap.ok;
      const needsExtra = t.needsExtraLeads;
      const extraOver = needsExtra && needsExtra.over;
      const infeasible = t.infeasibleAlone;
      const hasIssue = overCap || extraOver || infeasible;
      return `<div style="background:var(--bg-2);border:1px solid ${hasIssue?'rgba(255,107,107,.4)':(needsExtra?'rgba(255,179,77,.4)':'var(--line-soft)')};border-radius:12px;padding:14px;${hasIssue?'opacity:0.9':''}">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:8px">
          <div style="background:var(--${t.color}-soft);color:${COLORS[t.color]};width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex-shrink:0">${svg(t.icon)}</div>
          <b style="font-size:13.5px">${t.name}</b>
          ${overCap?'<span class="tag red" style="font-size:10.5px;margin-right:auto">לא ריאלי</span>':''}
          ${needsExtra && !extraOver?'<span class="tag amber" style="font-size:10.5px;margin-right:auto">דורש גם לידים</span>':''}
          ${extraOver?'<span class="tag red" style="font-size:10.5px;margin-right:auto">לא ריאלי לבד</span>':''}
          ${infeasible?'<span class="tag red" style="font-size:10.5px;margin-right:auto">לא ריאלי לבד</span>':''}
        </div>
        <div style="font-family:'Rubik';font-weight:800;font-size:20px;color:${hasIssue?'var(--txt-dim)':'var(--accent)'};direction:ltr;text-align:right">${t.delta}</div>
        <div class="hint" style="margin-top:4px">מ-${t.from} ל-${t.to}</div>
        ${overCap?`<div style="margin-top:8px;padding:8px 10px;background:var(--red-soft);border-radius:8px;font-size:11.5px;color:var(--red);line-height:1.5">⚠ דורש ${fmt(t.cap.needed)} שיחות לחודש אבל הצוות יכול ${fmt(t.cap.capacity)}.</div>${renderSolutions(t.cap.solutions)}`:''}
        ${needsExtra && !extraOver?`<div style="margin-top:8px;padding:8px 10px;background:var(--amber-soft);border-radius:8px;font-size:11.5px;color:var(--amber);line-height:1.5">המהלך לבד מגיע לתקרה ועדיין לא מספיק. צריך גם להוסיף <b>${fmt(needsExtra.amount)} לידים נוספים</b> כדי להשלים.</div>`:''}
        ${extraOver?`<div style="margin-top:8px;padding:8px 10px;background:var(--red-soft);border-radius:8px;font-size:11.5px;color:var(--red);line-height:1.5">⚠ גם בתקרה צריך עוד ${fmt(needsExtra.amount)} לידים → ${fmt(needsExtra.needed)} שיחות, מעבר לקיבולת ${fmt(needsExtra.capacity)}.</div>${renderSolutions(needsExtra.solutions)}`:''}
        ${infeasible?`<div style="margin-top:8px;padding:8px 10px;background:var(--red-soft);border-radius:8px;font-size:11.5px;color:var(--red);line-height:1.5">⚠ ${infeasible}</div>`:''}
      </div>`;
    }).join('')}
    </div>`;
}

function updateSim(){
  if(simLock==='profitMoves'){ updateProfitMoves(); return; }
  const {cNow,cSim,planNow,planSim,subText}=simPlans();
  const ss=document.getElementById('simSub'); if(ss) ss.textContent=subText;
  const dP=planSim.operating-planNow.operating;
  document.getElementById('simImpact').innerHTML=`
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:6px">
      <span style="font-family:'Rubik';font-size:38px;font-weight:800;color:${dP>=0?'var(--accent)':'var(--red)'}">${dP>=0?'+':''}${money(dP)}</span>
      <span style="color:var(--txt-dim)">₪ שינוי ברווח</span></div>
    <p style="font-size:13px;color:var(--txt-dim)">השוואה למצב הנוכחי, כשהערך הנעול נשאר קבוע.</p>
    <div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${simMini(L('bd_marketing'),money(planSim.marketing)+'₪',planSim.marketing,planNow.marketing,false)}
      ${simMini(L('bd_leads'),fmt(planSim.leads),planSim.leads,planNow.leads,false)}
      ${simMini('שיחות שענו',fmt(planSim.calls),planSim.calls,planNow.calls,false)}
      ${simMini('לקוחות',fmt1(planSim.clients),planSim.clients,planNow.clients,true)}
    </div>`;

  // בדיקת קיבולת — בכל הסימולטורים
  const capEl=document.getElementById('simCapacity');
  if(capEl){
    const teamSize=Math.max(parseInt(state.teamSize)||1,1);
    const capacity=cSim.callsPerMonthPerRep*teamSize;   // מקסימום שיחות שענו שהצוות יכול לטפל בהן
    const needed=planSim.calls;                          // שיחות שענו שצריך לטפל בהן
    const over=needed>capacity;
    const util=capacity>0?needed/capacity*100:0;
    // הצעת פתרון תלוית מצב
    let fixHint;
    if(simLock==='invest'){
      fixHint = `הגדל שעות עבודה (כרגע ${fmt1(simState.workHoursDay)} שע׳), קצר את אורך השיחה (כרגע ${fmt(simState.callMin)} דק׳), או הוסף אנשי מכירות (במסך נתוני בסיס).`;
    } else {
      fixHint = `כדי לעמוד בזה: הוסף אנשי מכירות, הגדל שעות עבודה, או קצר את אורך השיחה (בנתוני בסיס). כרגע ${teamSize} ${teamSize>1?'נציגים':'נציג'} עם ${fmt1(state.workHoursDay)} שעות ביום ו-${fmt(state.callMin)} דק׳ לשיחה.`;
    }
    capEl.innerHTML=`
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--line-soft)">
        <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:7px">
          <span style="color:var(--txt-dim)">ניצולת צוות המכירות (${teamSize} ${teamSize>1?'נציגים':'נציג'})</span>
          <b style="font-family:'Rubik';color:${over?'var(--red)':'var(--accent)'}">${fmt1(util)}%</b></div>
        <div class="goal-prog"><div class="fill ${over?'warn':''}" style="width:${Math.min(util,100)}%"></div></div>
        <div class="hint" style="margin-top:6px">צריך לטפל ב-${fmt(needed)} שיחות שענו · הצוות יכול ${fmt(capacity)} בחודש</div>
        ${over? `<div class="notice warn" style="margin-top:12px;margin-bottom:0">${svg('info')}<div><b>הצוות לא יכול לעמוד בעומס הזה.</b> התרחיש דורש יותר שיחות ממה שהצוות מסוגל לבצע. ${fixHint}</div></div>`
          : `<div class="notice ok" style="margin-top:12px;margin-bottom:0">${svg('info')}<div>הצוות יכול לעמוד בעומס השיחות של התרחיש.</div></div>`}
      </div>`;
  }

  document.getElementById('simCompare').innerHTML=`<table class="kpi-table">
    <thead><tr><th>מדד</th><th>עכשיו</th><th>תרחיש</th></tr></thead><tbody>
    ${cmpRow('המרה אפקטיבית',fmt1(cNow.effConv*100)+'%',fmt1(cSim.effConv*100)+'%',cSim.effConv>=cNow.effConv)}
    ${cmpRow('הכנסה ללקוח',money(cNow.revPerClient)+'₪',money(cSim.revPerClient)+'₪',cSim.revPerClient>=cNow.revPerClient)}
    ${cmpRow('רווח גולמי ללקוח',money(cNow.grossPerClient)+'₪',money(cSim.grossPerClient)+'₪',cSim.grossPerClient>=cNow.grossPerClient)}
    ${cmpRow('לקוחות',fmt1(planNow.clients),fmt1(planSim.clients),planSim.clients>=planNow.clients)}
    ${cmpRow(L('bd_leads'),fmt(planNow.leads),fmt(planSim.leads),planSim.leads<=planNow.leads)}
    ${cmpRow(L('bd_marketing'),money(planNow.marketing)+'₪',money(planSim.marketing)+'₪',planSim.marketing<=planNow.marketing)}
    ${cmpRow('מחזור חודשי',money(planNow.revenue)+'₪',money(planSim.revenue)+'₪',planSim.revenue>=planNow.revenue)}
    ${cmpRow('רווח תפעולי',money(planNow.operating)+'₪',money(planSim.operating)+'₪',planSim.operating>=planNow.operating)}
    </tbody></table>`;
}
function simMini(label,val,now,base,higherBetter){
  const delta=now-base; const good=higherBetter?delta>=0:delta<=0;
  return `<div style="background:var(--bg-2);border-radius:10px;padding:13px;border:1px solid var(--line-soft)">
    <div class="hint">${label}</div>
    <div style="font-family:'Rubik';font-size:18px;font-weight:700;direction:ltr;text-align:right">${val}</div></div>`;
}
function cmpRow(l,now,sim,good){return `<tr><td style="font-size:13.5px">${l}</td>
  <td style="font-family:'Rubik';font-weight:600;color:var(--txt-dim);direction:ltr">${now}</td>
  <td style="font-family:'Rubik';font-weight:700;direction:ltr;color:${good?'var(--accent)':'var(--red)'}">${sim}</td></tr>`;}

   monday = נמשך ישירות ממאנדיי (לא קיים אצלנו כי הכל מחושב)

   static = ברירת מחדל מהאפ (לא מהמאנדיי) */
const KPI_SOURCE = {
  costPerLead: {type:'computed', formula:'תקציב שיווק ÷ לידים כללית'},
  answerRate:  {type:'computed', formula:'שיחות שבוצעו ÷ לידים כללית'},

  retainerNew: {type:'monday',   formula:'ריטיינר ממוצע של לקוחות שהצטרפו בחודש האחרון (numeric_mm4ayh2a)'},
  avgMonths:   {type:'computed', formula:'100 ÷ אחוז שחיקה חודשי'},
  salesCommPct:{type:'monday',   formula:null},
  fixedCosts:  {type:'monday',   formula:null},
  callMin:     {type:'static',   formula:null},
  onboardMin:  {type:'static',   formula:null},
  onboardCostHr:{type:'static',  formula:null},
  onboardCommPct:{type:'monday', formula:null},
  processingFeePct:{type:'monday',formula:null},
  activeClients:{type:'monday', formula:'כמות לקוחות פעילים בסוף חודש (מהמאנדיי)'},
  churnRate:{type:'computed',formula:'סך לקוחות שעזבו ÷ סך פעילים בתחילת החודש (לפי החודשים שנבחרו)'},
  daysMonth:    {type:'static',  formula:null},
  workDaysMonth:{type:'static',  formula:null},
  workHoursDay: {type:'static',  formula:null},
};
function sourceBadge(key){
  const s=KPI_SOURCE[key]; if(!s) return '';
  if(s.type==='monday') return `<span style="display:inline-flex;align-items:center;gap:3px;background:rgba(77,159,255,.15);color:var(--blue);padding:1px 6px;border-radius:6px;font-size:10px;font-weight:600">🔗 מאנדיי</span>`;

  return `<span style="display:inline-flex;align-items:center;gap:3px;background:rgba(232,238,247,.08);color:var(--txt-faint);padding:1px 6px;border-radius:6px;font-size:10px;font-weight:600">⚙️ סטטי</span>`;
}

  const rows=state.history.map((h,i)=>`
    <tr>
      <td style="text-align:center"><input class="lbl-edit" style="font-weight:600;font-size:13.5px;text-align:center" value="${(h.label||'חודש').replace(/"/g,'&quot;')}" oninput="updateHistory(${i},'label',this.value)"></td>

      <td style="text-align:center"><div class="field w-sm" style="margin:0 auto"><input type="number" placeholder="—" value="${h.leads}" oninput="updateHistory(${i},'leads',this.value)"></div></td>
      <td style="text-align:center"><div class="field w-sm" style="margin:0 auto"><input type="number" placeholder="—" value="${h.closes}" oninput="updateHistory(${i},'closes',this.value)"></div></td>
      <td style="text-align:center"><div class="field w-sm" style="margin:0 auto"><span class="affix">₪</span><input type="number" placeholder="—" value="${h.setupRev||''}" oninput="updateHistory(${i},'setupRev',this.value)"></div></td>
      <td style="text-align:center"><div class="field w-sm" style="margin:0 auto"><span class="affix">₪</span><input type="number" placeholder="—" value="${h.retainerRev||''}" oninput="updateHistory(${i},'retainerRev',this.value)"></div></td>
      <td style="text-align:center;font-family:'Rubik';font-weight:600;color:${h.churn!=null?'var(--red)':'var(--txt-faint)'};direction:ltr">${h.churn!=null?h.churn:'—'}</td>
      <td style="text-align:center;font-family:'Rubik';font-weight:600;color:${h.churnPct!=null?'var(--red)':'var(--txt-faint)'};direction:ltr">${h.churnPct!=null?fmt1(h.churnPct)+'%':'—'}</td>
      <td style="font-size:11.5px;color:var(--txt-faint);direction:ltr;text-align:right">${histRowSummary(h)}</td>
    </tr>`).join('');
  const h=historyAverages();
  const hasAny = state.history.length>0 && (h.totalBudget||h.totalLeads||h.totalCloses||h.costPerLead!=null);
  const n = h.monthsAny || state.history.length || 1;
  // חישוב סך שחיקה היסטורית

  for(const item of state.history){
    if(item.churn!=null && item.activeStart>0){
      sumChurnHist += parseFloat(item.churn)||0;
      sumActiveStartHist += parseFloat(item.activeStart)||0;

  const avgChurn = sumChurnHist/n;

    <table class="kpi-table" style="min-width:900px">

        <th style="text-align:center">מחיר הקמה ממוצע</th>
        <th style="text-align:center">מחיר ריטיינר ממוצע</th>

  autoSizeInputs();

function histRowSummary(h){
  const num=v=> v===''||v==null?null:parseFloat(v)||0;
  const b=num(h.budget),l=num(h.leads),cl=num(h.closes);
  const parts=[];
  if(b!=null&&l>0) parts.push('מחיר ליד '+fmt1(b/l)+'₪');
  if(l>0&&cl!=null) parts.push('המרה '+fmt1(cl/l*100)+'%');
  if(b!=null&&cl>0) parts.push('שיווק ללקוח '+fmt(b/cl)+'₪');
  return parts.join(' · ')||'—';
}
function updateHistory(i,field,val){
  if(!state.history[i]) return;
  state.history[i][field] = field==='label' ? val : (val===''?'':(parseFloat(val)||0));
  saveState();
  const box=document.getElementById('historyTable'); if(!box) return;
  // עדכון התא של "מחושב" בשורה הספציפית
  const summaryCells=box.querySelectorAll('tbody tr td:last-child');
  if(summaryCells[i]) summaryCells[i].textContent=histRowSummary(state.history[i]);
  // עדכון שורת הסיכום
  const h=historyAverages();
  const tbody=document.getElementById('histAvgBar');
  if(!tbody) return;
  const allRows=tbody.querySelectorAll('tr');
  const sumRow=allRows[allRows.length-1];
  if(allRows.length>state.history.length){
    const n = h.monthsAny || state.history.length || 1;
    let sumChurnHist=0, sumActiveStartHist=0, hasChurnData=false;
    for(const item of state.history){
      if(item.churn!=null && item.activeStart>0){
        sumChurnHist += parseFloat(item.churn)||0;
        sumActiveStartHist += parseFloat(item.activeStart)||0;
        hasChurnData = true;
      }
    }
    const avgChurn = sumChurnHist/n;
    const avgChurnPct = (hasChurnData && sumActiveStartHist>0) ? (sumChurnHist/sumActiveStartHist)*100 : null;
    sumRow.outerHTML=`<tr style="background:var(--bg-2);border-top:2px solid var(--line)">
      <td style="text-align:center;font-weight:700;color:var(--txt-dim);font-size:12.5px">ממוצע (${n} חודשים)</td>
      <td style="text-align:center;font-family:'Rubik';font-weight:700;color:var(--amber);direction:ltr">${h.totalBudget?money(h.totalBudget/n)+'₪':'—'}</td>
      <td style="text-align:center;font-family:'Rubik';font-weight:700;color:var(--blue);direction:ltr">${h.totalLeads?fmt(h.totalLeads/n):'—'}</td>
      <td style="text-align:center;font-family:'Rubik';font-weight:700;color:var(--green);direction:ltr">${h.totalCloses?fmt1(h.totalCloses/n):'—'}</td>
      <td style="text-align:center;font-family:'Rubik';font-weight:700;color:var(--accent);direction:ltr">${h.setupAvg!=null?money(h.setupAvg)+'₪':'—'}</td>
      <td style="text-align:center;font-family:'Rubik';font-weight:700;color:var(--accent);direction:ltr">${h.retainerTotalAvg!=null?money(h.retainerTotalAvg)+'₪':'—'}</td>
      <td style="text-align:center;font-family:'Rubik';font-weight:700;color:var(--red);direction:ltr">${hasChurnData?fmt1(avgChurn):'—'}</td>
      <td style="text-align:center;font-family:'Rubik';font-weight:700;color:var(--red);direction:ltr">${avgChurnPct!=null?fmt1(avgChurnPct)+'%':'—'}</td>
      <td style="font-size:11.5px;color:var(--txt-faint);direction:ltr;text-align:right;font-weight:500">${[
        h.costPerLead!=null?'מחיר ליד '+fmt1(h.costPerLead)+'₪':null,
        h.effConv!=null?'המרה '+fmt1(h.effConv)+'%':null,
        h.cac!=null?'עלות לקוח '+money(h.cac)+'₪':null,
      ].filter(Boolean).join(' · ')||'—'}</td>
    </tr>`;
  }
}
function convSummaryRow(){
  const planned=(state.answerRate/100)*(state.closeRate/100)*100;
  const hist=historyAverages();
  let histCell='<span style="color:var(--txt-faint)">—</span>';
  if(hist.effConv!=null){
    const diff=planned-hist.effConv;
    const good=Math.abs(diff)<0.5;
    const diffStr=Math.abs(diff)>=0.5
      ? `<div style="font-size:11px;color:${good?'var(--accent)':'var(--amber)'};margin-top:2px">פער ${diff>0?'+':''}${fmt1(diff)}%</div>`
      : '';
    histCell=`<div style="font-family:'Rubik';font-weight:600;color:var(--amber);direction:ltr;font-size:13.5px">${fmt1(hist.effConv)}%</div>${diffStr}`;
  }
  return `<tr style="background:var(--bg-2)">
    <td style="padding-right:48px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="color:var(--purple)">${svg('percent')}</span>
        <div><b style="font-size:13.5px">אחוז המרה כולל</b><small style="color:var(--txt-faint);display:block">מענה × סגירה — מליד ללקוח</small></div>
      </div>
    </td>
    <td><div style="font-family:'Rubik';font-weight:700;font-size:18px;color:var(--purple);direction:ltr;text-align:right;padding-right:14px">${fmt1(planned)}%</div></td>
    <td style="text-align:center">${histCell}</td>
    <td style="color:var(--txt-faint);font-size:12.5px">המרה בפועל מליד ללקוח</td>
  </tr>`;
}
function settingRow(key,m){
  m=m||META[key];
  const hist=historyAverages();
  // ערך הממוצע ההיסטורי לכל KPI — או ריק אם אין נתון
  let histVal='', histDiff=null;
  if(key==='costPerLead' && hist.costPerLead!=null){
    histVal=fmt1(hist.costPerLead)+'₪'; histDiff=state[key]-hist.costPerLead;
  }
  else if(key==='setupFee' && hist.setupAvg!=null){
    histVal=money(hist.setupAvg)+'₪'; histDiff=state[key]-hist.setupAvg;
  }
  else if(key==='retainer' && hist.retainerTotalAvg!=null){
    histVal=money(hist.retainerTotalAvg)+'₪'; histDiff=state[key]-hist.retainerTotalAvg;
  }
  // עיצוב התא: ערך + פער קטן בצבע
  let histCell='<span style="color:var(--txt-faint)">—</span>';
  if(histVal){
    let diffStr='';
    if(histDiff!=null && Math.abs(histDiff)>=(key==='costPerLead'?0.5:(key==='setupFee'||key==='retainer'?10:0.5))){
      // צבע: ירוק = ההנחה טובה למציאות, אדום = ההנחה רחוקה לרעה
      // למחיר/עלות (costPerLead,setupFee,retainer) → ערך גבוה בהנחה זה טוב (אבל לא רלוונטי לרוב). פה נשים נטרלי - רק להראות פער.
      const good=Math.abs(histDiff)<(key==='setupFee'||key==='retainer'?50:2);
      diffStr=`<div style="font-size:11px;color:${good?'var(--accent)':'var(--amber)'};margin-top:2px">פער ${histDiff>0?'+':''}${key==='setupFee'||key==='retainer'?money(histDiff):fmt1(histDiff)}</div>`;
    }
    histCell=`<div style="font-family:'Rubik';font-weight:600;color:var(--amber);direction:ltr;font-size:13.5px">${histVal}</div>${diffStr}`;
  }
  return `<tr>
    <td><div class="kpi-row-lbl"><div class="kpi-row-ico" style="--ic-bg:var(--${m.color}-soft);--ic:${COLORS[m.color]}">${svg(m.icon)}</div>
      <div><div style="display:flex;align-items:center;gap:6px"><b><input class="lbl-edit" value="${L(key)}" data-lblkey="${key}" onchange="setLabel(this)" onclick="this.select()"></b>${sourceBadge(key)}</div><small>${m.sub}</small>${KPI_SOURCE[key]&&KPI_SOURCE[key].formula?`<div style="font-size:10.5px;color:var(--txt-faint);margin-top:2px;direction:rtl">${KPI_SOURCE[key].formula}</div>`:''}</div></div></td>
    <td><div class="editable-cell"><div class="field w-sm"><span class="affix">${m.affix}</span>
      <input type="number" value="${Math.round((state[key]||0)*1000)/1000}" step="0.001" data-key="${key}" oninput="onSetting(this)"></div></div></td>
    <td style="text-align:center">${histCell}</td>
    <td style="color:var(--txt-faint);font-size:12.5px">${explainKey(key)}</td></tr>`;
}
function explainKey(key){return ({
  costPerLead:'תקציב שיווק = לידים × ערך זה', answerRate:'מכפיל את מספר הלידים הנדרש',
  closeRate:'אחוז סגירה ממי שענה', setupFee:'בסיס לעמלת המכירה',
  retainer:'הריטיינר הממוצע של הבסיס הקיים. משמש לחישוב כמה כסף נכנס החודש מהפעילים הקיימים',
  retainerNew:'מחיר ריטיינר חדש שלקוחות שיצטרפו מהיום ישלמו. משמש לכל החישובים של גיוס חדשים, יעדים ותחזית',
  avgMonths:'נגזר מ-100÷שחיקה. משמש לחישוב LTV וכתחזית', salesCommPct:'עלות משתנה על כל עסקה חדשה', fixedCosts:'קובע נקודת איזון',
  callMin:'כמה שיחות אפשר ביום', onboardMin:'זמן פגישה לכל לקוח חדש', onboardCostHr:'עלות שעת אונבורדינג (אם רלוונטי)',
  onboardCommPct:'נגזרת מהריטיינר הראשון של הלקוח', processingFeePct:'נגזרת מכל ההכנסה (הקמה + ריטיינרים)',
  activeClients:'בסיס הריטיינרים החודשי שלך', churnRate:'קובע את אורך החיים ואת קצב התחזית',
})[key]||'';}
function onSetting(input){
  state[input.dataset.key]=parseFloat(input.value)||0;
  saveState();
  // קיטון גופן אוטומטי לפי אורך המספר
  const len=String(input.value||'').length;
  if(len>=10) input.style.fontSize='11px';
  else if(len>=8) input.style.fontSize='12px';
  else if(len>=6) input.style.fontSize='13px';
  else input.style.fontSize='';
}

function kpiTile(label,icon,color,val,cur,meta,helpKey){
  return `<div class="kpi" style="--bar:${COLORS[color]}">
    <div class="lbl">${svg(icon,'lbl-ico')} ${label} ${helpKey?help(helpKey):''}</div>
    <div class="val">${val}${cur?` <span class="cur">${cur}</span>`:''}</div>
    <div class="meta">${meta||''}</div></div>`;
}
function miniMetric(label,val,icon,color,sub,calc){
  return `<div style="background:var(--bg-2);border-radius:12px;padding:15px;border:1px solid var(--line-soft)">
    <div style="display:flex;align-items:center;gap:8px;color:var(--txt-dim);font-size:12.5px;margin-bottom:8px">
      <span style="color:${COLORS[color]};display:inline-flex">${svg(icon)}</span>${label}</div>
    <div style="font-family:'Rubik';font-size:22px;font-weight:700;direction:ltr;text-align:right">${val}</div>
    ${sub?`<div class="hint" style="margin-top:3px">${sub}</div>`:''}
    ${calc?`<div style="font-size:10.5px;color:var(--txt-faint);margin-top:6px;padding-top:6px;border-top:1px dashed var(--line-soft);line-height:1.5">${calc}</div>`:''}</div>`;
}
function slRow(color,label,val){
  return `<div class="sl"><div class="sl-l"><span class="dot" style="--d:${COLORS[color]}"></span><span>${label}</span></div><div class="sl-v">${val}</div></div>`;
}
