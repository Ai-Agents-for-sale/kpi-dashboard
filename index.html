<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>מרכז שליטה - KPI ותחזיות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e14; --bg-2:#0f1521; --panel:#141b2b; --panel-2:#1a2233;
  --line:#243047; --line-soft:#1c2535;
  --txt:#e8eef7; --txt-dim:#8a98b0; --txt-faint:#5d6a82;
  --accent:#3ddc97; --accent-2:#2bb87e; --accent-soft:rgba(61,220,151,.12);
  --blue:#4d9fff; --blue-soft:rgba(77,159,255,.12);
  --amber:#ffb74d; --amber-soft:rgba(255,183,77,.12);
  --red:#ff6b6b; --red-soft:rgba(255,107,107,.12);
  --purple:#a78bfa; --purple-soft:rgba(167,139,250,.12);
  --shadow:0 8px 30px rgba(0,0,0,.4); --radius:16px; --radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Heebo',sans-serif;
  background:radial-gradient(1200px 600px at 90% -10%, rgba(77,159,255,.08), transparent 60%),
    radial-gradient(1000px 500px at 0% 0%, rgba(61,220,151,.06), transparent 55%), var(--bg);
  color:var(--txt);-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
input,button,select{font-family:inherit}

.app{display:flex;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;background:linear-gradient(180deg,var(--bg-2),var(--bg));
  border-left:1px solid var(--line-soft);padding:22px 14px;display:flex;flex-direction:column;gap:6px;
  position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 18px}
.brand-mark{width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--blue));display:grid;place-items:center;
  font-weight:800;color:#06121e;font-size:20px;box-shadow:0 4px 14px rgba(61,220,151,.3)}
.brand-txt b{font-family:'Rubik';font-size:16px;font-weight:700;display:block;letter-spacing:-.3px}
.brand-txt span{font-size:11px;color:var(--txt-faint);font-weight:500}

/* GLOBAL GOAL BAR */
.goalbar{background:linear-gradient(135deg,var(--accent-soft),rgba(77,159,255,.05));
  border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:8px}
.goalbar .gb-lbl{font-size:11px;color:var(--txt-dim);font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:6px}
.goalbar .gb-lbl svg{width:13px;height:13px;color:var(--accent)}
.goalbar .gb-field{display:flex;align-items:center;background:var(--bg-2);border:1px solid var(--line);
  border-radius:9px;overflow:hidden}
.goalbar .gb-field span{padding:0 9px;color:var(--txt-faint);font-size:12px;font-weight:600}
.goalbar .gb-field input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--accent);
  font-family:'Rubik';font-weight:700;font-size:16px;padding:8px 4px 8px 9px;direction:ltr;text-align:right}

.nav-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;cursor:pointer;
  color:var(--txt-dim);font-weight:500;font-size:14.5px;transition:.16s;border:1px solid transparent}
.nav-item:hover{background:var(--panel);color:var(--txt)}
.nav-item.active{background:linear-gradient(135deg,var(--accent-soft),rgba(77,159,255,.06));
  color:var(--txt);border-color:var(--line)}
.nav-item.active .ni-ico{color:var(--accent)}
.ni-ico{width:20px;height:20px;flex-shrink:0;color:var(--txt-faint);transition:.16s}
.nav-sep{height:1px;background:var(--line-soft);margin:10px 8px}
.nav-foot{margin-top:auto;padding:8px}
.nav-foot button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel);color:var(--txt-dim);font-size:12.5px;font-weight:500;cursor:pointer;
  transition:.16s;display:flex;align-items:center;justify-content:center;gap:7px}
.nav-foot button:hover{background:var(--panel-2);color:var(--txt)}

.main{flex:1;min-width:0;padding:30px 38px 60px;max-width:1400px}
.page-head{margin-bottom:22px}
.page-head h1{font-family:'Rubik';font-size:27px;font-weight:700;letter-spacing:-.5px}
.page-head p{color:var(--txt-dim);font-size:14px;margin-top:5px;max-width:640px}

.topbar{display:none;align-items:center;justify-content:space-between;padding:12px 16px;
  background:var(--bg-2);border-bottom:1px solid var(--line-soft);position:sticky;top:0;z-index:50;gap:10px}
.topbar .brand{padding:0}
.topbar .gb-field-m{display:flex;align-items:center;background:var(--panel);border:1px solid var(--line);
  border-radius:9px;overflow:hidden;flex:1;max-width:160px}
.topbar .gb-field-m span{padding:0 8px;color:var(--txt-faint);font-size:11px}
.topbar .gb-field-m input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--accent);
  font-family:'Rubik';font-weight:700;font-size:14px;padding:7px 4px;direction:ltr;text-align:right}
.burger{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--panel);
  display:grid;place-items:center;cursor:pointer;color:var(--txt);flex-shrink:0}

.grid{display:grid;gap:16px}
.cols-4{grid-template-columns:repeat(4,1fr)}
.cols-5{grid-template-columns:repeat(5,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:repeat(2,1fr)}
.card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
  border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.card-h h3{font-family:'Rubik';font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-h .sub{font-size:12px;color:var(--txt-faint)}

.kpi{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
  border-radius:var(--radius);padding:18px 18px 16px;position:relative;overflow:hidden;transition:.2s}
.kpi:hover{transform:translateY(-2px)}
.kpi::before{content:'';position:absolute;top:0;right:0;width:100%;height:3px;background:var(--bar,var(--accent));opacity:.8}
.kpi .lbl{font-size:12.5px;color:var(--txt-dim);font-weight:500;display:flex;align-items:center;gap:7px}
.kpi .lbl-ico{width:15px;height:15px;color:var(--bar,var(--accent));flex-shrink:0}
.kpi .val{font-family:'Rubik';font-size:27px;font-weight:700;margin-top:9px;letter-spacing:-.5px;
  white-space:nowrap;direction:ltr;text-align:right}
.kpi .val .cur{font-size:15px;color:var(--txt-dim);font-weight:500}
.kpi .meta{font-size:11.5px;color:var(--txt-faint);margin-top:6px}

.kpi-table{width:100%;border-collapse:collapse}
.kpi-table th{text-align:right;font-size:11.5px;color:var(--txt-faint);font-weight:600;
  padding:0 6px 12px;text-transform:uppercase;letter-spacing:.5px}
.kpi-table td{padding:7px 6px;border-top:1px solid var(--line-soft);vertical-align:middle}
.kpi-row-lbl{display:flex;align-items:center;gap:11px}
.kpi-row-ico{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;
  background:var(--ic-bg,var(--accent-soft))}
.kpi-row-ico svg{width:17px;height:17px;color:var(--ic,var(--accent))}
.kpi-row-lbl b{font-size:14px;font-weight:500;display:block}
.kpi-row-lbl small{font-size:11.5px;color:var(--txt-faint)}

.field{position:relative;display:inline-flex;align-items:center;background:var(--bg-2);
  border:1px solid var(--line);border-radius:10px;transition:.15s;overflow:hidden}
.field:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field input{width:100%;background:transparent;border:none;outline:none;color:var(--txt);
  font-size:15px;font-weight:600;padding:9px 12px;direction:ltr;text-align:right;font-family:'Rubik'}
.field .affix{padding:0 11px;color:var(--txt-faint);font-size:13px;font-weight:600;background:var(--panel-2);
  align-self:stretch;display:flex;align-items:center;border-right:1px solid var(--line)}
.field.w-sm{width:130px}
.field.w-md{width:100%}

.editable-cell{display:flex;justify-content:flex-end}

/* editable label */
.lbl-edit{background:transparent;border:none;color:inherit;font:inherit;font-size:14px;font-weight:500;
  padding:1px 3px;border-radius:5px;border-bottom:1px dashed transparent;width:auto;max-width:100%;
  field-sizing:content;box-sizing:content-box}
.lbl-edit:hover{border-bottom-color:var(--line)}
.lbl-edit:focus{outline:none;background:var(--bg-2);border-bottom-color:var(--accent)}
.title-edit{font-family:'Rubik';font-size:16px;font-weight:600;max-width:100%;width:auto;min-width:40px}
.title-edit:hover{border-bottom-color:var(--line)}

.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600}
.tag.green{background:var(--accent-soft);color:var(--accent)}
.tag.blue{background:var(--blue-soft);color:var(--blue)}
.tag.amber{background:var(--amber-soft);color:var(--amber)}
.tag.red{background:var(--red-soft);color:var(--red)}
.tag.purple{background:var(--purple-soft);color:var(--purple)}

/* daily/monthly breakdown rows */
.brk{display:flex;flex-direction:column;gap:1px}
.brk-row{display:flex;align-items:center;padding:13px 6px;border-bottom:1px solid var(--line-soft);gap:10px}
.brk-row:last-child{border-bottom:none}
.brk-ico{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;background:var(--bg-2)}
.brk-ico svg{width:18px;height:18px;color:var(--bi,var(--accent))}
.brk-name{flex:1;min-width:0}
.brk-name b{font-size:14px;font-weight:500;display:block}
.brk-name small{font-size:11.5px;color:var(--txt-faint)}
.brk-vals{display:flex;gap:18px;text-align:left}
.brk-v{min-width:74px;text-align:center}
.brk-v .vv{font-family:'Rubik';font-size:18px;font-weight:700;direction:ltr;display:block}
.brk-v .vl{font-size:10.5px;color:var(--txt-faint);text-transform:uppercase;letter-spacing:.4px}
.brk-v.daily .vv{color:var(--blue)}
.brk-v.monthly .vv{color:var(--txt)}

/* breakdown vertical table */
.brk-table-wrap{overflow-x:auto}
.brk-table{width:100%;border-collapse:collapse;min-width:560px}
.brk-table th{padding:0 10px 14px;text-align:center;font-family:'Rubik';font-weight:600;font-size:13.5px;border-bottom:1px solid var(--line)}
.brk-table th.brk-corner{width:90px}
.brk-table th .lbl-edit{text-align:center;width:100%;max-width:none;font-family:'Rubik';font-weight:600;font-size:13.5px}
.brk-trow td{padding:15px 10px;text-align:center;font-family:'Rubik';font-weight:700;font-size:19px;direction:ltr;border-bottom:1px solid var(--line-soft)}
.brk-trow.daily td{color:var(--blue);font-size:16px}
.brk-trow .brk-rowlbl{font-family:'Heebo';font-weight:500;font-size:12.5px;color:var(--txt-faint);text-align:right;direction:rtl;white-space:nowrap}
.brk-trow .brk-rowlbl svg{width:14px;height:14px;vertical-align:-2px;margin-left:4px}

.statlist{display:flex;flex-direction:column;gap:1px}
.statlist .sl{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--line-soft);gap:10px}
.statlist .sl:last-child{border-bottom:none}
.statlist .sl-l{display:flex;align-items:center;gap:11px}
.statlist .sl-l .dot{width:9px;height:9px;border-radius:50%;background:var(--d,var(--accent));flex-shrink:0}
.statlist .sl-l span{font-size:13.5px;color:var(--txt-dim)}
.statlist .sl-v{font-family:'Rubik';font-weight:700;font-size:15px;direction:ltr;white-space:nowrap}

.notice{background:var(--blue-soft);border:1px solid rgba(77,159,255,.25);border-radius:12px;
  padding:13px 16px;font-size:13px;color:var(--txt);display:flex;gap:11px;align-items:flex-start;margin-bottom:18px}
.notice svg{width:18px;height:18px;color:var(--blue);flex-shrink:0;margin-top:1px}
.notice.warn{background:var(--red-soft);border-color:rgba(255,107,107,.3)}
.notice.warn svg{color:var(--red)}
.notice.ok{background:var(--accent-soft);border-color:rgba(61,220,151,.3)}
.notice.ok svg{color:var(--accent)}

.hint{font-size:12px;color:var(--txt-faint);margin-top:4px}
.goal-prog{height:12px;border-radius:8px;background:var(--bg-2);overflow:hidden;border:1px solid var(--line-soft);position:relative}
.goal-prog .fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--accent),var(--blue));transition:width .6s}
.goal-prog .fill.warn{background:linear-gradient(90deg,var(--amber),var(--red))}

.split{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.delta-pos{color:var(--accent)} .delta-neg{color:var(--red)}
.hidden{display:none!important}

/* help "?" */
.help{width:16px;height:16px;border-radius:50%;border:1px solid var(--line);background:var(--bg-2);
  color:var(--txt-faint);font-size:11px;font-weight:700;display:inline-grid;place-items:center;cursor:pointer;
  flex-shrink:0;transition:.15s}
.help:hover{border-color:var(--accent);color:var(--accent)}
/* בטיחות: svg מוטבע בתוך span (אייקון ליד טקסט) לא יתנפח */
span > svg:not([class]){width:16px;height:16px;flex-shrink:0;vertical-align:-2px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;
  align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px;max-width:440px;
  width:100%;box-shadow:var(--shadow)}
.modal h3{font-family:'Rubik';font-size:18px;margin-bottom:12px;display:flex;align-items:center;gap:9px}
.modal p{font-size:14px;color:var(--txt-dim);line-height:1.7;margin-bottom:10px}
.modal .formula{background:var(--bg-2);border:1px solid var(--line-soft);border-radius:10px;padding:12px 14px;
  font-family:'Rubik';font-size:13.5px;direction:ltr;text-align:left;color:var(--accent);margin:10px 0}
.modal button{margin-top:8px;background:var(--accent);color:#06121e;border:none;padding:10px 20px;
  border-radius:9px;font-weight:600;cursor:pointer;font-size:14px;width:100%}

input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:6px;background:var(--bg-2);
  border:1px solid var(--line-soft);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--accent);cursor:pointer;border:3px solid var(--bg);box-shadow:0 0 0 1px var(--accent)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent);
  cursor:pointer;border:3px solid var(--bg)}
.slider-row{margin-bottom:18px}
.slider-row .sr-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.slider-row .sr-h label{font-size:13.5px;color:var(--txt-dim);font-weight:500}
.slider-row .sr-h b{font-family:'Rubik';font-size:16px;direction:ltr}

.btn{border:none;border-radius:10px;font-weight:600;cursor:pointer;font-size:14px;padding:11px 20px;transition:.15s}
.btn-primary{background:var(--accent);color:#06121e}
.btn-ghost{background:var(--panel-2);border:1px solid var(--line);color:var(--txt)}
.btn-danger{background:var(--red-soft);color:var(--red);border:1px solid rgba(255,107,107,.3)}
.btn-sm{padding:6px 12px;font-size:12px}

.rep-pill{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:11px;cursor:pointer;
  background:var(--bg-2);border:1px solid var(--line);font-size:13.5px;font-weight:500;color:var(--txt-dim);transition:.15s}
.rep-pill:hover{border-color:var(--accent);color:var(--txt)}
.rep-pill.active{background:var(--accent);color:#06121e;border-color:var(--accent);font-weight:600}
.rep-pill .av{width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.15);display:grid;place-items:center;font-weight:700;font-size:12px}
.rep-pill.active .av{background:rgba(0,0,0,.2)}

.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--panel-2);border:1px solid var(--accent);
  border-radius:12px;padding:13px 18px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:10px;transform:translateY(80px);opacity:0;transition:.3s cubic-bezier(.4,0,.2,1)}
.toast.show{transform:translateY(0);opacity:1}
.toast svg{width:18px;height:18px;color:var(--accent)}

@media(max-width:920px){
  .sidebar{display:none}
  .topbar{display:flex}
  .main{padding:18px 14px 84px;max-width:100%}
  .cols-4{grid-template-columns:repeat(2,1fr)}
  .cols-5{grid-template-columns:repeat(2,1fr)}
  .cols-3{grid-template-columns:1fr}
  .cols-2,.split{grid-template-columns:1fr}
  .page-head h1{font-size:21px}
  .field.w-sm{width:120px}
  .kpi .val{font-size:22px}
  .brk-vals{gap:10px}.brk-v{min-width:58px}.brk-v .vv{font-size:15px}
  .kpi-table th:nth-child(3),.kpi-table td:nth-child(3){display:none}
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--bg-2);
    border-top:1px solid var(--line);padding:7px 4px;justify-content:space-around}
  .mobile-nav .mn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;
    border-radius:10px;color:var(--txt-faint);cursor:pointer;font-size:10px;font-weight:500}
  .mobile-nav .mn.active{color:var(--accent)}
  .mobile-nav .mn svg{width:20px;height:20px}
}
.mobile-nav{display:none}
.drawer-open .sidebar{display:flex;position:fixed;z-index:200;right:0;top:0;width:260px;animation:slidein .2s}
@keyframes slidein{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}
.drawer-open .drawer-bg{display:block}
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">Z</div><div class="brand-txt"><b>מרכז שליטה</b><span>KPI ותחזיות</span></div></div>
    <div class="goalbar">
      <div class="gb-lbl">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
        יעד רווח תפעולי חודשי
      </div>
      <div class="gb-field"><span>₪</span><input type="number" id="globalGoal" oninput="setGlobalGoal(this.value)"></div>
    </div>
    <div id="navLinks"></div>
    <div class="nav-foot"><button onclick="exportConfig()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      גיבוי / ייצוא נתונים</button></div>
  </aside>
  <div class="drawer-bg" onclick="closeDrawer()"></div>
  <div style="flex:1;min-width:0;display:flex;flex-direction:column">
    <div class="topbar">
      <div class="burger" onclick="openDrawer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:21px;height:21px"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
      <div class="gb-field-m"><span>יעד ₪</span><input type="number" id="globalGoalM" oninput="setGlobalGoal(this.value)"></div>
      <div class="brand"><div class="brand-mark">Z</div></div>
    </div>
    <main class="main" id="content"></main>
  </div>
</div>
<div class="mobile-nav" id="mobileNav"></div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalBox"></div></div>

const TEXT_LABELS = {
  bd_leads:'לידים (פניות)', bd_calls:'שיחות שענו', bd_marketing:'תקציב שיווק',
  bd_sales:'מכירות (לקוחות)', bd_onboard:'פגישות אונבורדינג', bd_onboardHrs:'שעות אונבורדינג',
};

let state = loadState();

function loadState(){
  try{ const s = localStorage.getItem('kpiState_v2');
    if(s){ const p = JSON.parse(s); return deepMerge(structuredClone(DEFAULTS), p); }
  }catch(e){}
  return structuredClone(DEFAULTS);
}
function deepMerge(base, over){
  for(const k in over){
    if(k==='reps' || k==='history'){ base[k] = over[k]; }
    else if(over[k] && typeof over[k]==='object' && !Array.isArray(over[k])) base[k]=deepMerge(base[k]||{},over[k]);
    else base[k]=over[k];
  }
  return base;
}
function saveState(){ try{ localStorage.setItem('kpiState_v2', JSON.stringify(state)); }catch(e){} }

/* תווית — או מותאמת אישית או ברירת מחדל */
function L(key){ return (state.labels && state.labels[key]) || (META[key]?.label) || TEXT_LABELS[key] || key; }

/* כותרת ניתנת לעריכה (כרטיסים/מסכים). key ייחודי, def = ברירת מחדל */
function T(key, def){
  const val=(state.labels && state.labels['T_'+key]) || def;
  return `<input class="lbl-edit title-edit" value="${val.replace(/"/g,'&quot;')}" data-lblkey="T_${key}" onchange="setLabel(this)" onclick="this.select()">`;
}

/* ============================================================
   מנוע חישוב
============================================================ */
function compute(s = state){
  const answer = s.answerRate/100;
  const close  = s.closeRate/100;
  const commPct= s.salesCommPct/100;
  const onbCommPct = (s.onboardCommPct||0)/100;
  const procPct = (s.processingFeePct||0)/100;
  const effConv = answer*close;                          // המרה אפקטיבית מליד ללקוח

  const totalRetainer  = s.retainer*s.avgMonths;
  const revPerClient   = s.setupFee + totalRetainer;
  const leadsPerClient = effConv>0 ? 1/effConv : 0;      // לידים ללקוח
  const callsPerClient = close>0 ? 1/close : 0;          // שיחות שענו ללקוח
  const onboardPerClient = 1;                            // פגישת אונבורדינג אחת ללקוח
  const onboardHrsPerClient = s.onboardMin/60;

  const acqCost  = leadsPerClient * s.costPerLead;             // עלות שיווק ללקוח
  const commCost = s.setupFee * commPct;                       // עמלת מכירה (% מהקמה)
  const onbCommCost = totalRetainer * onbCommPct;              // עמלת אונבורדינג (% מסך ריטיינרים)
  const procCost = revPerClient * procPct;                     // עמלת סליקה (% מכל ההכנסה)
  const onbHourlyCost = onboardHrsPerClient * s.onboardCostHr; // עלות שעת אונבורדינג (אם רלוונטי)
  const varCostPerClient = acqCost + commCost + onbCommCost + procCost + onbHourlyCost;

  const grossPerClient = revPerClient - varCostPerClient;
  const grossMarginPct = revPerClient>0 ? grossPerClient/revPerClient*100 : 0;
  const cac = varCostPerClient;
  const ltvCacRatio = cac>0 ? revPerClient/cac : 0;

  const callsPerDayPerRep = s.callMin>0 ? Math.floor((s.workHoursDay*60)/s.callMin) : 0;
  const callsPerMonthPerRep = callsPerDayPerRep * s.workDaysMonth;

  return {answer,close,effConv,commPct,onbCommPct,procPct,revPerClient,totalRetainer,leadsPerClient,callsPerClient,
    onboardPerClient,onboardHrsPerClient,acqCost,commCost,onbCommCost,procCost,onbHourlyCost,varCostPerClient,
    grossPerClient,grossMarginPct,cac,ltvCacRatio,callsPerDayPerRep,callsPerMonthPerRep};
}

/* ממוצעים מהנתונים ההיסטוריים — מחזיר {costPerLead, effConv, cac} ממוצעים, או null אם אין מספיק */
function historyAverages(s = state){
  const c=compute(s);
  const arr=(s.history||[]).map(h=>({
    budget: h.budget===''||h.budget==null? null : parseFloat(h.budget)||0,
    leads:  h.leads ===''||h.leads ==null? null : parseFloat(h.leads )||0,
    closes: h.closes===''||h.closes==null? null : parseFloat(h.closes)||0,
    setupRev: h.setupRev===''||h.setupRev==null? null : parseFloat(h.setupRev)||0,
    retainerRev: h.retainerRev===''||h.retainerRev==null? null : parseFloat(h.retainerRev)||0,
  }));
  const cpl=[], conv=[], cac=[], setupAvg=[], retainerTotal=[];
  for(const m of arr){
    if(m.budget!=null && m.leads>0) cpl.push(m.budget/m.leads);
    if(m.leads>0 && m.closes!=null) conv.push(m.closes/m.leads*100);
    if(m.budget!=null && m.closes>0) cac.push(m.budget/m.closes + c.commCost + c.onbCommCost + c.procCost + c.onbHourlyCost);
    if(m.setupRev!=null && m.closes>0) setupAvg.push(m.setupRev/m.closes);
    if(m.retainerRev!=null) retainerTotal.push(m.retainerRev);
  }
  const avg = a => a.length? a.reduce((x,y)=>x+y,0)/a.length : null;
  return {
    costPerLead: avg(cpl), costPerLeadN: cpl.length,
    effConv: avg(conv),    effConvN: conv.length,
    cac:    avg(cac),      cacN:   cac.length,
    setupAvg: avg(setupAvg), setupAvgN: setupAvg.length,
    retainerTotalAvg: avg(retainerTotal), retainerTotalN: retainerTotal.length,
  };
}

function planFromClients(clients, s = state){
  const c = compute(s);
  const revenue   = clients*c.revPerClient;
  const varCost   = clients*c.varCostPerClient;
  const gross     = revenue-varCost;
  const operating = gross - s.fixedCosts;
  const leads     = clients*c.leadsPerClient;
  const calls     = clients*c.callsPerClient;
  const marketing = leads*s.costPerLead;
  const commTotal = clients*c.commCost;
  const onboards  = clients*c.onboardPerClient;
  const onboardHrs= clients*c.onboardHrsPerClient;
  return {clients,revenue,varCost,gross,operating,leads,calls,marketing,commTotal,onboards,onboardHrs};
}
function clientsForProfit(p, s=state){ const c=compute(s); return c.grossPerClient>0 ? (p+s.fixedCosts)/c.grossPerClient : Infinity; }
function profitFromRevenue(rev, s=state){ const c=compute(s); return planFromClients(c.revPerClient>0?rev/c.revPerClient:0, s); }
function revenueForProfit(p, s=state){ const c=compute(s); return clientsForProfit(p,s)*c.revPerClient; }

function setGlobalGoal(v){
  state.goalProfit = parseFloat(v)||0; saveState();
  syncGoalInputs();
  PAGES[currentPage].render();
}
function syncGoalInputs(){
  const a=document.getElementById('globalGoal'), b=document.getElementById('globalGoalM');
  if(a&&document.activeElement!==a) a.value=state.goalProfit;
  if(b&&document.activeElement!==b) b.value=state.goalProfit;
}
function navigate(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===page));
  document.querySelectorAll('.mobile-nav .mn').forEach(n=>n.classList.toggle('active',n.dataset.page===page));
  PAGES[page].render(); closeDrawer(); window.scrollTo(0,0); syncGoalInputs(); autoSizeInputs();
}
/* fallback לדפדפנים בלי field-sizing: מגדיל שדות תווית לפי התוכן */
function autoSizeInputs(){
  setTimeout(()=>{
    document.querySelectorAll('.lbl-edit, .title-edit').forEach(inp=>{
      if(inp.dataset.noauto) return;
      const cs=getComputedStyle(inp);
      const span=document.createElement('span');
      span.style.cssText='position:absolute;visibility:hidden;white-space:pre;font-family:'+cs.fontFamily+';font-size:'+cs.fontSize+';font-weight:'+cs.fontWeight;
      span.textContent=inp.value||inp.placeholder||'';
      document.body.appendChild(span);
      const w=span.offsetWidth+14;
      document.body.removeChild(span);
      inp.style.width=Math.min(w, inp.parentElement.offsetWidth||999)+'px';
    });
  },0);
}

function renderGoals(){
  document.getElementById('content').innerHTML=`
  <div class="page-head"><h1>יעדים ותכנון</h1>
    <p>הזן יעד רווח או מחזור — והמערכת תחשב אחורה את כל מה שצריך, ברמה החודשית והיומית. הכל מסונכרן ביניהם ועם נתוני הבסיס.</p></div>
  <div class="notice">${svg('info')}<div>היעדים הם <b>חודשיים</b>. הפירוק היומי מחלק ל-${state.daysMonth} ימי חודש (ניתן לשינוי בנתוני בסיס). אפשר לערוך כל שם שדה בלחיצה עליו.</div></div>
  <div class="split" style="margin-bottom:16px">
    <div class="card">
      <div class="card-h"><h3>${T('from_profit','מהרווח → לכל השאר')}</h3><span class="tag green">יעד ראשי</span></div>
      <label class="hint" style="display:block;margin-bottom:8px">יעד רווח תפעולי חודשי</label>
      <div class="field w-md"><span class="affix">₪</span><input type="number" id="gP" value="${state.goalProfit}" oninput="onGoalProfit(this.value)"></div>
      <div id="gPres" style="margin-top:16px"></div>
    </div>
    <div class="card">
      <div class="card-h"><h3>${T('from_rev','מהמחזור → לכל השאר')}</h3><span class="tag blue">חישוב הפוך</span></div>
      <label class="hint" style="display:block;margin-bottom:8px">יעד מחזור חודשי</label>
      <div class="field w-md"><span class="affix">₪</span><input type="number" id="gR" value="${Math.round(revenueForProfit(state.goalProfit))}" oninput="onGoalRev(this.value)"></div>
      <div id="gRres" style="margin-top:16px"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-h"><h3>${T('goal_breakdown','פירוק היעד — חודשי מול יומי')}</h3><span class="sub">כל מה שצריך לבצע</span></div>
    <div style="margin-bottom:14px"><span class="tag purple">אחוז המרה אפקטיבי: <span id="effShow"></span></span>
      <span class="hint" style="display:inline;margin-right:8px">${state.answerRate}% מענה × ${state.closeRate}% סגירה — שנה בנתוני בסיס</span></div>
    <div class="brk" id="brkBox"></div>
  </div>

  <div class="card" style="margin-top:16px">
    <div class="card-h"><h3>${T('actual_perf','השוואה למה שקרה בפועל החודש')} ${help('actual')}</h3><span class="tag amber">בפועל</span></div>
    <p style="font-size:13px;color:var(--txt-dim);margin-bottom:14px">הזן מה שכבר קרה החודש — וראה איך אתה עומד מול היעד, מה המחירים האמיתיים, ומה הרווח הצפוי בקצב הנוכחי. אפשר למלא רק חלק מהשדות — מה שאי אפשר לחשב יוצג כ-"—".</p>
    <div class="grid cols-4" style="margin-bottom:8px">
      ${actInput('actBudget','תקציב שיווק שיצא','₪','wallet','amber')}
      ${actInput('actLeads','לידים שנכנסו','','lead','blue')}
      ${actInput('actCloses','סגירות שהיו','','conv','green')}
      ${actInput('actDays','ימים שעברו בחודש','ימים','calendar','purple')}
    </div>
    <div id="actResults" style="margin-top:16px"></div>
  </div>`;
  onGoalProfit(state.goalProfit);
}
function actInput(key,label,affix,icon,color){
  return `<div style="background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;padding:14px">
    <div style="display:flex;align-items:center;gap:7px;color:var(--txt-dim);font-size:12.5px;margin-bottom:9px">
      <span style="color:${COLORS[color]};display:inline-flex">${svg(icon)}</span>${label}</div>
    <div class="field" style="width:100%">${affix?`<span class="affix">${affix}</span>`:''}
      <input type="number" placeholder="—" value="${state[key]}" data-key="${key}" oninput="onActInput(this)"></div>
  </div>`;
}
function onActInput(input){
  const v=input.value;
  state[input.dataset.key] = v===''? '' : (parseFloat(v)||0);
  saveState(); refreshActual();
}
function onGoalProfit(v){
  const p=parseFloat(v)||0; state.goalProfit=p; saveState(); syncGoalInputs();
  const plan=planFromClients(clientsForProfit(p));
  document.getElementById('gPres').innerHTML=goalQuick(plan);
  const r=document.getElementById('gR'); if(r&&document.activeElement!==r) r.value=Math.round(plan.revenue);
  if(document.getElementById('gRres')) document.getElementById('gRres').innerHTML=revQuick(plan);
  renderBrk(plan);
  refreshActual();
}
function onGoalRev(v){
  const rev=parseFloat(v)||0; const plan=profitFromRevenue(rev);
  state.goalProfit=plan.operating; saveState(); syncGoalInputs();
  document.getElementById('gRres').innerHTML=revQuick(plan);
  const p=document.getElementById('gP'); if(p&&document.activeElement!==p) p.value=Math.round(plan.operating);
  if(document.getElementById('gPres')) document.getElementById('gPres').innerHTML=goalQuick(plan);
  renderBrk(plan);
  refreshActual();
}
function goalQuick(plan){return `<div class="statlist">
  ${slRow('green','לקוחות חדשים',fmt1(plan.clients))}
  ${slRow('blue','מחזור נדרש',money(plan.revenue)+' ₪')}
  ${slRow('amber','רווח גולמי',money(plan.gross)+' ₪')}
  ${slRow('purple',L('bd_marketing'),money(plan.marketing)+' ₪')}</div>`;}
function revQuick(plan){return `<div class="statlist">
  ${slRow('green','רווח תפעולי','<b style="color:var(--accent)">'+money(plan.operating)+' ₪</b>')}
  ${slRow('amber','רווח גולמי',money(plan.gross)+' ₪')}
  ${slRow('blue','לקוחות נדרשים',fmt1(plan.clients))}
  ${slRow('purple',L('bd_marketing'),money(plan.marketing)+' ₪')}</div>`;}

function renderBrk(plan){
  const c=compute(); const d=state.daysMonth;
  const es=document.getElementById('effShow'); if(es) es.textContent=fmt1(c.effConv*100)+'%';
  const teamSize=Math.max(parseInt(state.teamSize)||1,1);
  const capMonth=c.callsPerMonthPerRep*teamSize;   // קיבולת שיחות חודשית של כל הצוות
  const capDay=c.callsPerDayPerRep*teamSize;        // קיבולת יומית
  const callsOver=plan.calls>capMonth;              // האם נדרש יותר מהקיבולת
  // רווח מקסימלי לפי הקיבולת: מקס שיחות -> מקס לקוחות -> מקס רווח
  const maxClients = c.callsPerClient>0 ? capMonth/c.callsPerClient : 0;
  const maxOperating = maxClients*c.grossPerClient - state.fixedCosts;
  const maxRevenue = maxClients*c.revPerClient;
  const cols=[
    ['bd_marketing', money(plan.marketing)+'₪', money(plan.marketing/d)+'₪','amber'],
    ['bd_leads', fmt(plan.leads), fmt1(plan.leads/d),'blue'],
    ['bd_calls', fmt(plan.calls), fmt1(plan.calls/d),'purple'],
    ['bd_sales', fmt1(plan.clients), fmt1(plan.clients/d),'green'],
    ['bd_onboard', fmt1(plan.onboards), fmt1(plan.onboards/d),'amber'],
    ['bd_onboardHrs', fmt1(plan.onboardHrs), fmt1(plan.onboardHrs/d),'red'],
  ];
  document.getElementById('brkBox').innerHTML=`
  <div class="brk-table-wrap">
    <table class="brk-table">
      <thead><tr>
        <th class="brk-corner"></th>
        ${cols.map(([key,,,col])=>`<th style="color:${COLORS[col]}"><input class="lbl-edit" value="${L(key).replace(/"/g,'&quot;')}" data-lblkey="${key}" onchange="setLabel(this)" onclick="this.select()"></th>`).join('')}
        <th style="color:var(--txt-faint)">קיבולת הצוות</th>
      </tr></thead>
      <tbody>
        <tr class="brk-trow monthly">
          <td class="brk-rowlbl">${svg('calendar')} בחודש</td>
          ${cols.map(([key,m])=>`<td${key==='bd_calls'&&callsOver?' style="color:var(--red)"':''}>${m}${key==='bd_calls'&&callsOver?' ⚠':''}</td>`).join('')}
          <td style="color:var(--txt-faint);font-size:15px">${fmt(capMonth)} שיחות</td>
        </tr>
        <tr class="brk-trow daily">
          <td class="brk-rowlbl">${svg('clock')} ביום</td>
          ${cols.map(([key,,dy])=>`<td${key==='bd_calls'&&callsOver?' style="color:var(--red)"':''}>${dy}</td>`).join('')}
          <td style="color:var(--txt-faint)">${fmt(capDay)} שיחות</td>
        </tr>
      </tbody>
    </table>
  </div>
  ${callsOver
    ? `<div class="notice warn" style="margin-top:14px;margin-bottom:0">${svg('info')}<div><b>היעד הזה לא ריאלי לצוות הנוכחי.</b> הוא דורש ${fmt(plan.calls)} שיחות בחודש, אבל ${teamSize} ${teamSize>1?'נציגים יכולים':'נציג יכול'} לבצע מקסימום ${fmt(capMonth)} שיחות. כדי שזה יהיה אפשרי: הוסף נציגים, הגדל שעות עבודה, או קצר את אורך השיחה (בנתוני בסיס).</div></div>`
    : `<div class="notice ok" style="margin-top:14px;margin-bottom:0">${svg('info')}<div>הצוות (${teamSize} ${teamSize>1?'נציגים':'נציג'}) יכול לעמוד בכמות השיחות שהיעד דורש — ${fmt(plan.calls)} מתוך ${fmt(capMonth)} אפשריות.</div></div>`}
  <div style="margin-top:14px;padding:13px 16px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <span style="font-size:13.5px;color:var(--txt-dim)">תקרת רווח עם הצוות הנוכחי (${teamSize} ${teamSize>1?'נציגים':'נציג'}, ${fmt1(maxClients)} לקוחות בקיבולת מלאה)</span>
    <span style="font-family:'Rubik';font-weight:800;font-size:18px;color:var(--accent);direction:ltr;white-space:nowrap">${money(maxOperating)} ₪ <span style="font-size:12px;color:var(--txt-faint);font-weight:500">רווח · ${money(maxRevenue)}₪ מחזור</span></span>
  </div>
  ${state.goalProfit>maxOperating? `<div class="hint" style="margin-top:8px;color:var(--amber)">⚠ יעד הרווח שלך (${money(state.goalProfit)}₪) גבוה מהתקרה האפשרית עם הצוות הנוכחי — תצטרך להגדיל צוות או קיבולת.</div>`:''}`;
  autoSizeInputs();
}

/* חישוב והצגת הביצוע בפועל מול היעד */
function refreshActual(){
  const box=document.getElementById('actResults'); if(!box) return;
  const c=compute();
  const num=v=> (v===''||v==null)? null : (parseFloat(v)||0);
  const budget=num(state.actBudget), leads=num(state.actLeads), closes=num(state.actCloses), days=num(state.actDays);
  const dash='<span style="color:var(--txt-faint)">—</span>';
  const goalClients=clientsForProfit(state.goalProfit);

  // מחירים אמיתיים
  const cpl = (budget!=null&&leads>0) ? budget/leads : null;            // מחיר ליד אמיתי
  const convRate = (leads>0&&closes!=null) ? closes/leads*100 : null;   // המרה אמיתית
  const cacMkt = (budget!=null&&closes>0) ? budget/closes : null;       // עלות לקוח (שיווק בפועל)
  const cacFull = (cacMkt!=null) ? cacMkt + c.commCost + c.onbCommCost + c.procCost + c.onbHourlyCost : null;            // עלות לקוח מלאה כולל כל העמלות
  // רווח בפועל עד כה — תפעולי, כולל חלק יחסי של הוצאות קבועות לפי הימים שעברו
  let profitSoFar=null;
  if(closes!=null){
    const grossSoFar = closes*c.revPerClient - ((budget||0) + closes*(c.commCost + c.onbCommCost + c.procCost + c.onbHourlyCost));
    const proRatedFixed = days!=null ? state.fixedCosts*(Math.min(days,state.daysMonth)/state.daysMonth) : state.fixedCosts;
    profitSoFar = grossSoFar - proRatedFixed;
  }
  // קצב ותחזית — רווח צפוי לחודש שלם כולל כל העמלות
  let pace=null, projCloses=null, projOperating=null;
  if(closes!=null && days>0){
    pace=closes/days; projCloses=pace*state.daysMonth;
    const projRev=projCloses*c.revPerClient;
    const projBudget=(budget!=null)? budget/days*state.daysMonth : projCloses*c.leadsPerClient*state.costPerLead;
    const projVar=projBudget + projCloses*(c.commCost + c.onbCommCost + c.procCost + c.onbHourlyCost);
    projOperating=projRev - projVar - state.fixedCosts;
  }
  // מול היעד
  const remaining = closes!=null ? Math.max(goalClients-closes,0) : null;
  const daysLeft = days!=null ? Math.max(state.daysMonth-days,0) : null;
  const perDay = (remaining!=null&&daysLeft!=null) ? (daysLeft>0?remaining/daysLeft:remaining) : null;
  const onTrackGoal = projOperating!=null ? projOperating>=state.goalProfit : null;

  // יעדים להשוואה
  const cplTarget=state.costPerLead;
  const convTarget=c.effConv*100;
  const cacTarget=c.cac;                          // עלות לקוח ביעד (שיווק+עמלה)
  // עוגן להשפעות כספיות: לקוחות מוקרנים לחודש (אם אפשר), אחרת לקוחות בפועל
  const anchorClients = projCloses!=null ? projCloses : (closes!=null?closes:null);
  // השפעת מחיר ליד: פער × לידים מוקרנים
  const projLeads = (leads!=null&&days>0) ? leads/days*state.daysMonth : (anchorClients!=null&&convRate>0? anchorClients/(convRate/100):null);
  const cplImpact = (cpl!=null&&projLeads!=null) ? -(cpl-cplTarget)*projLeads : null;
  // השפעת אחוז המרה: כמה שיווק חוסכים/מבזבזים מול היעד, לאותם לקוחות
  let convImpact=null;
  if(convRate>0 && anchorClients!=null){
    const leadsAtTarget=anchorClients/(convTarget/100), leadsAtReal=anchorClients/(convRate/100);
    convImpact=(leadsAtTarget-leadsAtReal)*state.costPerLead; // חיובי=חוסך (המרה טובה יותר)
  }
  // השפעת עלות לקוח: פער × לקוחות מוקרנים
  const cacImpact = (cacFull!=null&&anchorClients!=null) ? -(cacFull-cacTarget)*anchorClients : null;

  const anyData = budget!=null||leads!=null||closes!=null;
  if(!anyData){
    box.innerHTML=`<div class="hint" style="text-align:center;padding:8px">מלא את השדות למעלה כדי לראות את ההשוואה לביצוע בפועל.</div>`;
    return;
  }

  // עזר לפער: מחזיר טקסט צבעוני. goodIfLower=true אם ערך נמוך יותר טוב (מחיר/עלות)
  const gapTxt=(act,target,goodIfLower,suffix='',f=fmt)=>{
    if(act==null) return '';
    const diff=act-target; const good=goodIfLower? diff<=0 : diff>=0;
    if(Math.abs(diff)<0.05) return `<span style="color:var(--accent);font-size:11.5px">תואם ליעד</span>`;
    return `<span style="color:${good?'var(--accent)':'var(--red)'};font-size:11.5px">${diff>0?'+':''}${f(diff)}${suffix} מהיעד</span>`;
  };

  box.innerHTML=`
    <div class="grid cols-3" style="margin-bottom:14px">
      <div style="background:var(--bg-2);border-radius:12px;padding:15px;border:1px solid var(--line-soft)">
        <div style="display:flex;align-items:center;gap:8px;color:var(--txt-dim);font-size:12.5px;margin-bottom:8px"><span style="color:var(--amber)">${svg('wallet')}</span>מחיר ליד אמיתי</div>
        <div style="font-family:'Rubik';font-size:22px;font-weight:700;direction:ltr;text-align:right">${cpl!=null?fmt1(cpl)+'₪':dash}</div>
        <div class="hint" style="margin-top:3px">יעד: ${cplTarget}₪ · ${cpl!=null?gapTxt(cpl,cplTarget,true,'₪',fmt1):'צריך תקציב + לידים'}</div>
        ${cplImpact!=null&&Math.abs(cpl-cplTarget)>=0.05?`<div class="hint" style="margin-top:4px;color:${cplImpact>=0?'var(--accent)':'var(--red)'}">השפעה על הרווח: ${cplImpact>=0?'+':''}${money(cplImpact)}₪ בחודש</div>`:''}
      </div>
      <div style="background:var(--bg-2);border-radius:12px;padding:15px;border:1px solid var(--line-soft)">
        <div style="display:flex;align-items:center;gap:8px;color:var(--txt-dim);font-size:12.5px;margin-bottom:8px"><span style="color:var(--purple)">${svg('percent')}</span>אחוז המרה אמיתי</div>
        <div style="font-family:'Rubik';font-size:22px;font-weight:700;direction:ltr;text-align:right">${convRate!=null?fmt1(convRate)+'%':dash}</div>
        <div class="hint" style="margin-top:3px">יעד: ${fmt1(convTarget)}% · ${convRate!=null?gapTxt(convRate,convTarget,false,'%',fmt1):'צריך לידים + סגירות'}</div>
        ${convImpact!=null&&Math.abs(convRate-convTarget)>=0.05?`<div class="hint" style="margin-top:4px;color:${convImpact>=0?'var(--accent)':'var(--red)'}">השפעה על הרווח: ${convImpact>=0?'+':''}${money(convImpact)}₪ בחודש</div>`:''}
      </div>
      <div style="background:var(--bg-2);border-radius:12px;padding:15px;border:1px solid var(--line-soft)">
        <div style="display:flex;align-items:center;gap:8px;color:var(--txt-dim);font-size:12.5px;margin-bottom:8px"><span style="color:var(--red)">${svg('target')}</span>עלות לקוח אמיתית</div>
        <div style="font-family:'Rubik';font-size:22px;font-weight:700;direction:ltr;text-align:right">${cacFull!=null?money(cacFull)+'₪':dash}</div>
        <div class="hint" style="margin-top:3px">יעד: ${money(cacTarget)}₪ · ${cacFull!=null?gapTxt(cacFull,cacTarget,true,'₪'):'צריך תקציב + סגירות'}</div>
        ${cacImpact!=null&&Math.abs(cacFull-cacTarget)>=0.5?`<div class="hint" style="margin-top:4px;color:${cacImpact>=0?'var(--accent)':'var(--red)'}">השפעה על הרווח: ${cacImpact>=0?'+':''}${money(cacImpact)}₪ בחודש</div>`:''}
      </div>
    </div>
    <table class="kpi-table">
      <thead><tr><th>מדד</th><th style="text-align:center">בפועל / צפי</th><th style="text-align:center;color:var(--txt-faint)">יעד</th><th style="text-align:center">פער</th></tr></thead>
      <tbody>
        ${actRow4('לקוחות שנסגרו עד כה', closes!=null?fmt1(closes):dash, fmt1(goalClients), closes!=null?actGap(closes-goalClients,false,'',fmt1):'')}
        ${actRow4('תחזית סגירות לסוף החודש', projCloses!=null?fmt1(projCloses):dash, fmt1(goalClients), projCloses!=null?actGap(projCloses-goalClients,false,'',fmt1):'')}
        ${actRow4('קצב נדרש ליום מול בפועל', perDay!=null?fmt1(perDay):dash, fmt1(goalClients/state.daysMonth), (perDay!=null&&pace!=null)?actGap(pace-perDay,false,'/יום',fmt1):'')}
        ${actRow4('הקצב הנוכחי (סגירות ביום)', pace!=null?fmt1(pace):dash, fmt1(goalClients/state.daysMonth), pace!=null?actGap(pace-goalClients/state.daysMonth,false,'/יום',fmt1):'')}
        ${actRow4('כמה עוד צריך עד היעד', remaining!=null?fmt1(remaining):dash, '—', '')}
      </tbody>
    </table>
    <div class="split" style="margin-top:14px">
      <div style="background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;padding:15px">
        <div class="hint">רווח תפעולי עד כה (סגירות שהיו פחות עלויות וחלק יחסי מההוצאות הקבועות)</div>
        <div style="font-family:'Rubik';font-size:22px;font-weight:800;color:${profitSoFar!=null&&profitSoFar>=0?'var(--accent)':(profitSoFar!=null?'var(--red)':'var(--txt-faint)')};direction:ltr;text-align:right;margin-top:4px">${profitSoFar!=null?money(profitSoFar)+' ₪':dash}</div>
      </div>
      <div style="background:var(--bg-2);border:1px solid ${projOperating!=null?(onTrackGoal?'rgba(61,220,151,.3)':'rgba(255,107,107,.3)'):'var(--line-soft)'};border-radius:12px;padding:16px">
        <div class="hint" style="margin-bottom:10px">רווח תפעולי צפוי בקצב הזה (סוף החודש)</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px">
          <div>
            <div style="font-size:11.5px;color:var(--txt-faint)">צפוי</div>

      : `<div class="hint" style="margin-top:10px">✓ כל אחד בתוך הקיבולת הפיזית (מקסימום ${fmt(capacity)} שיחות בחודש לאיש).</div>`}`);

  // סיכום אישי מול חברה
  const totalPersonal=reps.reduce((a,r)=>a+(c.commCost>0?(parseFloat(r.commGoal)||0)/c.commCost:0),0);

/* עדכון ערך של איש מכירות — בלי רנדור מחדש (מתקן את באג הפוקוס) */
function updateRep(id,field,val){

  r[field]= field==='name'? val : (parseFloat(val)||0);

}

/* חישוב כל הנתונים של איש מכירות (מופרד מהרינדור) */
function repCalc(r){
  const c=compute();
  const commCost=c.commCost;
  const repClose=(parseFloat(r.closeRate)||0)/100;
  const repEff=repClose*c.answer;
  const p_deals=commCost>0 ? r.commGoal/commCost : 0;
  const p_calls=repClose>0 ? p_deals/repClose : 0;
  const p_leads=repEff>0 ? p_deals/repEff : 0;
  const p_marketing=p_leads*state.costPerLead;
  const plan=planFromClients(clientsForProfit(state.goalProfit));
  const reps=state.reps; const weights=reps.map(x=>Math.max(parseFloat(x.closeRate)||0,1));
  const sumW=weights.reduce((a,b)=>a+b,0); const myW=Math.max(parseFloat(r.closeRate)||0,1);
  const myShare=sumW>0?myW/sumW:1/reps.length;
  const co_deals=plan.clients*myShare;
  const co_calls=repClose>0 ? co_deals/repClose : 0;
  const co_leads=repEff>0 ? co_deals/repEff : 0;
  const co_marketing=co_leads*state.costPerLead;
  const co_comm=co_deals*commCost;
  const daysLeft=Math.max(state.daysMonth-r.daysPassed,0);
  const pace=r.daysPassed>0 ? r.closedDeals/r.daysPassed : 0;
  const projected=pace*state.daysMonth;
  // מעקב מול היעד האישי
  const p_remaining=Math.max(p_deals-r.closedDeals,0);
  const p_perDay=daysLeft>0 ? p_remaining/daysLeft : p_remaining;
  const p_onTrack=projected>=p_deals;
  const p_pct=p_deals>0 ? projected/p_deals*100 : 0;
  // מעקב מול החלק ביעד החברה
  const co_remaining=Math.max(co_deals-r.closedDeals,0);
  const co_perDay=daysLeft>0 ? co_remaining/daysLeft : co_remaining;
  const co_onTrack=projected>=co_deals;
  const co_pct=co_deals>0 ? projected/co_deals*100 : 0;
  const companyClose=state.closeRate;
  const belowCompany=(parseFloat(r.closeRate)||0)<companyClose;
  const gap=co_deals-p_deals;
  const p_dealsPerDay=p_deals/state.daysMonth; // מכירות ביום לפי היעד האישי
  return {c,commCost,p_deals,p_calls,p_leads,p_marketing,p_comm:r.commGoal,co_deals,co_calls,
    co_leads,co_marketing,co_comm,daysLeft,pace,projected,
    p_remaining,p_perDay,p_onTrack,p_pct,co_remaining,co_perDay,co_onTrack,co_pct,
    companyClose,belowCompany,gap,p_dealsPerDay};
}

        ${quickEditRep(id,'closedDeals','כמה עסקאות כבר סגרתי החודש','','conv','green')}

function repCmpRow(label,personal,company){

function quickEditRep(id,field,label,affix,icon,color){

    <td><div class="kpi-row-lbl"><div class="kpi-row-ico" style="--ic-bg:var(--${color}-soft);--ic:${COLORS[color]}">${svg(icon)}</div>

}

/* ============================================================
   מסך 4 — סימולטור (בורר נעילה)
   lock = איזה ערך נשאר קבוע בזמן ששאר הפרמטרים משתנים
============================================================ */
let simState=null, simLock='clients';
const LOCK_INFO={
  clients:{name:'מספר לקוחות',desc:'מספר הלקוחות נשאר קבוע (כמו ביעד הנוכחי). השאלה: כמה רווח ומחזור אקבל מאותם לקוחות אם הפרמטרים ישתנו? שינוי באחוז מענה/סגירה לא משנה מחזור — רק את העלות והרווח.',when:'מתי להשתמש: כשבודקים שינויי תמחור ורווחיות — למשל מה קורה לרווח אם מעלים את מחיר ההקמה או מורידים את עמלת המכירות, על אותו בסיס לקוחות.'},
  budget:{name:'תקציב שיווק / לידים',desc:'תקציב השיווק (מספר הלידים) נשאר קבוע. השאלה: מאותו תקציב, כמה לקוחות, מחזור ורווח אקבל? כאן שינוי באחוז מענה/סגירה כן משנה הכל — כמו בעולם האמיתי.',when:'מתי להשתמש: כשבודקים שיפור ביצועים בלי להוציא יותר כסף — כמה יותר לקוחות ורווח אפשר להוציא מאותו תקציב אם הצוות משתפר באחוז הסגירה או המענה.'},
  revenue:{name:'יעד מחזור',desc:'יעד המחזור נשאר קבוע. השאלה: כמה לקוחות, לידים ותקציב שיווק צריך כדי להגיע לאותו מחזור עם הפרמטרים החדשים, וכמה רווח יישאר?',when:'מתי להשתמש: כשיש יעד מחזור קבוע ורוצים לבדוק כמה "יקר" או "זול" להגיע אליו בתנאים שונים — כמה תקציב ולקוחות יידרשו, וכמה זה ישאיר ברווח.'},
  invest:{name:'מצב השקעה (תקציב חופשי)',desc:'כאן אתה גורר את תקציב השיווק בעצמך, ורואה כמה לידים, לקוחות, מחזור ורווח יוצאים ממנו. כולל בדיקה אם צוות המכירות בכלל יכול לטפל בכמות הלידים החדשה — ואם לא, מה צריך לעשות (יותר שעות או שיחה קצרה יותר).',when:'מתי להשתמש: כששוקלים כמה להשקיע בשיווק ורוצים לראות את התשואה — כמה לקוחות ורווח כל שקל שיווק מביא, והאם הצוות מסוגל לעמוד בעומס הלידים.'},
};
function renderScenarios(){
  if(!simState) simState=structuredClone(state);
  // אתחול תקציב השיווק לפי המצב הנוכחי (פעם ראשונה)
  if(simState.mktBudget==null){
    const pn=planFromClients(clientsForProfit(state.goalProfit), state);
    simState.mktBudget=Math.round(pn.marketing);
  }
  const isInvest = simLock==='invest';
  document.getElementById('content').innerHTML=`
  <div class="page-head"><h1>סימולטור מהלכים</h1>
    <p>שנה פרמטרים בלי לגעת בנתונים האמיתיים, ותראה מיד את ההשפעה. השינויים כאן זמניים בלבד.</p></div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-h"><h3>על מה הסימולטור נעול?</h3></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      ${Object.entries(LOCK_INFO).map(([k,v])=>`
        <div class="rep-pill ${simLock===k?'active':''}" onclick="setLock('${k}')">${v.name}</div>`).join('')}
    </div>
    <div class="notice" style="margin-bottom:0"><div style="display:flex;gap:11px;align-items:flex-start">${svg('info')}<div><b>נעול על: ${LOCK_INFO[simLock].name}.</b> ${LOCK_INFO[simLock].desc}<div style="margin-top:8px;color:var(--accent);font-weight:500">${LOCK_INFO[simLock].when}</div></div></div></div>
  </div>

  <div class="split">
    <div class="card">
      <div class="card-h"><h3>הזז פרמטרים</h3><button class="btn btn-ghost btn-sm" onclick="resetSim()">איפוס</button></div>
      ${isInvest? slider('mktBudget','תקציב שיווק חודשי',0,50000,250,'₪') : ''}
      ${slider('costPerLead','מחיר לליד',5,50,1,'₪')}
      ${slider('answerRate','אחוז מענה',10,100,1,'%')}
      ${slider('closeRate','אחוז סגירה',5,60,1,'%')}
      ${slider('setupFee','מחיר הקמה',0,5000,50,'₪')}
      ${slider('retainer','ריטיינר חודשי',0,2000,50,'₪')}
      ${slider('avgMonths','חודשי שימור',1,24,1,'חוד׳')}
      ${slider('salesCommPct','עמלת מכירות',0,70,1,'%')}
      ${isInvest? slider('callMin','אורך שיחה ממוצעת',5,90,1,'דק׳') : ''}
      ${isInvest? slider('workHoursDay','שעות עבודה ביום לאיש',1,12,0.5,'שע׳') : ''}
    </div>
    <div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-h"><h3>ההשפעה על הרווח</h3><span class="sub" id="simSub"></span></div>
        <div id="simImpact"></div>
        <div id="simCapacity"></div>
      </div>
      <div class="card"><div class="card-h"><h3>עכשיו מול התרחיש</h3></div><div id="simCompare"></div></div>
    </div>
  </div>`;
  updateSim();
}
function setLock(k){ simLock=k; renderScenarios(); }
function slider(key,label,min,max,step,affix){
  const disp = step<1 ? fmt1(simState[key]) : fmt(simState[key]);
  return `<div class="slider-row"><div class="sr-h"><label>${label}</label>
    <b>${disp} <span style="font-size:12px;color:var(--txt-dim)">${affix}</span></b></div>
    <input type="range" min="${min}" max="${max}" step="${step}" value="${simState[key]}" data-key="${key}" data-affix="${affix}" data-step="${step}" oninput="onSlider(this)"></div>`;
}
function onSlider(i){ simState[i.dataset.key]=parseFloat(i.value);
  const step=parseFloat(i.dataset.step)||1; const disp=step<1?fmt1(simState[i.dataset.key]):fmt(simState[i.dataset.key]);
  i.closest('.slider-row').querySelector('.sr-h b').innerHTML=`${disp} <span style="font-size:12px;color:var(--txt-dim)">${i.dataset.affix}</span>`;
  updateSim(); }
function resetSim(){ simState=structuredClone(state); renderScenarios(); toast('התרחיש אופס'); }

/* מחזיר plan לפי מה שנעול */
function simPlans(){
  const cNow=compute(state), cSim=compute(simState);
  const planNow=planFromClients(clientsForProfit(state.goalProfit), state);
  let planSim, subText;
  if(simLock==='clients'){
    planSim=planFromClients(planNow.clients, simState);
    subText='מספר לקוחות נעול: '+fmt1(planNow.clients);
  } else if(simLock==='budget'){
    const fixedLeads=planNow.leads;
    planSim=planFromClients(fixedLeads*cSim.effConv, simState);
    subText='תקציב נעול: '+money(planNow.marketing)+'₪ ('+fmt(fixedLeads)+' לידים)';
  } else if(simLock==='invest'){
    const leads = simState.costPerLead>0 ? simState.mktBudget/simState.costPerLead : 0;
    planSim=planFromClients(leads*cSim.effConv, simState);
    subText='תקציב שיווק: '+money(simState.mktBudget)+'₪ → '+fmt(leads)+' לידים';
  } else { // revenue
    const fixedRev=planNow.revenue;
    planSim=planFromClients(cSim.revPerClient>0?fixedRev/cSim.revPerClient:0, simState);
    subText='מחזור נעול: '+money(fixedRev)+'₪';
  }
  return {cNow,cSim,planNow,planSim,subText};
}
function updateSim(){
  const {cNow,cSim,planNow,planSim,subText}=simPlans();
  const ss=document.getElementById('simSub'); if(ss) ss.textContent=subText;
  const dP=planSim.operating-planNow.operating;
  document.getElementById('simImpact').innerHTML=`
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:6px">
      <span style="font-family:'Rubik';font-size:38px;font-weight:800;color:${dP>=0?'var(--accent)':'var(--red)'}">${dP>=0?'+':''}${money(dP)}</span>
      <span style="color:var(--txt-dim)">₪ שינוי ברווח</span></div>
    <p style="font-size:13px;color:var(--txt-dim)">השוואה למצב הנוכחי, כשהערך הנעול נשאר קבוע.</p>
    <div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${simMini(L('bd_marketing'),money(planSim.marketing)+'₪',planSim.marketing,planNow.marketing,false)}
      ${simMini(L('bd_leads'),fmt(planSim.leads),planSim.leads,planNow.leads,false)}
      ${simMini('שיחות שענו',fmt(planSim.calls),planSim.calls,planNow.calls,false)}
      ${simMini('לקוחות',fmt1(planSim.clients),planSim.clients,planNow.clients,true)}
    </div>`;

  // בדיקת קיבולת — רק במצב השקעה
  const capEl=document.getElementById('simCapacity');
  if(capEl){
    if(simLock==='invest'){
      const teamSize=Math.max(parseInt(state.teamSize)||1,1);
      const capacity=cSim.callsPerMonthPerRep*teamSize;   // מקסימום שיחות שענו שהצוות יכול לטפל בהן (לפי הסליידרים)
      const needed=planSim.calls;                          // שיחות שענו שצריך לטפל בהן
      const over=needed>capacity;
      const util=capacity>0?needed/capacity*100:0;
      capEl.innerHTML=`
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--line-soft)">
          <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:7px">
            <span style="color:var(--txt-dim)">ניצולת צוות המכירות (${teamSize} אנשים)</span>
            <b style="font-family:'Rubik';color:${over?'var(--red)':'var(--accent)'}">${fmt1(util)}%</b></div>
          <div class="goal-prog"><div class="fill ${over?'warn':''}" style="width:${Math.min(util,100)}%"></div></div>
          <div class="hint" style="margin-top:6px">צריך לטפל ב-${fmt(needed)} שיחות שענו · הצוות יכול ${fmt(capacity)} בחודש</div>
          ${over? `<div class="notice warn" style="margin-top:12px;margin-bottom:0">${svg('info')}<div><b>הצוות לא יכול לעמוד בכמות הלידים הזו.</b> בתקציב הזה נכנסים יותר לידים ממה שאפשר לטפל בהם. כדי לעמוד בזה: הגדל שעות עבודה (כרגע ${fmt1(simState.workHoursDay)} שע׳), קצר את אורך השיחה (כרגע ${fmt(simState.callMin)} דק׳), או הוסף אנשי מכירות (במסך נתוני בסיס).</div></div>`
            : `<div class="notice ok" style="margin-top:12px;margin-bottom:0">${svg('info')}<div>הצוות יכול לטפל בכל הלידים שהתקציב הזה מייצר.</div></div>`}
        </div>`;
    } else { capEl.innerHTML=''; }
  }

  document.getElementById('simCompare').innerHTML=`<table class="kpi-table">
    <thead><tr><th>מדד</th><th>עכשיו</th><th>תרחיש</th></tr></thead><tbody>
    ${cmpRow('המרה אפקטיבית',fmt1(cNow.effConv*100)+'%',fmt1(cSim.effConv*100)+'%',cSim.effConv>=cNow.effConv)}
    ${cmpRow('הכנסה ללקוח',money(cNow.revPerClient)+'₪',money(cSim.revPerClient)+'₪',cSim.revPerClient>=cNow.revPerClient)}
    ${cmpRow('רווח גולמי ללקוח',money(cNow.grossPerClient)+'₪',money(cSim.grossPerClient)+'₪',cSim.grossPerClient>=cNow.grossPerClient)}
    ${cmpRow('לקוחות',fmt1(planNow.clients),fmt1(planSim.clients),planSim.clients>=planNow.clients)}
    ${cmpRow(L('bd_leads'),fmt(planNow.leads),fmt(planSim.leads),planSim.leads<=planNow.leads)}
    ${cmpRow(L('bd_marketing'),money(planNow.marketing)+'₪',money(planSim.marketing)+'₪',planSim.marketing<=planNow.marketing)}
    ${cmpRow('מחזור חודשי',money(planNow.revenue)+'₪',money(planSim.revenue)+'₪',planSim.revenue>=planNow.revenue)}
    ${cmpRow('רווח תפעולי',money(planNow.operating)+'₪',money(planSim.operating)+'₪',planSim.operating>=planNow.operating)}
    </tbody></table>`;
}
function simMini(label,val,now,base,higherBetter){
  const delta=now-base; const good=higherBetter?delta>=0:delta<=0;
  return `<div style="background:var(--bg-2);border-radius:10px;padding:13px;border:1px solid var(--line-soft)">
    <div class="hint">${label}</div>
    <div style="font-family:'Rubik';font-size:18px;font-weight:700;direction:ltr;text-align:right">${val}</div></div>`;
}
function cmpRow(l,now,sim,good){return `<tr><td style="font-size:13.5px">${l}</td>
  <td style="font-family:'Rubik';font-weight:600;color:var(--txt-dim);direction:ltr">${now}</td>
  <td style="font-family:'Rubik';font-weight:700;direction:ltr;color:${good?'var(--accent)':'var(--red)'}">${sim}</td></tr>`;}

function renderHistoryTable(){
  const box=document.getElementById('historyTable'); if(!box) return;
  if(!state.history) state.history=[];
  const rows=state.history.map((h,i)=>`
    <tr>
      <td><input class="lbl-edit" style="font-weight:600;font-size:13.5px" value="${(h.label||'חודש').replace(/"/g,'&quot;')}" oninput="updateHistory(${i},'label',this.value)"></td>
      <td><div class="field w-sm"><span class="affix">₪</span><input type="number" placeholder="—" value="${h.budget}" oninput="updateHistory(${i},'budget',this.value)"></div></td>
      <td><div class="field w-sm"><input type="number" placeholder="—" value="${h.leads}" oninput="updateHistory(${i},'leads',this.value)"></div></td>
      <td><div class="field w-sm"><input type="number" placeholder="—" value="${h.closes}" oninput="updateHistory(${i},'closes',this.value)"></div></td>
      <td><div class="field w-sm"><span class="affix">₪</span><input type="number" placeholder="—" value="${h.setupRev||''}" oninput="updateHistory(${i},'setupRev',this.value)"></div></td>
      <td><div class="field w-sm"><span class="affix">₪</span><input type="number" placeholder="—" value="${h.retainerRev||''}" oninput="updateHistory(${i},'retainerRev',this.value)"></div></td>
      <td style="font-size:11.5px;color:var(--txt-faint);direction:ltr;text-align:right">${histRowSummary(h)}</td>
    </tr>`).join('');
  box.innerHTML=`
    <div style="overflow-x:auto">
    <table class="kpi-table" style="min-width:760px">
      <thead><tr><th>חודש</th><th>תקציב שיווק</th><th>לידים</th><th>סגירות</th><th>סך הקמה</th><th>סך ריטיינרים</th><th>מחושב</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    ${(()=>{ const h=historyAverages(); if(!h.costPerLead&&!h.effConv&&!h.cac&&!h.setupAvg&&!h.retainerTotalAvg) return '';
      return `<div style="margin-top:14px;padding:13px 16px;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between">
        <b style="font-size:13.5px;color:var(--txt-dim)">ממוצעים מהנתונים שהזנת:</b>
        ${h.costPerLead!=null?`<span style="font-size:13px"><span style="color:var(--txt-faint)">מחיר ליד:</span> <b style="font-family:'Rubik';color:var(--blue);direction:ltr">${fmt1(h.costPerLead)}₪</b></span>`:''}
        ${h.effConv!=null?`<span style="font-size:13px"><span style="color:var(--txt-faint)">המרה אפקטיבית:</span> <b style="font-family:'Rubik';color:var(--purple);direction:ltr">${fmt1(h.effConv)}%</b></span>`:''}
        ${h.cac!=null?`<span style="font-size:13px"><span style="color:var(--txt-faint)">עלות לקוח:</span> <b style="font-family:'Rubik';color:var(--red);direction:ltr">${money(h.cac)}₪</b></span>`:''}
        ${h.setupAvg!=null?`<span style="font-size:13px"><span style="color:var(--txt-faint)">הקמה ממ׳:</span> <b style="font-family:'Rubik';color:var(--green);direction:ltr">${money(h.setupAvg)}₪</b></span>`:''}
        ${h.retainerTotalAvg!=null?`<span style="font-size:13px"><span style="color:var(--txt-faint)">סך ריטיינרים ממ׳:</span> <b style="font-family:'Rubik';color:var(--amber);direction:ltr">${money(h.retainerTotalAvg)}₪</b></span>`:''}
      </div>`; })()}`;
  autoSizeInputs();
}
function histRowSummary(h){
  const num=v=> v===''||v==null?null:parseFloat(v)||0;
  const b=num(h.budget),l=num(h.leads),cl=num(h.closes),sr=num(h.setupRev),rr=num(h.retainerRev);
  const parts=[];
  if(b!=null&&l>0) parts.push('ליד '+fmt1(b/l)+'₪');
  if(l>0&&cl!=null) parts.push('המרה '+fmt1(cl/l*100)+'%');
  if(sr!=null&&cl>0) parts.push('הקמה ממ׳ '+fmt(sr/cl)+'₪');
  if(rr!=null) parts.push('ריטיינרים '+fmt(rr)+'₪');
  return parts.join(' · ')||'—';
}
function updateHistory(i,field,val){
  if(!state.history[i]) return;
  state.history[i][field] = field==='label' ? val : (val===''?'':(parseFloat(val)||0));
  saveState();
  // עדכן רק את הסיכום והממוצעים — בלי לרנדר מחדש את כל הטבלה (שומר פוקוס)
  const box=document.getElementById('historyTable'); if(!box) return;
  // עדכון תא הסיכום בשורה הספציפית
  const summaryCells=box.querySelectorAll('tbody tr td:last-child');
  if(summaryCells[i]) summaryCells[i].textContent=histRowSummary(state.history[i]);
  // עדכון שורת הממוצעים
  const avgBar=box.querySelector(':scope > div');
  if(avgBar){
    const h=historyAverages();
    if(h.costPerLead||h.effConv||h.cac||h.setupAvg||h.retainerTotalAvg){
      avgBar.outerHTML=`<div style="margin-top:14px;padding:13px 16px;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between">
        <b style="font-size:13.5px;color:var(--txt-dim)">ממוצעים מהנתונים שהזנת:</b>
        ${h.costPerLead!=null?`<span style="font-size:13px"><span style="color:var(--txt-faint)">מחיר ליד:</span> <b style="font-family:'Rubik';color:var(--blue);direction:ltr">${fmt1(h.costPerLead)}₪</b></span>`:''}
        ${h.effConv!=null?`<span style="font-size:13px"><span style="color:var(--txt-faint)">המרה אפקטיבית:</span> <b style="font-family:'Rubik';color:var(--purple);direction:ltr">${fmt1(h.effConv)}%</b></span>`:''}
        ${h.cac!=null?`<span style="font-size:13px"><span style="color:var(--txt-faint)">עלות לקוח:</span> <b style="font-family:'Rubik';color:var(--red);direction:ltr">${money(h.cac)}₪</b></span>`:''}
        ${h.setupAvg!=null?`<span style="font-size:13px"><span style="color:var(--txt-faint)">הקמה ממ׳:</span> <b style="font-family:'Rubik';color:var(--green);direction:ltr">${money(h.setupAvg)}₪</b></span>`:''}
        ${h.retainerTotalAvg!=null?`<span style="font-size:13px"><span style="color:var(--txt-faint)">סך ריטיינרים ממ׳:</span> <b style="font-family:'Rubik';color:var(--amber);direction:ltr">${money(h.retainerTotalAvg)}₪</b></span>`:''}
      </div>`;
    } else { avgBar.remove(); }
  }
}
function settingRow(key,m){
  m=m||META[key];
  const hist=historyAverages();
  let histTag='';
  if(key==='costPerLead' && hist.costPerLead!=null){
    const diff=state[key]-hist.costPerLead;
    histTag=`<div style="margin-top:4px;font-size:11.5px"><span style="color:var(--txt-faint)">ממוצע ${hist.costPerLeadN} חודשים אחרונים:</span> <b style="color:${Math.abs(diff)<0.5?'var(--accent)':'var(--amber)'}">${fmt1(hist.costPerLead)}₪</b> ${Math.abs(diff)>=0.5?`<span style="color:${diff>0?'var(--accent)':'var(--red)'}">(${diff>0?'+':''}${fmt1(diff)} מהממוצע)</span>`:''}</div>`;
  }
  if((key==='closeRate'||key==='answerRate') && hist.effConv!=null){
    const planned=(state.answerRate/100)*(state.closeRate/100)*100;
    const diff=planned-hist.effConv;
    histTag=`<div style="margin-top:4px;font-size:11.5px"><span style="color:var(--txt-faint)">המרה אפקטיבית בפועל (${hist.effConvN} חודשים):</span> <b style="color:${Math.abs(diff)<0.5?'var(--accent)':'var(--amber)'}">${fmt1(hist.effConv)}%</b> ${Math.abs(diff)>=0.5?`<span style="color:${diff<0?'var(--accent)':'var(--red)'}">(תוכנן ${fmt1(planned)}%)</span>`:''}</div>`;
  }
  if(key==='setupFee' && hist.setupAvg!=null){
    const diff=state[key]-hist.setupAvg;
    histTag=`<div style="margin-top:4px;font-size:11.5px"><span style="color:var(--txt-faint)">ממוצע ${hist.setupAvgN} חודשים אחרונים:</span> <b style="color:${Math.abs(diff)<10?'var(--accent)':'var(--amber)'}">${money(hist.setupAvg)}₪</b> ${Math.abs(diff)>=10?`<span style="color:${diff<=0?'var(--accent)':'var(--red)'}">(${diff>0?'+':''}${money(diff)} מהממוצע)</span>`:''}</div>`;
  }
  return `<tr>
    <td><div class="kpi-row-lbl"><div class="kpi-row-ico" style="--ic-bg:var(--${m.color}-soft);--ic:${COLORS[m.color]}">${svg(m.icon)}</div>
      <div><b><input class="lbl-edit" value="${L(key)}" data-lblkey="${key}" onchange="setLabel(this)" onclick="this.select()"></b><small>${m.sub}</small>${histTag}</div></div></td>
    <td><div class="editable-cell"><div class="field w-sm"><span class="affix">${m.affix}</span>
      <input type="number" value="${state[key]}" data-key="${key}" oninput="onSetting(this)"></div></div></td>
    <td style="color:var(--txt-faint);font-size:12.5px">${explainKey(key)}</td></tr>`;
}
function explainKey(key){return ({
  costPerLead:'תקציב שיווק = לידים × ערך זה', answerRate:'מכפיל את מספר הלידים הנדרש',
  closeRate:'אחוז סגירה ממי שענה', setupFee:'בסיס לעמלת המכירה', retainer:'× חודשי שימור = הכנסה חוזרת',
  avgMonths:'מגדיל LTV', salesCommPct:'עלות משתנה על כל עסקה', fixedCosts:'קובע נקודת איזון',
  callMin:'כמה שיחות אפשר ביום', onboardMin:'זמן פגישה לכל לקוח', onboardCostHr:'עלות שעת אונבורדינג (אם רלוונטי)',
  onboardCommPct:'נגזרת מסך הריטיינרים של הלקוח', processingFeePct:'נגזרת מכל ההכנסה (הקמה + ריטיינרים)',
})[key]||'';}
function onSetting(input){ state[input.dataset.key]=parseFloat(input.value)||0; saveState(); }

  gross:{t:'רווח גולמי ללקוח',body:`מה שנשאר מכל לקוח אחרי העלויות הישירות שלו (שיווק, עמלה, אונבורדינג), לפני ההוצאות הקבועות של העסק.`,f:'הכנסה ללקוח − עלות גיוס'},
  ltvcac:{t:'יחס LTV / CAC',body:`כמה שקלים הלקוח מכניס על כל שקל שהושקע בגיוס שלו. מתחת ל-1 = הפסד. 1-3 = רווחי אבל בעייתי. <b>מעל 3 = בריא מאוד.</b>`,f:'הכנסה ללקוח ÷ עלות גיוס'},

  twoconv:{t:'תכנון מול ביצוע — אחוז המרה',body:`<b>אחוז המרה ביעד</b> = מה שהגדרת בנתוני בסיס, הבסיס לכל התכנון.<br><br><b>אחוז המרה בפועל</b> = ממוצע אחוזי הסגירה שאנשי המכירות הזינו במסכים האישיים שלהם.<br><br>אם הביצוע נמוך מהתכנון — באותו תקציב שיווק תקבל פחות לקוחות, ולכן פחות רווח. כך רואים את הפער בין מה שתוכנן למה שקורה.`,f:'בפועל = אחוז מענה × ממוצע סגירה של הצוות'},
  capacity:{t:'קיבולת צוות',body:`כמה שיחות כל הצוות יכול להוציא בחודש יחד. מחושב לפי כמה שיחות איש אחד יכול לעשות (לפי אורך השיחה ושעות העבודה), כפול מספר אנשי המכירות.<br><br>זה מראה לך את התקרה — אם היעד דורש יותר שיחות מהקיבולת, צריך עוד אנשי מכירות או יותר שעות.`,f:'שיחות לחודש לאיש × מספר אנשי מכירות'},
  actual:{t:'השוואה לביצוע בפועל',body:`הזן מה שכבר קרה החודש — תקציב שיווק שיצא, לידים שנכנסו, סגירות שהיו, וכמה ימים עברו. המערכת מחשבת מזה את המחירים האמיתיים (מול ההנחות בנתוני בסיס), כמה צריך עוד כדי לעמוד ביעד, ומה הרווח הצפוי בקצב הנוכחי.<br><br>אפשר למלא רק חלק מהשדות — כל מדד שאי אפשר לחשב בלי הנתון שלו יוצג כ-"—".`,f:'מחיר ליד אמיתי = תקציב ÷ לידים · המרה אמיתית = סגירות ÷ לידים'},
  history:{t:'נתונים היסטוריים',body:`הזן נתונים בפועל מ-3 חודשים אחרונים. המערכת מחשבת ממוצעים של מחיר הליד, אחוז ההמרה ועלות הלקוח, ומציגה אותם ליד נתוני הבסיס שלמעלה.<br><br>הרעיון: לראות בעיניים אם המספרים שאתה משתמש בהם (בנתוני בסיס) תואמים למה שקורה באמת. אם יש פער גדול — אולי כדאי לעדכן את ההנחות.`,f:'ממוצע = סכום החודשים ÷ מספר חודשים עם נתונים'},
  weighted:{t:'חלוקה לפי ביצועים — איך זה עובד',body:`יעד החברה (מספר הלקוחות) מתחלק בין אנשי המכירות <b>לפי אחוז הסגירה</b> של כל אחד. מחברים את כל אחוזי הסגירה, וכל אחד מקבל את היחס שלו מתוך הסכום.<br><br>דוגמה: דני 25% ומאיה 15%. סכום = 40. דני מקבל 25/40 = 62% מהיעד, מאיה 15/40 = 38%.<br><br><b>שיחות נדרשות</b> = כמה שיחות (שענו) כל אחד צריך כדי לסגור את היעד שלו, לפי אחוז הסגירה האישי. אם זה עובר את הקיבולת המקסימלית — מופיעה אזהרה, כי היעד לא ריאלי.`,f:'חלק = (אחוז סגירה שלך ÷ סך הצוות) × יעד · שיחות = לקוחות ÷ אחוז סגירה'},
};
function help(key){return `<span class="help" onclick="openHelp('${key}')">?</span>`;}
function openHelp(key){
  const h=HELP[key]; if(!h)return;
  document.getElementById('modalBox').innerHTML=`<h3>${svg('info')} ${h.t}</h3><p>${h.body}</p>
    ${h.f?`<div class="formula">${h.f}</div>`:''}<button onclick="closeModal()">הבנתי</button>`;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}

/* ============================================================
   גיבוי
============================================================ */
function exportConfig(){
  try{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='kpi-backup-'+new Date().toISOString().slice(0,10)+'.json';
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1500);
    toast('קובץ הגיבוי הורד');
  }catch(err){ toast('שגיאה בהורדה'); }
}
function importConfig(e){
  const f=e.target.files[0]; if(!f)return; const rd=new FileReader();
  rd.onload=ev=>{try{ state=deepMerge(structuredClone(DEFAULTS),JSON.parse(ev.target.result)); saveState();
    simState=null; navigate(currentPage); toast('הנתונים יובאו'); }catch(err){toast('שגיאה בקובץ');}};
  rd.readAsText(f);
}
function resetAll(){ if(confirm('לאפס הכל לברירת מחדל?')){ state=structuredClone(DEFAULTS); saveState(); simState=null; salesView='team';activeRepId=null; navigate(currentPage); toast('אופס'); } }

/* ============================================================
   ממשק
============================================================ */
let toastTimer;
function toast(m){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=m;
  t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);}
function openDrawer(){document.getElementById('app').classList.add('drawer-open');}
function closeDrawer(){document.getElementById('app').classList.remove('drawer-open');}

/* בניית ניווט */
document.getElementById('navLinks').innerHTML=Object.entries(PAGES).map(([k,p],i)=>`
  <div class="nav-item ${k==='dashboard'?'active':''}" data-page="${k}" onclick="navigate('${k}')">
    <svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p.icon}</svg>
    <span>${k==='settings'?'נתוני בסיס (KPI)':k==='dashboard'?'סקירה כללית':k==='goals'?'יעדים ותכנון':k==='sales'?'אנשי מכירות':'סימולטור מהלכים'}</span>
  </div>`).join('');
document.getElementById('mobileNav').innerHTML=Object.entries(PAGES).map(([k,p])=>`
  <div class="mn ${k==='dashboard'?'active':''}" data-page="${k}" onclick="navigate('${k}')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p.icon}</svg>
    <span>${p.title}</span></div>`).join('');

navigate('dashboard');
