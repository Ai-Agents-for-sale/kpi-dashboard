<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>מרכז שליטה - KPI ותחזיות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e14; --bg-2:#0f1521; --panel:#141b2b; --panel-2:#1a2233;
  --line:#243047; --line-soft:#1c2535;
  --txt:#e8eef7; --txt-dim:#8a98b0; --txt-faint:#5d6a82;
  --accent:#3ddc97; --accent-2:#2bb87e; --accent-soft:rgba(61,220,151,.12);
  --blue:#4d9fff; --blue-soft:rgba(77,159,255,.12);
  --amber:#ffb74d; --amber-soft:rgba(255,183,77,.12);
  --red:#ff6b6b; --red-soft:rgba(255,107,107,.12);
  --purple:#a78bfa; --purple-soft:rgba(167,139,250,.12);
  --shadow:0 8px 30px rgba(0,0,0,.4); --radius:16px; --radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Heebo',sans-serif;
  background:radial-gradient(1200px 600px at 90% -10%, rgba(77,159,255,.08), transparent 60%),
    radial-gradient(1000px 500px at 0% 0%, rgba(61,220,151,.06), transparent 55%), var(--bg);
  color:var(--txt);-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
input,button,select{font-family:inherit}

.app{display:flex;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;background:linear-gradient(180deg,var(--bg-2),var(--bg));
  border-left:1px solid var(--line-soft);padding:22px 14px;display:flex;flex-direction:column;gap:6px;
  position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 18px}
.brand-mark{width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--blue));display:grid;place-items:center;
  font-weight:800;color:#06121e;font-size:20px;box-shadow:0 4px 14px rgba(61,220,151,.3)}
.brand-txt b{font-family:'Rubik';font-size:16px;font-weight:700;display:block;letter-spacing:-.3px}
.brand-txt span{font-size:11px;color:var(--txt-faint);font-weight:500}

/* GLOBAL GOAL BAR */
.goalbar{background:linear-gradient(135deg,var(--accent-soft),rgba(77,159,255,.05));
  border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:8px}
.goalbar .gb-lbl{font-size:11px;color:var(--txt-dim);font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:6px}
.goalbar .gb-lbl svg{width:13px;height:13px;color:var(--accent)}
.goalbar .gb-field{display:flex;align-items:center;background:var(--bg-2);border:1px solid var(--line);
  border-radius:9px;overflow:hidden}
.goalbar .gb-field span{padding:0 9px;color:var(--txt-faint);font-size:12px;font-weight:600}
.goalbar .gb-field input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--accent);
  font-family:'Rubik';font-weight:700;font-size:16px;padding:8px 4px 8px 9px;direction:ltr;text-align:right}

.nav-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;cursor:pointer;
  color:var(--txt-dim);font-weight:500;font-size:14.5px;transition:.16s;border:1px solid transparent}
.nav-item:hover{background:var(--panel);color:var(--txt)}
.nav-item.active{background:linear-gradient(135deg,var(--accent-soft),rgba(77,159,255,.06));
  color:var(--txt);border-color:var(--line)}
.nav-item.active .ni-ico{color:var(--accent)}
.ni-ico{width:20px;height:20px;flex-shrink:0;color:var(--txt-faint);transition:.16s}
.nav-sep{height:1px;background:var(--line-soft);margin:10px 8px}
.nav-foot{margin-top:auto;padding:8px}
.nav-foot button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel);color:var(--txt-dim);font-size:12.5px;font-weight:500;cursor:pointer;
  transition:.16s;display:flex;align-items:center;justify-content:center;gap:7px}
.nav-foot button:hover{background:var(--panel-2);color:var(--txt)}

.main{flex:1;min-width:0;padding:30px 38px 60px;max-width:1400px}
.page-head{margin-bottom:22px}
.page-head h1{font-family:'Rubik';font-size:27px;font-weight:700;letter-spacing:-.5px}
.page-head p{color:var(--txt-dim);font-size:14px;margin-top:5px;max-width:640px}

.topbar{display:none;align-items:center;justify-content:space-between;padding:12px 16px;
  background:var(--bg-2);border-bottom:1px solid var(--line-soft);position:sticky;top:0;z-index:50;gap:10px}
.topbar .brand{padding:0}
.topbar .gb-field-m{display:flex;align-items:center;background:var(--panel);border:1px solid var(--line);
  border-radius:9px;overflow:hidden;flex:1;max-width:160px}
.topbar .gb-field-m span{padding:0 8px;color:var(--txt-faint);font-size:11px}
.topbar .gb-field-m input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--accent);
  font-family:'Rubik';font-weight:700;font-size:14px;padding:7px 4px;direction:ltr;text-align:right}
.burger{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--panel);
  display:grid;place-items:center;cursor:pointer;color:var(--txt);flex-shrink:0}

.grid{display:grid;gap:16px}
.cols-4{grid-template-columns:repeat(4,1fr)}
.cols-5{grid-template-columns:repeat(5,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:repeat(2,1fr)}
.card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
  border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.card-h h3{font-family:'Rubik';font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-h .sub{font-size:12px;color:var(--txt-faint)}

.kpi{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
  border-radius:var(--radius);padding:18px 18px 16px;position:relative;overflow:hidden;transition:.2s}
.kpi:hover{transform:translateY(-2px)}
.kpi::before{content:'';position:absolute;top:0;right:0;width:100%;height:3px;background:var(--bar,var(--accent));opacity:.8}
.kpi .lbl{font-size:12.5px;color:var(--txt-dim);font-weight:500;display:flex;align-items:center;gap:7px}
.kpi .lbl-ico{width:15px;height:15px;color:var(--bar,var(--accent));flex-shrink:0}
.kpi .val{font-family:'Rubik';font-size:27px;font-weight:700;margin-top:9px;letter-spacing:-.5px;
  white-space:nowrap;direction:ltr;text-align:right}
.kpi .val .cur{font-size:15px;color:var(--txt-dim);font-weight:500}
.kpi .meta{font-size:11.5px;color:var(--txt-faint);margin-top:6px}

.kpi-table{width:100%;border-collapse:collapse}
.kpi-table th{text-align:right;font-size:11.5px;color:var(--txt-faint);font-weight:600;
  padding:0 6px 12px;text-transform:uppercase;letter-spacing:.5px}
.kpi-table td{padding:7px 6px;border-top:1px solid var(--line-soft);vertical-align:middle}
.kpi-row-lbl{display:flex;align-items:center;gap:11px}
.kpi-row-ico{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;
  background:var(--ic-bg,var(--accent-soft))}
.kpi-row-ico svg{width:17px;height:17px;color:var(--ic,var(--accent))}
.kpi-row-lbl b{font-size:14px;font-weight:500;display:block}
.kpi-row-lbl small{font-size:11.5px;color:var(--txt-faint)}

.field{position:relative;display:inline-flex;align-items:center;background:var(--bg-2);
  border:1px solid var(--line);border-radius:10px;transition:.15s;overflow:hidden}
.field:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field input{width:100%;background:transparent;border:none;outline:none;color:var(--txt);
  font-size:15px;font-weight:600;padding:9px 12px;direction:ltr;text-align:right;font-family:'Rubik'}
.field .affix{padding:0 11px;color:var(--txt-faint);font-size:13px;font-weight:600;background:var(--panel-2);
  align-self:stretch;display:flex;align-items:center;border-right:1px solid var(--line)}
.field.w-sm{width:130px}
.field.w-md{width:100%}

.editable-cell{display:flex;justify-content:flex-end}

/* editable label */
.lbl-edit{background:transparent;border:none;color:inherit;font:inherit;font-size:14px;font-weight:500;
  padding:1px 3px;border-radius:5px;border-bottom:1px dashed transparent;width:auto;max-width:100%;
  field-sizing:content;box-sizing:content-box}
.lbl-edit:hover{border-bottom-color:var(--line)}
.lbl-edit:focus{outline:none;background:var(--bg-2);border-bottom-color:var(--accent)}
.title-edit{font-family:'Rubik';font-size:16px;font-weight:600;max-width:100%;width:auto;min-width:40px}
.title-edit:hover{border-bottom-color:var(--line)}

.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600}
.tag.green{background:var(--accent-soft);color:var(--accent)}
.tag.blue{background:var(--blue-soft);color:var(--blue)}
.tag.amber{background:var(--amber-soft);color:var(--amber)}
.tag.red{background:var(--red-soft);color:var(--red)}
.tag.purple{background:var(--purple-soft);color:var(--purple)}

/* daily/monthly breakdown rows */
.brk{display:flex;flex-direction:column;gap:1px}
.brk-row{display:flex;align-items:center;padding:13px 6px;border-bottom:1px solid var(--line-soft);gap:10px}
.brk-row:last-child{border-bottom:none}
.brk-ico{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;background:var(--bg-2)}
.brk-ico svg{width:18px;height:18px;color:var(--bi,var(--accent))}
.brk-name{flex:1;min-width:0}
.brk-name b{font-size:14px;font-weight:500;display:block}
.brk-name small{font-size:11.5px;color:var(--txt-faint)}
.brk-vals{display:flex;gap:18px;text-align:left}
.brk-v{min-width:74px;text-align:center}
.brk-v .vv{font-family:'Rubik';font-size:18px;font-weight:700;direction:ltr;display:block}
.brk-v .vl{font-size:10.5px;color:var(--txt-faint);text-transform:uppercase;letter-spacing:.4px}
.brk-v.daily .vv{color:var(--blue)}
.brk-v.monthly .vv{color:var(--txt)}

/* breakdown vertical table */
.brk-table-wrap{overflow-x:auto}
.brk-table{width:100%;border-collapse:collapse;min-width:560px}
.brk-table th{padding:0 10px 14px;text-align:center;font-family:'Rubik';font-weight:600;font-size:13.5px;border-bottom:1px solid var(--line)}
.brk-table th.brk-corner{width:90px}
.brk-table th .lbl-edit{text-align:center;width:100%;max-width:none;font-family:'Rubik';font-weight:600;font-size:13.5px}
.brk-trow td{padding:15px 10px;text-align:center;font-family:'Rubik';font-weight:700;font-size:19px;direction:ltr;border-bottom:1px solid var(--line-soft)}
.brk-trow.daily td{color:var(--blue);font-size:16px}
.brk-trow .brk-rowlbl{font-family:'Heebo';font-weight:500;font-size:12.5px;color:var(--txt-faint);text-align:right;direction:rtl;white-space:nowrap}
.brk-trow .brk-rowlbl svg{width:14px;height:14px;vertical-align:-2px;margin-left:4px}

.statlist{display:flex;flex-direction:column;gap:1px}
.statlist .sl{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--line-soft);gap:10px}
.statlist .sl:last-child{border-bottom:none}
.statlist .sl-l{display:flex;align-items:center;gap:11px}
.statlist .sl-l .dot{width:9px;height:9px;border-radius:50%;background:var(--d,var(--accent));flex-shrink:0}
.statlist .sl-l span{font-size:13.5px;color:var(--txt-dim)}
.statlist .sl-v{font-family:'Rubik';font-weight:700;font-size:15px;direction:ltr;white-space:nowrap}

.notice{background:var(--blue-soft);border:1px solid rgba(77,159,255,.25);border-radius:12px;
  padding:13px 16px;font-size:13px;color:var(--txt);display:flex;gap:11px;align-items:flex-start;margin-bottom:18px}
.notice svg{width:18px;height:18px;color:var(--blue);flex-shrink:0;margin-top:1px}
.notice.warn{background:var(--red-soft);border-color:rgba(255,107,107,.3)}
.notice.warn svg{color:var(--red)}
.notice.ok{background:var(--accent-soft);border-color:rgba(61,220,151,.3)}
.notice.ok svg{color:var(--accent)}

.hint{font-size:12px;color:var(--txt-faint);margin-top:4px}
.goal-prog{height:12px;border-radius:8px;background:var(--bg-2);overflow:hidden;border:1px solid var(--line-soft);position:relative}
.goal-prog .fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--accent),var(--blue));transition:width .6s}
.goal-prog .fill.warn{background:linear-gradient(90deg,var(--amber),var(--red))}

.split{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.delta-pos{color:var(--accent)} .delta-neg{color:var(--red)}
.hidden{display:none!important}

/* help "?" */
.help{width:16px;height:16px;border-radius:50%;border:1px solid var(--line);background:var(--bg-2);
  color:var(--txt-faint);font-size:11px;font-weight:700;display:inline-grid;place-items:center;cursor:pointer;
  flex-shrink:0;transition:.15s}
.help:hover{border-color:var(--accent);color:var(--accent)}
/* בטיחות: svg מוטבע בתוך span (אייקון ליד טקסט) לא יתנפח */
span > svg:not([class]){width:16px;height:16px;flex-shrink:0;vertical-align:-2px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;
  align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px;max-width:440px;
  width:100%;box-shadow:var(--shadow);max-height:85vh;overflow-y:auto}
.modal h3{font-family:'Rubik';font-size:18px;margin-bottom:12px;display:flex;align-items:center;gap:9px}
.modal p{font-size:14px;color:var(--txt-dim);line-height:1.7;margin-bottom:10px}
.modal .formula{background:var(--bg-2);border:1px solid var(--line-soft);border-radius:10px;padding:12px 14px;
  font-family:'Rubik';font-size:13.5px;direction:ltr;text-align:left;color:var(--accent);margin:10px 0}
.modal button{margin-top:8px;background:var(--accent);color:#06121e;border:none;padding:10px 20px;
  border-radius:9px;font-weight:600;cursor:pointer;font-size:14px;width:100%}

input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:6px;background:var(--bg-2);
  border:1px solid var(--line-soft);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--accent);cursor:pointer;border:3px solid var(--bg);box-shadow:0 0 0 1px var(--accent)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent);
  cursor:pointer;border:3px solid var(--bg)}
.slider-row{margin-bottom:18px}
.slider-row .sr-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.slider-row .sr-h label{font-size:13.5px;color:var(--txt-dim);font-weight:500}
.slider-row .sr-h b{font-family:'Rubik';font-size:16px;direction:ltr}

.btn{border:none;border-radius:10px;font-weight:600;cursor:pointer;font-size:14px;padding:11px 20px;transition:.15s}
.btn-primary{background:var(--accent);color:#06121e}
.btn-ghost{background:var(--panel-2);border:1px solid var(--line);color:var(--txt)}
.btn-danger{background:var(--red-soft);color:var(--red);border:1px solid rgba(255,107,107,.3)}
.btn-sm{padding:6px 12px;font-size:12px}

.rep-pill{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:11px;cursor:pointer;
  background:var(--bg-2);border:1px solid var(--line);font-size:13.5px;font-weight:500;color:var(--txt-dim);transition:.15s}
.rep-pill:hover{border-color:var(--accent);color:var(--txt)}
.rep-pill.active{background:var(--accent);color:#06121e;border-color:var(--accent);font-weight:600}
.rep-pill .av{width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.15);display:grid;place-items:center;font-weight:700;font-size:12px}
.rep-pill.active .av{background:rgba(0,0,0,.2)}

.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--panel-2);border:1px solid var(--accent);
  border-radius:12px;padding:13px 18px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:10px;transform:translateY(80px);opacity:0;transition:.3s cubic-bezier(.4,0,.2,1)}
.toast.show{transform:translateY(0);opacity:1}
.toast svg{width:18px;height:18px;color:var(--accent)}

@media(max-width:920px){
  .sidebar{display:none}
  .topbar{display:flex}
  .main{padding:18px 14px 84px;max-width:100%}
  .cols-4{grid-template-columns:repeat(2,1fr)}
  .cols-5{grid-template-columns:repeat(2,1fr)}
  .cols-3{grid-template-columns:1fr}
  .cols-2,.split{grid-template-columns:1fr}
  .page-head h1{font-size:21px}
  .field.w-sm{width:120px}
  .kpi .val{font-size:22px}
  .brk-vals{gap:10px}.brk-v{min-width:58px}.brk-v .vv{font-size:15px}
  .kpi-table th:nth-child(3),.kpi-table td:nth-child(3){display:none}
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--bg-2);
    border-top:1px solid var(--line);padding:7px 4px;justify-content:space-around}
  .mobile-nav .mn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;
    border-radius:10px;color:var(--txt-faint);cursor:pointer;font-size:10px;font-weight:500}
  .mobile-nav .mn.active{color:var(--accent)}
  .mobile-nav .mn svg{width:20px;height:20px}
}
.mobile-nav{display:none}
.drawer-open .sidebar{display:flex;position:fixed;z-index:200;right:0;top:0;width:260px;animation:slidein .2s}
@keyframes slidein{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}
.drawer-open .drawer-bg{display:block}
[data-editable]{cursor:text;border-radius:4px;padding:1px 3px;margin:-1px -3px;transition:background .15s}
[data-editable]:hover{background:rgba(255,255,255,.04);outline:1px dashed rgba(255,255,255,.1)}
[data-editable]:focus{background:rgba(61,220,151,.08);outline:1px solid var(--accent);background-clip:padding-box}
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">Z</div><div class="brand-txt"><b>מרכז שליטה</b><span>KPI ותחזיות</span></div></div>
    <div class="goalbar">
      <div id="baselineHint"></div>
      <div class="gb-lbl">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
        יעד רווח תפעולי חודשי
      </div>
      <div class="gb-field"><span>₪</span><input type="number" id="globalGoal" oninput="setGlobalGoal(this.value)"></div>
      <div id="goalHint"></div>
    </div>
    <div id="navLinks"></div>
    <div class="nav-foot">
      <button onclick="fetchFromMonday(false)" style="margin-bottom:8px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        משוך נתונים ממאנדיי</button>
      <button onclick="exportConfig()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        גיבוי / ייצוא נתונים</button>
    </div>
  </aside>
  <div class="drawer-bg" onclick="closeDrawer()"></div>
  <div style="flex:1;min-width:0;display:flex;flex-direction:column">
    <div class="topbar">

/* ============================================================

const DEFAULTS = {

  activeClients:0,                // לקוחות פעילים נוכחית (ממאנדיי - כמות חיובי ריטיינר)
  churnRate:0,                    // אחוז שחיקה חודשי (% מהפעילים שעוזבים)
  actBudget:'', actLeads:'', actCloses:'', actDays:'',

  churnMonthsBack:1,              // כמה חודשים לכלול בחישוב אחוז השחיקה (נפרד מהשאר)

  setupClients: 0,                // לקוחות בהקמה

  retainersIncomeSoFar: 0,        // סכום ריטיינרים שנכנסו עד היום
  setupIncomeSoFar: 0,            // סכום הקמות שנכנסו עד היום
  joinedRetainer: 0,              // לקוחות שהצטרפו לריטיינר החודש
  history:[

const META = {

  retainer:{label:'ריטיינר חודשי ממוצע של לקוחות פעילים', sub:'הריטיינר הקיים של הבסיס', affix:'₪', icon:'repeat', color:'green'},
  retainerNew:{label:'ריטיינר ללקוחות חדשים מהיום', sub:'מחיר עדכני לחדשים שיצטרפו', affix:'₪', icon:'repeat', color:'green'},

  onboardMin:{label:'אורך פגישת אונבורדינג', sub:'לכל לקוח שנסגר', affix:'דק׳', icon:'handshake', color:'amber'},

  onboardCostHr:{label:'עלות מבצע אונבורדינג', sub:'תשלום לשעה (אם רלוונטי)', affix:'₪/שע׳', icon:'wallet', color:'red'},
  activeClients:{label:'לקוחות פעילים', sub:'משלמים ריטיינר חודש זה', affix:'לקוחות', icon:'users', color:'green'},
  churnRate:{label:'אחוז שחיקה חודשי', sub:'כמה אחוז עוזבים בחודש', affix:'%', icon:'trend', color:'red'},
};
// תוויות חינמיות שניתנות לעריכה גם הן (בפירוק היעד)
const TEXT_LABELS = {
  bd_leads:'לידים (פניות)', bd_calls:'שיחות שענו', bd_marketing:'תקציב שיווק',
  bd_sales:'מכירות (לקוחות)', bd_onboard:'פגישות אונבורדינג', bd_onboardHrs:'שעות אונבורדינג',
};

let state = loadState();

function loadState(){
  try{ const s = localStorage.getItem('kpiState_v2');
    if(s){ const p = JSON.parse(s); return deepMerge(structuredClone(DEFAULTS), p); }
  }catch(e){}
  return structuredClone(DEFAULTS);
}
function deepMerge(base, over){
  for(const k in over){
    if(k==='reps' || k==='history'){ base[k] = over[k]; }
    else if(over[k] && typeof over[k]==='object' && !Array.isArray(over[k])) base[k]=deepMerge(base[k]||{},over[k]);
    else base[k]=over[k];
  }
  return base;
}
function saveState(){ try{ localStorage.setItem('kpiState_v2', JSON.stringify(state)); }catch(e){} }

/* תווית — או מותאמת אישית או ברירת מחדל */
function L(key){ return (state.labels && state.labels[key]) || (META[key]?.label) || TEXT_LABELS[key] || key; }

/* כותרת ניתנת לעריכה (כרטיסים/מסכים). key ייחודי, def = ברירת מחדל */
function T(key, def){
  const val=(state.labels && state.labels['T_'+key]) || def;
  return `<input class="lbl-edit title-edit" value="${val.replace(/"/g,'&quot;')}" data-lblkey="T_${key}" onchange="setLabel(this)" onclick="this.select()">`;
}

/* ============================================================
   מנוע חישוב
============================================================ */
function compute(s = state){
  const answer = s.answerRate/100;
  const close  = s.closeRate/100;
  const commPct= s.salesCommPct/100;
  const onbCommPct = (s.onboardCommPct||0)/100;
  const procPct = (s.processingFeePct||0)/100;
  const effConv = answer*close;                          // המרה אפקטיבית מליד ללקוח

  // === הפרדה בין ריטיינר קיים (לבסיס) לחדש (ללקוחות חדשים) ===
  // s.retainer    - ריטיינר ממוצע של פעילים כיום (משמש לחישוב ההכנסה מהבסיס בלבד)
  // s.retainerNew - מחיר ריטיינר מהיום ללקוחות חדשים (משמש לכל החישובים על חדשים)
  const retainerForNew = (s.retainerNew!=null && s.retainerNew>0) ? s.retainerNew : s.retainer;

  const totalRetainer  = retainerForNew*s.avgMonths;     // סך ריטיינרים שלקוח חדש ישלם לאורך חייו
  const revPerClient   = s.setupFee + totalRetainer;     // LTV של לקוח חדש (במחיר עדכני)
  const leadsPerClient = effConv>0 ? 1/effConv : Infinity;
  const callsPerClient = close>0 ? 1/close : Infinity;
  const onboardPerClient = 1;
  const onboardHrsPerClient = s.onboardMin/60;

  // === עלויות פר לקוח חדש (לאורך כל חייו) — מבוססות על retainerNew ===
  const acqCost  = leadsPerClient * s.costPerLead;       // עלות שיווק ללקוח
  const commCost = s.setupFee * commPct;                  // עמלת מכירה (% מהקמה)
  const onbCommCost = retainerForNew * onbCommPct;        // אונבורדינג: % מהריטיינר הראשון של החדש
  const procCost = revPerClient * procPct;                // סליקה: % מכל ההכנסה לאורך החיים
  const onbHourlyCost = onboardHrsPerClient * s.onboardCostHr;
  const varCostPerClient = acqCost + commCost + onbCommCost + procCost + onbHourlyCost;

  const grossPerClient = revPerClient - varCostPerClient; // רווח גולמי ללקוח חדש לאורך חייו
  const grossMarginPct = revPerClient>0 ? grossPerClient/revPerClient*100 : 0;
  const cac = varCostPerClient;
  const ltvCacRatio = cac>0 ? revPerClient/cac : 0;

  const callsPerDayPerRep = s.callMin>0 ? Math.floor((s.workHoursDay*60)/s.callMin) : 0;
  const callsPerMonthPerRep = callsPerDayPerRep * s.workDaysMonth;

  // === מודל חודשי: רווח החודש מבוסס על קצב חודשי, לא LTV ===
  // הבסיס הקיים משלם לפי המחיר הישן (s.retainer), לא לפי המחיר החדש!
  const churnPct = (s.churnRate||0)/100;
  const activeNow = s.activeClients||0;
  const activePayingThisMonth = activeNow * (1 - churnPct/2);
  // ריטיינרים חודשיים מבסיס לקוחות קיים — לפי המחיר הישן שלהם
  const monthlyRetainerFromBase = activePayingThisMonth * s.retainer;
  const monthlyRetainerNetFromBase = monthlyRetainerFromBase * (1 - procPct);

  return {
    answer,close,effConv,commPct,onbCommPct,procPct,revPerClient,totalRetainer,leadsPerClient,callsPerClient,
    onboardPerClient,onboardHrsPerClient,acqCost,commCost,onbCommCost,procCost,onbHourlyCost,varCostPerClient,
    grossPerClient,grossMarginPct,cac,ltvCacRatio,callsPerDayPerRep,callsPerMonthPerRep,
    churnPct,activeNow,activePayingThisMonth,monthlyRetainerFromBase,monthlyRetainerNetFromBase,
    retainerForNew  // מחיר ריטיינר ללקוחות חדשים שיצטרפו
  };
}

/* ============================================================
   מודל הרווח החודשי (כולל בסיס לקוחות קיים)
============================================================ */
/* מחשב את הרווח החודשי בהינתן כמות לקוחות חדשים שגויסו החודש */
function monthlyProfitFromNewClients(newClients, s = state){
  const c = compute(s);
  // הכנסה החודש מלקוחות חדשים = הקמה (חד-פעמי) + ריטיינר ראשון במחיר העדכני
  const setupRevNew = newClients * s.setupFee;
  const retainerRevNew = newClients * c.retainerForNew;
  const revenueFromNew = setupRevNew + retainerRevNew;
  // הכנסה החודש מלקוחות קיימים = ריטיינר ישן × פעילים משלמים
  const revenueFromExisting = c.monthlyRetainerFromBase;
  // סך הכנסה חודש
  const totalMonthlyRevenue = revenueFromNew + revenueFromExisting;
  // עלויות חודש
  const marketingBudget = newClients * c.acqCost;        // שיווק רק על חדשים
  const salesComm = setupRevNew * c.commPct;             // עמלת מכירות על הקמות חדשות
  const onbComm = newClients * c.onbCommCost;            // אונבורדינג רק על חדשים (פעם אחת)
  const procFee = totalMonthlyRevenue * c.procPct;       // סליקה על כל מה שעובר החודש
  const variableCosts = marketingBudget + salesComm + onbComm + procFee;
  const monthlyGross = totalMonthlyRevenue - variableCosts;
  const monthlyOperating = monthlyGross - s.fixedCosts;
  return {
    newClients,
    revenueFromNew, revenueFromExisting, totalMonthlyRevenue,
    marketingBudget, salesComm, onbComm, procFee, variableCosts,
    monthlyGross, monthlyOperating
  };
}

/* רווח מלקוח חדש בחודש שבו הוא מצטרף (לא LTV, רק חודש ראשון).
   הכנסה: הקמה + ריטיינר חדש ראשון.
   עלויות: שיווק (CAC) + עמלת מכירה + אונבורדינג + סליקה. */
function profitFromOneNewClient(s = state){
  const c = compute(s);
  const revenue = s.setupFee + c.retainerForNew;
  const acquisitionCost = c.acqCost;            // עלות שיווק לגייס לקוח אחד
  const salesComm = s.setupFee * c.commPct;
  const onbComm = c.retainerForNew * c.onbCommPct;
  const procFee = revenue * c.procPct;
  return revenue - acquisitionCost - salesComm - onbComm - procFee;
}

/* רווח מלקוח שנמצא כרגע בהקמה ועובר לריטיינר.
   ההכנסה: ריטיינר ממוצע של ההקמה + ההקמה הנותרת.
   העלויות: סליקה, אונבורדינג, עמלת מכירה רק על חצי ההקמה שנותר.
   *לא כולל שיווק - כי כבר שולם.* */
function profitFromOneSetupClient(s = state){
  const c = compute(s);
  if(!s.setupClients || s.setupClients<=0) return 0;
  const retainerAvg = (s.setupRetainers||0) / s.setupClients;
  const remainingSetupAvg = (s.setupRemaining||0) / s.setupClients;
  const revenue = retainerAvg + remainingSetupAvg;
  const salesComm = remainingSetupAvg * c.commPct;   // עמלת מכירה רק על מה שנותר להשלים
  const onbComm = retainerAvg * c.onbCommPct;
  const procFee = revenue * c.procPct;
  return revenue - salesComm - onbComm - procFee;
}

/* רווח מלקוח שעזב וחוזר. אין הקמה (כבר שילם פעם), אין שיווק.
   *דורש שדות lostClients ו-lostRetainers במאנדיי - שעדיין לא קיימים.* */
function profitFromOneReturningClient(s = state){
  const c = compute(s);
  if(!s.lostClients || s.lostClients<=0 || !s.lostRetainers) return 0;
  const retainerAvg = s.lostRetainers / s.lostClients;
  const revenue = retainerAvg;
  const onbComm = retainerAvg * c.onbCommPct;
  const procFee = revenue * c.procPct;
  return revenue - onbComm - procFee;
}

/* רווח שנכנס בפועל עד היום, לפי נתוני המאנדיי האמיתיים.
   - ריטיינרים שנכנסו עד היום (מהמאנדיי ישירות)
   - הקמות שנכנסו עד היום (מהמאנדיי ישירות)
   - מנכים: סליקה, עמלת מכירה, עמלת אונבורדינג, שיווק, הוצאות קבועות (כל החודש - לפי הוראת המשתמש) */
/* תקציב שיווק שיצא בפועל עד היום - מהמאנדיי ישירות (numeric_mm4aqc1a).
   אם אין נתון מהמאנדיי, חוזרים ל-actBudget (קלט ידני). */
function getMarketingSpentSoFar(s = state){
  // עדיפות: מהמאנדיי ישיר
  if(s.mondayRaw && s.mondayRaw.current && s.mondayRaw.current.budget>0){
    return parseFloat(s.mondayRaw.current.budget);
  }
  // fallback - ידני
  return parseFloat(s.actBudget) || 0;
}

/* גדילה אחוזית בין שני ערכים */
function growthPct(now, prev){
  if(!prev || prev===0) return null;
  return ((now - prev)/prev)*100;
}

/* ממוצע גדילה חודשית של מטריקה לאורך n חודשים אחורה.
   getter = פונקציה שלוקחת חודש ומחזירה את המספר.
   history = state.mondayRaw.history (סדר: מהחדש לישן). */
function avgGrowthOverMonths(getter, n, s = state){
  if(!s.mondayRaw || !s.mondayRaw.history) return null;
  const hist = s.mondayRaw.history.slice(0, n+1); // לוקח n+1 כי צריך n זוגות
  if(hist.length<2) return null;
  const pcts = [];
  for(let i=0; i<hist.length-1; i++){
    const nowVal = getter(hist[i]);
    const prevVal = getter(hist[i+1]);
    const p = growthPct(nowVal, prevVal);
    if(p!=null && isFinite(p)) pcts.push(p);
  }
  if(!pcts.length) return null;
  return pcts.reduce((a,b)=>a+b,0)/pcts.length;
}

/* רווח גולמי = כל מה שמופיע ברווח התפעולי, פחות הוצאות קבועות */
function grossProfitSoFar(s = state){
  const r = profitSoFar(s);
  return r.operating + (s.fixedCosts||0);
}
function grossProfitExpected(s = state){
  const r = profitExpectedEndOfMonth(s);
  return r.operating + (s.fixedCosts||0);
}

/* רווח תפעולי צפוי לסוף החודש - בלי שחיקה */
function profitExpectedNoChurn(s = state){
  const c = compute(s);
  const activeEnd = s.activeClients || 0;
  const retainerAvg = s.retainer || 0;
  const expectedRetainers = activeEnd * retainerAvg; // ללא churn factor
  const setupIncome = s.setupIncomeSoFar || 0;
  const totalIncome = expectedRetainers + setupIncome;
  const procFee = totalIncome * c.procPct;
  const salesComm = setupIncome * c.commPct;
  const joinedRetainer = s.joinedRetainer || 0;
  const onbComm = joinedRetainer * c.onbCommPct * retainerAvg;
  const marketingSoFar = getMarketingSpentSoFar(s);
  const fixedCosts = s.fixedCosts || 0;
  return totalIncome - procFee - salesComm - onbComm - marketingSoFar - fixedCosts;
}

/* רווח צפוי לחודש בעתיד.
   monthsAhead = 1 לחודש הבא, 2 לחודש אחריו (חודשיים קדימה)
   הנוסחה:
   - בסיס: סכום ריטיינרים פעילים × (1 − שחיקה×monthsAhead) − סליקה
   - + רווח מהקמות חדשות: ממוצע סגירות × מחיר הקמה − עמלת מכירות − עלות גיוס לקוח
   - + רווח מריטיינרים חדשים: ממוצע joinedRetainer × ריטיינר חדש − אונבורדינג − סליקה
   - − הוצאות קבועות */
function profitNextMonth(s = state, monthsBack, monthsAhead = 1){
  if(monthsBack==null) monthsBack = s.nextMonthMonthsBack||3;
  const c = compute(s);
  const hist = (s.mondayRaw && s.mondayRaw.history) ? s.mondayRaw.history.slice(0, monthsBack) : [];
  const avg = (getter) => {
    if(!hist.length) return 0;
    const vals = hist.map(getter).filter(v=>v!=null && !isNaN(v));
    if(!vals.length) return 0;
    return vals.reduce((a,b)=>a+b,0)/vals.length;
  };
  const avgClosesPerMonth = avg(m => m.closes);
  const avgNewJoined = avg(m => m.joinedRetainer);
  const churnRate = (s.churnRate||0)/100;  // אחוז שחיקה חודשי (קבוע)
  const fixedCosts = s.fixedCosts || 0;

  // === סימולציה חודש-אחר-חודש ===
  // הבסיס המקורי משלם s.retainer הישן, חדשים שגויסו משלמים c.retainerForNew החדש
  let originalBase = s.activeClients || 0;
  let newAccumulated = 0;   // חדשים שהצטרפו לריטיינר במהלך החודשים שעברו
  let lastMonthResult = null;

  for(let m = 1; m <= monthsAhead; m++){
    // שחיקה - מתפזרת לחצי החודש (חצי משלמים, חצי לא)
    const leavingOriginal = originalBase * churnRate;
    const leavingNew = newAccumulated * churnRate;
    const payingOriginal = originalBase - leavingOriginal/2;
    const payingNewExisting = newAccumulated - leavingNew/2;
    // הכנסה מריטיינרים פעילים
    const retainerFromBase = payingOriginal * (s.retainer||0);
    const retainerFromAccumulated = payingNewExisting * c.retainerForNew;
    const totalActiveRetainers = retainerFromBase + retainerFromAccumulated;
    const procFeeBase = totalActiveRetainers * c.procPct;
    const baseNet = totalActiveRetainers - procFeeBase;
    // הקמות חדשות
    const newSetupRevenue = avgClosesPerMonth * s.setupFee;
    const newSetupSalesComm = newSetupRevenue * c.commPct;
    const newSetupAcqCost = avgClosesPerMonth * c.acqCost;
    const newSetupProcFee = newSetupRevenue * c.procPct;
    const newSetupNet = newSetupRevenue - newSetupSalesComm - newSetupAcqCost - newSetupProcFee;
    // ריטיינרים חדשים (שהצטרפו החודש)
    const newRetainerRevenue = avgNewJoined * c.retainerForNew;
    const newRetainerOnbComm = newRetainerRevenue * c.onbCommPct;
    const newRetainerProcFee = newRetainerRevenue * c.procPct;
    const newRetainerNet = newRetainerRevenue - newRetainerOnbComm - newRetainerProcFee;
    const operating = baseNet + newSetupNet + newRetainerNet - fixedCosts;
    // עדכון הבסיס לחודש הבא
    originalBase = originalBase - leavingOriginal;
    newAccumulated = newAccumulated - leavingNew + avgNewJoined;
    lastMonthResult = {
      monthsAhead: m, monthsBack,
      avgClosesPerMonth, avgNewJoined,
      activeRetainersGross: totalActiveRetainers + (leavingOriginal/2)*s.retainer + (leavingNew/2)*c.retainerForNew,
      churnFactor: 1 - churnRate/2,
      activeRetainersAfterChurn: totalActiveRetainers,
      activeRetainersProcFee: procFeeBase,
      activeRetainersNet: baseNet,
      // פירוט שתי השכבות של הבסיס הפעיל
      payingOriginal, payingNewExisting,
      retainerFromBase, retainerFromAccumulated,
      originalBaseStart: originalBase,
      newAccumulatedStart: newAccumulated,
      newSetupRevenue, newSetupSalesComm, newSetupAcqCost, newSetupProcFee, newSetupNet,
      newRetainerRevenue, newRetainerOnbComm, newRetainerProcFee, newRetainerNet,
      fixedCosts,
      operating,
      // נתונים על הבסיס בסוף החודש
      activeOriginalAfter: originalBase - leavingOriginal,
      activeNewAfter: newAccumulated - leavingNew + avgNewJoined,
      totalActiveAfter: (originalBase - leavingOriginal) + (newAccumulated - leavingNew + avgNewJoined),
    };
  }
  return lastMonthResult;
}

function profitSoFar(s = state){
  const c = compute(s);
  const retainersIncome = s.retainersIncomeSoFar || 0;
  const setupIncome = s.setupIncomeSoFar || 0;
  const totalIncome = retainersIncome + setupIncome;
  // הוצאות
  const procFee = totalIncome * c.procPct;
  const salesComm = setupIncome * c.commPct;  // עמלת מכירה רק על ההקמות שנכנסו
  const joinedRetainer = s.joinedRetainer || 0;
  const retainerAvgActive = s.retainer || 0;
  const onbComm = joinedRetainer * c.onbCommPct * retainerAvgActive;
  const actBudget = getMarketingSpentSoFar(s);  // מהמאנדיי ישירות
  const fixedCosts = s.fixedCosts || 0;
  return {
    income: totalIncome,
    retainersIncome,
    setupIncome,
    procFee,
    salesComm,
    onbComm,
    marketing: actBudget,
    fixedCosts,
    operating: totalIncome - procFee - salesComm - onbComm - actBudget - fixedCosts,
  };
}

/* רווח צפוי לסוף החודש - אם לא ייסגרו עוד לקוחות מהיום והלאה.
   - ריטיינר צפוי: פעילים בסוף חודש × ריטיינר ממוצע פעילים × (1 − שחיקה/2)
   - הקמות: מה שנכנס בפועל עד היום (לא מוסיפים יותר)
   - אונבורדינג: רק על מי שכבר הצטרף לריטיינר החודש
   - שיווק: רק מה שיצא עד היום (לפי הוראת המשתמש - לא חוזים יותר) */
function profitExpectedEndOfMonth(s = state){
  const c = compute(s);
  const activeEnd = s.activeClients || 0;
  const retainerAvg = s.retainer || 0;
  const churnFactor = 1 - (s.churnRate/100)/2;
  const expectedRetainers = activeEnd * retainerAvg * churnFactor;
  const setupIncome = s.setupIncomeSoFar || 0;
  const totalIncome = expectedRetainers + setupIncome;
  const procFee = totalIncome * c.procPct;
  const salesComm = setupIncome * c.commPct;
  const joinedRetainer = s.joinedRetainer || 0;
  const onbComm = joinedRetainer * c.onbCommPct * retainerAvg;
  // שיווק = רק מה שיצא עד היום (מהמאנדיי ישירות)
  const marketingSoFar = getMarketingSpentSoFar(s);
  const fixedCosts = s.fixedCosts || 0;
  return {
    income: totalIncome,
    expectedRetainers,
    setupIncome,
    procFee,
    salesComm,
    onbComm,
    marketing: marketingSoFar,
    fixedCosts,
    operating: totalIncome - procFee - salesComm - onbComm - marketingSoFar - fixedCosts,
  };
}

/* חישוב הפוך: כמה לקוחות חדשים צריך כדי להגיע ליעד רווח חודשי */
function newClientsForMonthlyProfit(targetProfit, s = state){
  const c = compute(s);
  // לקוחות חדשים משלמים retainerForNew (לא retainer הישן)
  // X = (setupFee + retainerForNew)*(1-procPct) - acqCost - setupFee*commPct - onbCommCost
  // Y = monthlyRetainerFromBase * (1 - procPct)  (הבסיס משלם לפי retainer הישן)
  const X = (s.setupFee + c.retainerForNew) * (1 - c.procPct) - c.acqCost - s.setupFee*c.commPct - c.onbCommCost;
  const Y = c.monthlyRetainerFromBase * (1 - c.procPct);
  const needed = X>0 ? (targetProfit + s.fixedCosts - Y) / X : Infinity;
  return Math.max(0, needed);
}

/* תחזית 12 חודשים: איך הבסיס מתפתח בהינתן גיוס חודשי קבוע ושחיקה
   הפרדה: הבסיס המקורי משלם s.retainer, החדשים שהצטרפו משלמים c.retainerForNew */
function forecast12Months(monthlyNewClients, s = state){
  const c = compute(s);
  let originalBase = s.activeClients||0;       // הבסיס המקורי (משלם retainer הישן)
  let newAccumulated = 0;                      // חדשים שמצטברים (משלמים retainerNew)
  const churn = c.churnPct;
  const retainerOld = s.retainer;
  const retainerNew = c.retainerForNew;
  const months=[];
  for(let i=1;i<=12;i++){
    const newThisMonth = monthlyNewClients;
    // שחיקה חלה גם על הבסיס המקורי וגם על החדשים שכבר הצטרפו
    const leavingOriginal = originalBase * churn;
    const leavingNew = newAccumulated * churn;
    const leaving = leavingOriginal + leavingNew;
    // פעילים משלמים החודש (אחרי חצי מהשחיקה)
    const payingOriginal = originalBase - leavingOriginal/2;
    const payingNewExisting = newAccumulated - leavingNew/2;

    // הכנסות החודש
    const setupRev = newThisMonth * s.setupFee;
    const retainerRevFromOriginal = payingOriginal * retainerOld;       // בסיס מקורי - מחיר ישן
    const retainerRevFromAccumulated = payingNewExisting * retainerNew; // חדשים מצטברים - מחיר חדש
    const retainerRevFromNewThisMonth = newThisMonth * retainerNew;     // חדשים החודש - מחיר חדש
    const totalRevenue = setupRev + retainerRevFromOriginal + retainerRevFromAccumulated + retainerRevFromNewThisMonth;

    // עלויות
    const marketingBudget = newThisMonth * c.acqCost;
    const salesComm = setupRev * c.commPct;
    const onbComm = newThisMonth * c.onbCommCost;
    const procFee = totalRevenue * c.procPct;
    const variableCosts = marketingBudget + salesComm + onbComm + procFee;
    const monthlyGross = totalRevenue - variableCosts;
    const monthlyOperating = monthlyGross - s.fixedCosts;

    months.push({
      month: i,
      startActive: originalBase + newAccumulated,
      newClients: newThisMonth,
      leaving,
      endActive: originalBase - leavingOriginal + newAccumulated - leavingNew + newThisMonth,
      revenue: totalRevenue,
      gross: monthlyGross,
      operating: monthlyOperating,
    });
    // עדכון הבסיסים לחודש הבא
    originalBase = originalBase - leavingOriginal;
    newAccumulated = newAccumulated - leavingNew + newThisMonth;
  }
  return months;
}

/* ממוצעים מהנתונים ההיסטוריים — מחזיר {costPerLead, effConv, cac} ממוצעים, או null אם אין מספיק */
function historyAverages(s = state){
  const c=compute(s);
  const arr=(s.history||[]).map(h=>({
    budget: h.budget===''||h.budget==null? null : parseFloat(h.budget)||0,
    leads:  h.leads ===''||h.leads ==null? null : parseFloat(h.leads )||0,
    closes: h.closes===''||h.closes==null? null : parseFloat(h.closes)||0,
    setupRev: h.setupRev===''||h.setupRev==null? null : parseFloat(h.setupRev)||0,
    retainerRev: h.retainerRev===''||h.retainerRev==null? null : parseFloat(h.retainerRev)||0,
  }));
  // צבירה משוקללת לפי נפח (במקום ממוצע פשוט)
  let sumBudget=0, sumLeads=0, sumCloses=0, monthsCpl=0, monthsConv=0, monthsCac=0;
  let setupAvgList=[], retainerAvgList=[];
  let totalBudget=0, totalLeads=0, totalCloses=0, monthsAny=0;
  for(const m of arr){
    let hasAny=false;
    if(m.budget!=null){ totalBudget+=m.budget; hasAny=true; }
    if(m.leads!=null){ totalLeads+=m.leads; hasAny=true; }
    if(m.closes!=null){ totalCloses+=m.closes; hasAny=true; }
    if(hasAny) monthsAny++;
    if(m.budget!=null && m.leads>0){ sumBudget+=m.budget; sumLeads+=m.leads; monthsCpl++; }
    if(m.leads>0 && m.closes!=null){ monthsConv++; }
    if(m.budget!=null && m.closes>0){ sumCloses+=m.closes; monthsCac++; }
    if(m.setupRev!=null) setupAvgList.push(m.setupRev);
    if(m.retainerRev!=null) retainerAvgList.push(m.retainerRev);
  }
  const avg = a => a.length? a.reduce((x,y)=>x+y,0)/a.length : null;
  // מחיר ליד משוקלל = סך התקציבים / סך הלידים
  const costPerLead = sumLeads>0 ? sumBudget/sumLeads : null;
  // אחוז המרה משוקלל = סך הסגירות / סך הלידים (סופרים גם חודשים בלי תקציב)
  let sumLeadsForConv=0, sumClosesForConv=0;
  for(const m of arr){ if(m.leads>0 && m.closes!=null){ sumLeadsForConv+=m.leads; sumClosesForConv+=m.closes; } }
  const effConv = sumLeadsForConv>0 ? (sumClosesForConv/sumLeadsForConv)*100 : null;
  // CAC משוקלל = (סך התקציבים / סך הסגירות) + עמלות (לפי state הנוכחי)
  const cac = sumCloses>0 ? sumBudget/sumCloses + c.commCost + c.onbCommCost + c.procCost + c.onbHourlyCost : null;
  return {
    costPerLead, costPerLeadN: monthsCpl,
    effConv, effConvN: monthsConv,
    cac, cacN: monthsCac,
    setupAvg: avg(setupAvgList), setupAvgN: setupAvgList.length,
    retainerTotalAvg: avg(retainerAvgList), retainerTotalN: retainerAvgList.length,
    totalBudget, totalLeads, totalCloses, monthsAny,
  };
}

function planFromClients(clients, s = state){
  const c = compute(s);
  // === מודל חודשי: לקוחות חדשים + לקוחות קיימים ===
  const m = monthlyProfitFromNewClients(clients, s);
  const leads     = clients*c.leadsPerClient;
  const calls     = clients*c.callsPerClient;
  const marketing = leads*s.costPerLead;
  const commTotal = clients*c.commCost;
  const onboards  = clients*c.onboardPerClient;
  const onboardHrs= clients*c.onboardHrsPerClient;
  return {
    clients,
    revenue: m.totalMonthlyRevenue,
    revenueFromNew: m.revenueFromNew,
    revenueFromExisting: m.revenueFromExisting,
    varCost: m.variableCosts,
    gross: m.monthlyGross,
    operating: m.monthlyOperating,
    leads, calls, marketing, commTotal, onboards, onboardHrs
  };
}

/* כמה לקוחות חדשים צריך לגייס החודש כדי להגיע ליעד רווח */
function clientsForProfit(p, s=state){
  return newClientsForMonthlyProfit(p, s);
}

function profitFromRevenue(rev, s=state){
  const c=compute(s);
  // המחזור הכולל = הקמות חדשות + ריטיינר קיימים + ריטיינר ראשון של חדשים (במחיר עדכני)
  // rev = N*(setupFee + retainerForNew) + monthlyRetainerFromBase
  const newClientsNeeded = (s.setupFee+c.retainerForNew)>0
    ? Math.max(0, (rev - c.monthlyRetainerFromBase)/(s.setupFee+c.retainerForNew))
    : 0;
  return planFromClients(newClientsNeeded, s);
}

function revenueForProfit(p, s=state){
  const newClients = clientsForProfit(p,s);
  const plan = planFromClients(newClients, s);
  return plan.revenue;
}

function openGuide(){
  const page=currentPage;
  const g=GUIDES[page]; if(!g) return;
  const existing=document.getElementById('guidePanel');
  if(existing){ existing.remove(); document.body.style.overflow=''; return; }
  const panel=document.createElement('div');
  panel.id='guidePanel';
  panel.style.cssText='position:fixed;top:0;left:0;width:min(440px,90vw);height:100vh;background:#1a1d2e;border-right:1px solid var(--line);box-shadow:4px 0 24px rgba(0,0,0,.5);z-index:9999;overflow-y:auto;padding:20px;direction:rtl';
  panel.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--line-soft)">
      <h2 style="margin:0;font-size:18px;color:var(--accent)">${g.title}</h2>
      <button onclick="document.getElementById('guidePanel').remove();" style="background:none;border:none;color:var(--txt-dim);font-size:24px;cursor:pointer;line-height:1">×</button>
    </div>
    ${g.sections.map(s=>`<div style="margin-bottom:18px">
      <h3 style="font-size:14px;color:var(--accent);margin:0 0 8px 0;font-weight:700">${s.h}</h3>
      <div style="font-size:13.5px;color:var(--txt);line-height:1.7">${s.body}</div>
    </div>`).join('')}
  `;
  document.body.appendChild(panel);
}

function setGlobalGoal(v){
  state.goalProfit = parseFloat(v)||0; saveState();
  syncGoalInputs();
  PAGES[currentPage].render();
}
function syncGoalInputs(){
  const a=document.getElementById('globalGoal'), b=document.getElementById('globalGoalM');
  if(a&&document.activeElement!==a) a.value=state.goalProfit;
  if(b&&document.activeElement!==b) b.value=state.goalProfit;
  // === תיבת היעדים: בייסליין, מומלץ, מקסימלי, בפועל ===
  const bl=lastMonthBaseline();
  // חישוב מקסימלי - לפי קיבולת הצוות + ריטיינר מהבסיס
  const cc = compute();
  const teamSize=Math.max(parseInt(state.teamSize)||1,1);
  const capMonth=cc.callsPerMonthPerRep*teamSize;
  const maxClients = cc.callsPerClient>0 ? capMonth/cc.callsPerClient : 0;
  const maxOperating = monthlyProfitFromNewClients(maxClients).monthlyOperating;
  // מקסימלי + כל ההקמה: הוספת רווח מכל לקוחות ההקמה הזמינים
  const setupClientsCount = state.setupClients || 0;
  const profitFromAllSetup = setupClientsCount * profitFromOneSetupClient();
  const maxOperatingWithSetup = maxOperating + profitFromAllSetup;
  // חישוב מומלץ
  let recommended = null;
  if(bl && bl.operatingProfit>0 && state.activeClients>0){
    const naturalProfit = monthlyProfitFromNewClients(0).monthlyOperating;
    const prevNewClients = bl.closes || 0;
    const profitPerNew = profitFromOneNewClient(); // כולל שיווק
    const calc1 = naturalProfit + prevNewClients * profitPerNew * 1.15;
    const calc2 = bl.operatingProfit * 1.15;
    recommended = Math.max(calc1, calc2);
  } else if(bl && bl.operatingProfit>0){
    recommended = bl.operatingProfit*1.15;
  }
  // הצגת הבייסליין באותה תיבה
  document.querySelectorAll('#baselineHint, #baselineHintM').forEach(el=>{
    const blRow = (bl && bl.operatingProfit!=null) ? `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:8px;gap:8px">
        <span style="font-size:11px;color:var(--txt-faint)">בייסליין (${bl.monthName||'חודש שעבר'}) ${help('baseline')}</span>
        <b style="font-family:'Rubik';font-weight:700;font-size:14px;color:${bl.operatingProfit>=0?'var(--accent)':'var(--red)'};direction:ltr">${money(bl.operatingProfit)}₪</b>
      </div>` : '';
    const recRow = (recommended!=null) ? `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:8px;gap:8px;margin-top:6px">
        <span style="font-size:11px;color:var(--txt-faint)">יעד מומלץ ${help('recommendedGoal')}</span>
        <b style="font-family:'Rubik';font-weight:700;font-size:14px;color:var(--accent);direction:ltr">${money(recommended)}₪</b>
      </div>` : '';
    const maxRow = `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:8px;gap:8px;margin-top:6px">

/* hash פשוט לזיהוי טקסטים */
function textHash(str){
  let h=0; for(let i=0;i<str.length;i++){ h=((h<<5)-h)+str.charCodeAt(i); h|=0; }
  return 'h'+Math.abs(h).toString(36);
}

/* מאפשר עריכה ידנית של טקסטים סטטיים — כותרות והסברים בלבד, לא תוצאות חישוב */
function makeTextsEditable(){
  if(!state.customTexts) state.customTexts={};
  setTimeout(()=>{
    // רק כותרות והסברים סטטיים — לא hint/sub שמכילות תוצאות חישוב
    const sel = '#content h1, #content h2, #content h3, #content .page-head p, #content .card-h h3';
    document.querySelectorAll(sel).forEach(el=>{
      if(el.querySelector('input, button, select, .help, [data-editable]')) return;
      if(el.dataset.editable) return;
      const original = el.innerHTML.trim();
      if(!original || original.length<2) return;
      // דלג על טקסטים שמכילים מספרים (כנראה תוצאת חישוב)
      // ספרות עם פסיק/נקודה/אחוז/₪
      if(/\d[,\d]*[.\d]*\s*[%₪]|\d{3,}|\d+\.\d/.test(el.textContent)) return;
      const key = textHash(original);
      if(state.customTexts[key]) el.innerHTML = state.customTexts[key];
      el.dataset.editable = 'true';
      el.dataset.textkey = key;
      el.dataset.original = original;
      el.contentEditable = 'true';
      el.spellcheck = false;
      el.addEventListener('blur', onTextEdited);
      el.addEventListener('keydown', e=>{
        if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); el.blur(); }
        if(e.key==='Escape'){ e.preventDefault(); el.innerHTML = state.customTexts[key] || el.dataset.original; el.blur(); }
      });
    });
  },50);
}
function onTextEdited(e){
  const el = e.target;
  const key = el.dataset.textkey;
  const newVal = el.innerHTML.trim();
  if(!key) return;
  if(!state.customTexts) state.customTexts={};
  if(newVal === el.dataset.original){
    delete state.customTexts[key];
  } else {
    state.customTexts[key] = newVal;
  }
  saveState();
}

/* ============================================================
   מסך 1 — סקירה
============================================================ */
/* בודק את האיזון בין כמות לידים נכנסים לקיבולת הצוות.
   plan = התוצאה של planFromClients (לקוחות, לידים, תקציב, שיחות) - משמש לחישוב מאוזן
   "תקציב יומי נוכחי" נלקח מהשדה "בפועל" שהמשתמש הזין, או מנתוני המאנדיי של החודש הנוכחי כברירת מחדל.
   מחזיר אובייקט: { status, callsNow, capacity, gap, balancedLeads, balancedDailyBudget, message } */
function leadsCapacityBalance(plan, s = state){
  const c = compute(s);
  const teamSize = Math.max(parseInt(s.teamSize)||1,1);
  const capacity = c.callsPerMonthPerRep * teamSize;

  // === תקציב נוכחי בפועל ===
  // עדיפות 1: actBudget + actDays שהמשתמש הזין במסך 2
  // עדיפות 2: נתוני המאנדיי של החודש הנוכחי (current.budget)
  // עדיפות 3: אם אין שום מקור - נשתמש בתקציב היעד כברירת מחדל
  let actualBudgetMonthly = null;
  let actualBudgetSource = '';
  let actualDailyDirect = null;
  let budgetSpentSoFar = 0;       // כמה הוצאת עד עכשיו
  let daysPassedThisMonth = 0;    // כמה ימים עברו
  const actBudget = parseFloat(s.actBudget);
  const actDays = parseFloat(s.actDays);
  if(actBudget>0 && actDays>0){
    actualDailyDirect = actBudget/actDays;
    actualBudgetMonthly = actualDailyDirect * s.daysMonth;
    actualBudgetSource = `${money(actBudget)}₪ ב-${actDays} ימים שעברו החודש`;
    budgetSpentSoFar = actBudget;
    daysPassedThisMonth = actDays;
  } else if(s.mondayRaw && s.mondayRaw.current && s.mondayRaw.current.budget>0){
    actualBudgetMonthly = s.mondayRaw.current.budget;
    actualBudgetSource = 'מאנדיי - תקציב חודשי שיצא';
    budgetSpentSoFar = s.mondayRaw.current.budget;
    daysPassedThisMonth = s.daysMonth; // נחשב כאילו עברו כל הימים
  } else {
    actualBudgetMonthly = plan.marketing;
    actualBudgetSource = 'אין נתון בפועל - לפי תקציב היעד';
    budgetSpentSoFar = 0;
    daysPassedThisMonth = 0;
  }

  const currentDaily = actualDailyDirect !== null ? actualDailyDirect : (actualBudgetMonthly / s.daysMonth);
  const actualLeads = actualBudgetMonthly / s.costPerLead;
  const callsNow = actualLeads * c.answer;
  const tolerance = capacity * 0.05;
  const balancedLeads = capacity / c.answer;
  const balancedBudget = balancedLeads * s.costPerLead;
  const balancedDaily = balancedBudget / s.daysMonth;

  // === תקציב יומי לתיקון לסיום החודש ===
  // בהתחשב במה שכבר הוצאת, מה הקצב היומי לימים שנותרו כדי להגיע לסך החודשי המאוזן?
  const daysLeftThisMonth = Math.max(0, s.daysMonth - daysPassedThisMonth);
  const budgetRemainingNeeded = Math.max(0, balancedBudget - budgetSpentSoFar);
  const correctionDaily = daysLeftThisMonth>0 ? budgetRemainingNeeded/daysLeftThisMonth : null;
  // האם רלוונטי להציג? רק אם יש ימים שנותרו וגם פער מהתקציב המאוזן
  const hasCorrection = daysLeftThisMonth>0 && daysPassedThisMonth>0 && Math.abs(balancedBudget - budgetSpentSoFar*s.daysMonth/Math.max(daysPassedThisMonth,1)) > balancedBudget*0.05;

  const baseResult = {
    capacity, callsNow,
    currentDaily, balancedDaily,
    correctionDaily, daysLeftThisMonth, daysPassedThisMonth,
    budgetSpentSoFar, balancedBudget,
    hasCorrection,
    actualBudgetSource,
  };

  if(callsNow > capacity + tolerance){
    const excessCalls = callsNow - capacity;
    const wastedLeads = excessCalls / c.answer;
    const wastedBudget = wastedLeads * s.costPerLead;
    const wastedDaily = wastedBudget / s.daysMonth;
    return {
      ...baseResult,
      status: 'over',
      message: `יש יותר מדי לידים מהקיבולת של הצוות`,
      detail: `הצוות (${teamSize} ${teamSize>1?'נציגים':'נציג'}) יכול לטפל ב-${fmt(capacity)} שיחות בחודש, אבל הקצב הנוכחי שלך מייצר ${fmt(callsNow)} שיחות בחודש (אם תמשיך בקצב כזה כל החודש). ${fmt1(wastedLeads)} לידים בחודש יורדים לטמיון.`,
      actionGeneral: `הורד את התקציב היומי הקבוע ל-${money(balancedDaily)}₪`,
      actionRemaining: hasCorrection && correctionDaily!=null
        ? `לסיום החודש בלבד: הורד ל-${money(Math.max(0,correctionDaily))}₪ ל-${daysLeftThisMonth} הימים שנותרו`
        : '',
      excessLeads: wastedLeads,
      wastedBudget,
    };
  } else if(callsNow < capacity - tolerance){
    const deficitCalls = capacity - callsNow;
    const neededLeads = deficitCalls / c.answer;
    const neededBudget = neededLeads * s.costPerLead;
    const neededDaily = neededBudget / s.daysMonth;
    return {
      ...baseResult,
      status: 'under',
      message: `יש לך קיבולת פנויה — אפשר לסגור עוד עסקאות`,
      detail: `הצוות (${teamSize} ${teamSize>1?'נציגים':'נציג'}) יכול לטפל ב-${fmt(capacity)} שיחות בחודש, אבל הקצב הנוכחי שלך מייצר רק ${fmt(callsNow)} שיחות בחודש (אם תמשיך בקצב כזה כל החודש). יש מקום לעוד ${fmt1(neededLeads)} לידים בחודש.`,
      actionGeneral: `העלה את התקציב היומי הקבוע ל-${money(balancedDaily)}₪`,
      actionRemaining: hasCorrection && correctionDaily!=null
        ? `לסיום החודש בלבד: עלה ל-${money(correctionDaily)}₪ ל-${daysLeftThisMonth} הימים שנותרו`
        : '',
      deficitLeads: neededLeads,
      neededBudget,
    };
  } else {
    return {
      ...baseResult,
      status: 'balanced',
      message: 'התקציב והקיבולת מאוזנים',
      detail: `הצוות (${teamSize} ${teamSize>1?'נציגים':'נציג'}) מטפל ב-${fmt(callsNow)} שיחות מתוך ${fmt(capacity)} אפשריות. ניצול: ${fmt1(callsNow/capacity*100)}%.`,
      actionGeneral: '',
      actionRemaining: '',
    };
  }
}

/* כרטיס סיכומי החודש - שורה של מטריקות חיוניות במסך הסקירה */
function renderMonthSummary(){
  const s = state;
  const hist = (s.mondayRaw && s.mondayRaw.history) ? s.mondayRaw.history : [];
  const prev = hist[0]; // החודש הקודם
  // === 1. מחזור מכירות החודש ===
  const revenueNow = (s.retainersIncomeSoFar||0) + (s.setupIncomeSoFar||0);
  const revenuePrev = prev ? ((prev.retainersIncomeSoFar||0) + (prev.setupIncomeSoFar||0)) : null;
  const revGrowth = growthPct(revenueNow, revenuePrev);
  // === 2. רווח גולמי ===
  const grossExpected = grossProfitExpected(s);
  const grossNow = grossProfitSoFar(s);
  // === 3. רווח תפעולי צפוי ===
  const opExpected = profitExpectedEndOfMonth(s).operating;
  const opNoChurn = profitExpectedNoChurn(s);
  // === 4. סכום ריטיינרים פעילים ===
  const activeRetainerSum = (s.activeClients||0) * (s.retainer||0);
  const prevActiveSum = prev ? (prev.activeEndMonth||0)*(prev.retainerAvgActive||s.retainer||0) : null;
  const activeRetGrowth = growthPct(activeRetainerSum, prevActiveSum);
  const activeRetAvgGrowth = avgGrowthOverMonths(m => (m.activeEndMonth||0)*(m.retainerAvgActive||0), 999);
  // === 5. כמות לקוחות פעילים ===
  const activeNow = s.activeClients||0;
  const prevActive = prev ? prev.activeEndMonth : null;
  const activeGrowth = growthPct(activeNow, prevActive);
  const activeAvgGrowth = avgGrowthOverMonths(m => m.activeEndMonth||0, 999);
  // === 6. רווח צפוי לחודש הבא + רווח לחודש X (מבחירת משתמש) ===
  const nextMonthObj = profitNextMonth(s);
  const nextMonth = nextMonthObj.operating;
  const customMonthsAhead = Math.max(2, parseInt(s.nextMonthAheadCustom)||3);
  const nextMonthCustomObj = profitNextMonth(s, s.nextMonthMonthsBack, customMonthsAhead);
  const nextMonthCustom = nextMonthCustomObj.operating;
  // === 7. אחוז רווח (תפעולי וגולמי) ===
  const opPctNow = revenueNow>0 ? (profitSoFar(s).operating/revenueNow)*100 : null;
  const grossPctNow = revenueNow>0 ? (grossNow/revenueNow)*100 : null;
  const opPctPrev = (prev && revenuePrev>0) ? (((prev.retainersIncomeSoFar+prev.setupIncomeSoFar) - (prev.budget||0) - (prev.fixedCosts||0))/revenuePrev)*100 : null;

  const tile = (title, mainVal, mainColor, subVal, subLabel, helpKey, extras) => `
    <div style="background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;padding:13px 14px">
      <div style="font-size:11.5px;color:var(--txt-faint);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;gap:6px">
        <span>${title}</span>
        ${helpKey ? help(helpKey) : ''}
      </div>
      <div style="font-family:'Rubik';font-size:20px;font-weight:800;color:${mainColor};direction:ltr;text-align:right;margin-bottom:3px">${mainVal}</div>
      ${subVal ? `<div style="font-size:11px;color:var(--txt-dim);line-height:1.4">${subLabel?`<span style="color:var(--txt-faint)">${subLabel}: </span>`:''}<b style="font-family:'Rubik';direction:ltr">${subVal}</b></div>` : ''}
      ${extras || ''}
    </div>`;

  const growthBadge = (pct) => {
    if(pct==null || !isFinite(pct)) return '';
    const sign = pct>=0?'+':'';
    const color = pct>=0?'var(--accent)':'var(--red)';
    return `<span style="color:${color};font-family:'Rubik';direction:ltr">${sign}${fmt1(pct)}%</span>`;

        '',
        'activeCountSummary'
      )}
      ${tile(
        'רווח צפוי לחודש הבא',
        money(nextMonth)+'₪',

      )}
    </div>
  </div>`;
}

function changeNextMonthMonthsBack(val){
  state.nextMonthMonthsBack = Math.max(1, parseInt(val)||3);
  saveState();
  navigate(currentPage);
}

function changeNextMonthAhead(val){
  state.nextMonthAheadCustom = Math.max(2, Math.min(60, parseInt(val)||3));
  saveState();
  navigate(currentPage);
}

function renderForecast12(){
  const s = state;
  const monthsBack = s.nextMonthMonthsBack || 3;
  // ממוצע סגירות ומצטרפים (לתצוגת ההסבר)
  const c = compute(s);

  // מריצים את הסימולציה ל-12 חודשים, אוספים כל חודש
  const rows = [];
  for(let N=1; N<=12; N++){
    const r = profitNextMonth(s, monthsBack, N);
    rows.push(r);
  }

  // אפשרויות דרופדאון
  const totalHistory = (s.mondayRaw && s.mondayRaw.history) ? s.mondayRaw.history.length : 6;
  let monthOpts = '';
  for(let i=1; i<=Math.min(totalHistory, 12); i++){
    monthOpts += `<option value="${i}" ${monthsBack===i?'selected':''}>${i===1?'חודש אחרון':i+' חודשים'}</option>`;
  }

  const tableRows = rows.map((r,i) => {
    const month = i+1;
    const prevOp = i>0 ? rows[i-1].operating : null;
    const growth = prevOp!=null && prevOp!==0 ? ((r.operating-prevOp)/Math.abs(prevOp))*100 : null;
    return `<tr style="border-bottom:1px solid var(--line-soft)">
      <td style="padding:11px 10px;font-size:13px;color:var(--txt)">חודש ${month}</td>
      <td style="padding:11px 10px;text-align:center;font-family:'Rubik';font-weight:700;font-size:15px;color:${r.operating>=0?'var(--accent)':'var(--red)'};direction:ltr">${money(r.operating)}₪</td>
      <td style="padding:11px 10px;text-align:center;font-family:'Rubik';font-size:13px;color:var(--txt-dim);direction:ltr">${fmt1(r.totalActiveAfter)}</td>
      <td style="padding:11px 10px;text-align:center;font-family:'Rubik';font-size:12.5px;color:${growth==null?'var(--txt-faint)':growth>=0?'var(--accent)':'var(--red)'};direction:ltr">${growth==null?'—':(growth>=0?'+':'')+fmt1(growth)+'%'}</td>
    </tr>`;
  }).join('');

  return `
  <div class="card" style="margin-bottom:16px">
    <div class="card-h">
      <h3>תחזית ל-12 חודשים הבאים</h3>
      <span class="sub">לפי קצב הגדילה הנוכחי</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:11.5px;color:var(--txt-faint)">
      <span>מחושב על סמך ממוצע:</span>
      <select onchange="changeNextMonthMonthsBack(this.value)" style="background:var(--bg-1);color:var(--txt);border:1px solid var(--line-soft);border-radius:5px;padding:3px 8px;font-size:12px">${monthOpts}</select>
    </div>
    <div class="hint" style="margin-bottom:14px;line-height:1.6">
      כל חודש מצטרפים בממוצע ${fmt1(rows[0].avgClosesPerMonth)} לקוחות חדשים (הקמות) ו-${fmt1(rows[0].avgNewJoined)} ריטיינרים חדשים. הם מצטברים לבסיס, פחות שחיקה של ${fmt1(s.churnRate)}% לחודש — ולכן הרווח גדל עם הזמן.
    </div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="border-bottom:1px solid var(--line-soft)">
        <th style="text-align:right;padding:9px 10px;font-size:11px;color:var(--txt-faint);font-weight:600">חודש</th>
        <th style="text-align:center;padding:9px 10px;font-size:11px;color:var(--accent);font-weight:600">רווח תפעולי צפוי</th>
        <th style="text-align:center;padding:9px 10px;font-size:11px;color:var(--txt-faint);font-weight:600">לקוחות פעילים בסוף החודש</th>
        <th style="text-align:center;padding:9px 10px;font-size:11px;color:var(--txt-faint);font-weight:600">גדילה</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    </div>
  </div>`;
}

  onGoalProfit(state.goalProfit);
}

/* בניית פירוקי יעד אלטרנטיביים — דרכים שונות להגיע ליעד הרווח.
   1. רק חדשים (פירוק קיים, לא נוגעים)
   2. רק הקמה (אם אפשרי)
   3. כל ההקמה + חדשים להשלמה
   4. שילוב חכם 1:3 (מאמץ לקוח-הקמה = שליש מלקוח-חדש)
   5. אם 2 לא אפשרי - הקמה + עוזבים + חדשים (רק אם יש שדות עוזבים) */
function renderGoalPaths(){
  const el = document.getElementById('goalPathsCard');
  if(!el) return;
  const s = state;
  const setupClients = s.setupClients||0;
  if(setupClients<=0){ el.innerHTML=''; return; } // אין נתוני הקמה - לא מציגים את הכרטיס
  const baseProfit = monthlyProfitFromNewClients(0).monthlyOperating;
  const gap = s.goalProfit - baseProfit;
  if(gap<=0){ el.innerHTML=''; return; } // היעד מושג מהבסיס לבד

  const profitPerNew = profitFromOneNewClient(s);
  const profitPerSetup = profitFromOneSetupClient(s);
  const c = compute(s);

  // === אופציה 2: רק מהקמה ===
  // כמה לקוחות בהקמה צריך כדי לסגור את הפער?
  const setupOnlyNeeded = profitPerSetup>0 ? gap/profitPerSetup : Infinity;
  const setupOnlyPossible = setupOnlyNeeded <= setupClients;
  const setupOnlyRevenue = setupOnlyNeeded * ((s.setupRetainers/setupClients) + (s.setupRemaining/setupClients));

  // === אופציה 3: כל ההקמה + חדשים להשלמה ===
  const profitFromAllSetup = setupClients * profitPerSetup;
  const remainingGapAfterAllSetup = Math.max(0, gap - profitFromAllSetup);
  const newToCompleteSetup = profitPerNew>0 ? remainingGapAfterAllSetup/profitPerNew : Infinity;

  // === אופציה 4: שילוב חכם 1:3 (מאמץ הקמה = 1, מאמץ חדש = 3) ===
  // ממזערים: setupTaken×1 + newTaken×3, בכפוף ל: setupTaken×profitPerSetup + newTaken×profitPerNew = gap
  // setupTaken ≤ setupClients, ושניהם ≥ 0
  // אחרי בדיקה: רוב הזמן הפתרון הכי "קל" יהיה לקחת את כל ההקמה ולהשלים בחדשים
  // (כי הקמה זול יותר). אבל אם profitPerNew קטן יחסית, אולי כדאי יותר חדשים.
  // הפתרון האופטימלי: אם profitPerSetup/1 > profitPerNew/3 → לקחת מקסימום הקמה
  //                  אחרת → לקחת מקסימום חדשים (אבל אז זו אופציה 1)
  // בפועל, אנחנו מציעים פתרון שמתחשב בשניהם
  let smartSetup = 0, smartNew = 0;
  if(profitPerSetup>0 && profitPerNew>0){
    const setupEffRatio = profitPerSetup / 1;    // רווח ליחידת מאמץ עבור הקמה
    const newEffRatio = profitPerNew / 3;        // רווח ליחידת מאמץ עבור חדש
    if(setupEffRatio >= newEffRatio){
      // הקמה יעיל יותר - לוקחים כמה שאפשר
      smartSetup = Math.min(setupClients, gap/profitPerSetup);
      const remaining = gap - smartSetup*profitPerSetup;
      smartNew = Math.max(0, remaining/profitPerNew);
    } else {
      // חדשים יעיל יותר (נדיר) - אבל עדיין נציע איזון 70% חדש / 30% הקמה
      smartSetup = Math.min(setupClients, gap*0.3/profitPerSetup);
      const remaining = gap - smartSetup*profitPerSetup;
      smartNew = Math.max(0, remaining/profitPerNew);
    }
  }
  const smartTotalEffort = smartSetup + smartNew*3;

  // === נבנה כרטיסים ===
  const cards = [];

  // אופציה 2: רק הקמה
  if(setupOnlyPossible){
    cards.push({
      color: 'green', icon: 'repeat',
      title: 'רק לקוחות מההקמה',
      tag: 'אופציה קלה',
      tagColor: 'green',
      detail: `קדם <b>${fmt1(setupOnlyNeeded)}</b> מתוך ${setupClients} הלקוחות בהקמה לריטיינר → יסגור את כל הפער של ${money(gap)}₪.`,
      stats: [
        ['לקוחות מההקמה', fmt1(setupOnlyNeeded)],
        ['מחזור צפוי', money(setupOnlyRevenue)+'₪'],
        ['רווח לפי הפירוק', money(setupOnlyNeeded*profitPerSetup)+'₪'],
      ],
    });
  }

  // אופציה 3: כל ההקמה + חדשים להשלמה
  if(setupClients>0){
    cards.push({
      color: 'amber', icon: 'flag',
      title: 'כל ההקמה + השלמה מחדשים',
      tag: setupOnlyPossible ? '' : 'אופציה ראשית מומלצת',
      tagColor: 'amber',
      detail: `קדם את כל <b>${setupClients}</b> הלקוחות בהקמה (= ${money(profitFromAllSetup)}₪ רווח) ${remainingGapAfterAllSetup>0 ? `+ גייס עוד <b>${fmt1(newToCompleteSetup)}</b> חדשים להשלמת הפער` : `— זה לבדו ${profitFromAllSetup>=gap?'עובר':'כמעט עובר'} את היעד`}.`,
      stats: [
        ['מההקמה', fmt1(setupClients)],
        ['חדשים', fmt1(newToCompleteSetup)],
        ['רווח צפוי', money(profitFromAllSetup + newToCompleteSetup*profitPerNew)+'₪'],
      ],
    });
  }

  // אופציה 4: שילוב חכם
  if(profitPerSetup>0 && profitPerNew>0 && (smartSetup>0 || smartNew>0)){
    cards.push({
      color: 'blue', icon: 'star',
      title: 'שילוב חכם — הפתרון הקל ביותר',
      tag: 'מאמץ מינימלי',
      tagColor: 'blue',
      detail: `המאזן הכי קל: <b>${fmt1(smartSetup)}</b> מההקמה + <b>${fmt1(smartNew)}</b> חדשים. (יחס מאמץ: לקוח-הקמה = 1, לקוח-חדש = 3)`,
      stats: [
        ['מההקמה', fmt1(smartSetup)],
        ['חדשים', fmt1(smartNew)],
        ['רווח צפוי', money(smartSetup*profitPerSetup + smartNew*profitPerNew)+'₪'],
      ],
    });
  }

  // הודעה אם 2 לא אפשרי - רומז על אופציה 5 שעוד לא קיימת
  const noEnoughSetup = !setupOnlyPossible;
  const warningRow = noEnoughSetup ? `
    <div style="margin-top:14px;padding:11px 14px;background:rgba(247,184,1,.08);border:1px solid rgba(247,184,1,.25);border-radius:8px;font-size:12.5px;color:var(--txt-dim);line-height:1.6">
      <b style="color:var(--amber)">לקוחות ההקמה לא מספיקים לסגור את היעד לבד.</b> דרושים ${fmt1(setupOnlyNeeded)} ויש רק ${setupClients}. בעתיד נציע גם אופציה של החזרת לקוחות שעזבו — כשנוסיף את הנתונים הרלוונטיים מהמאנדיי.
    </div>` : '';

  el.innerHTML = `<div class="card">
    <div class="card-h">
      <h3>דרכים נוספות להגיע ליעד — דרך לקוחות בהקמה</h3>
      <span class="sub">${setupClients} לקוחות כרגע בהקמה, ${money(s.setupRetainers)}₪ ריטיינרים, ${money(s.setupRemaining)}₪ שנותר להשלים</span>
    </div>
    <p style="font-size:13px;color:var(--txt-dim);margin-bottom:14px;line-height:1.6">
      פער מהבסיס ליעד: <b style="color:var(--txt)">${money(gap)}₪</b>. כל לקוח שמקודם מההקמה לריטיינר = <b>${money(profitPerSetup)}₪</b> רווח (לעומת ${money(profitPerNew)}₪ ללקוח חדש — אבל בלי עלות שיווק ועמלת מכירה מלאה).
    </p>
    <div style="display:flex;flex-direction:column;gap:12px">
      ${cards.map(c => `
        <div style="background:var(--bg-2);border:1px solid var(--line-soft);border-radius:10px;padding:14px">
          <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:10px">
            <div style="background:var(--${c.color}-soft);color:${COLORS[c.color]};width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${svg(c.icon)}</div>
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
                <div style="font-weight:700;font-size:14.5px">${c.title}</div>
                ${c.tag ? `<span class="tag ${c.tagColor}">${c.tag}</span>` : ''}
              </div>
              <div style="font-size:13px;color:var(--txt-dim);line-height:1.6">${c.detail}</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(${c.stats.length},1fr);gap:8px;margin-right:46px">
            ${c.stats.map(([label,value]) => `
              <div style="background:var(--bg-1);border:1px solid var(--line-soft);border-radius:8px;padding:8px 10px">
                <div style="font-size:10.5px;color:var(--txt-faint);margin-bottom:2px">${label}</div>
                <div style="font-family:'Rubik';font-weight:700;font-size:14px;direction:ltr;text-align:right">${value}</div>
              </div>`).join('')}
          </div>
        </div>`).join('')}
    </div>
    ${warningRow}
  </div>`;
}

  const alreadyCovered = plan.clients<=0 && state.goalProfit<=baseProfit;
  return `<div class="statlist">
  ${slRow('green','לקוחות חדשים נדרשים',fmt1(plan.clients))}
  ${slRow('blue','מחזור חודשי נדרש',money(plan.revenue)+' ₪')}
  ${plan.revenueFromExisting!=null&&plan.revenueFromExisting>0?slRow('blue','&nbsp;&nbsp;מתוכו: ריטיינר מבסיס קיים','<span style="color:var(--txt-faint)">'+money(plan.revenueFromExisting)+' ₪</span>'):''}
  ${plan.revenueFromNew!=null&&plan.revenueFromNew>0?slRow('blue','&nbsp;&nbsp;מתוכו: הקמות + ריטיינר חדש','<span style="color:var(--txt-faint)">'+money(plan.revenueFromNew)+' ₪</span>'):''}
  ${slRow('amber','רווח גולמי',money(plan.gross)+' ₪')}

  ${alreadyCovered?`<div style="margin-top:10px;padding:10px 12px;background:var(--accent-soft);border-radius:8px;font-size:12.5px;color:var(--accent);line-height:1.5">✓ הבסיס הקיים שלך כבר מכסה את היעד הזה (${money(baseProfit)}₪ רווח מהריטיינרים בלבד). כל לקוח חדש שתגייס יהיה רווח נטו.</div>`:''}`;}
function revQuick(plan){return `<div class="statlist">
